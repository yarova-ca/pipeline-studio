name: Deploy Yarova Studio to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build the Svelte app
        working-directory: app
        run: npm run build   # outputs ../site-app

      - name: Diagnose Pages project (production branch + domains)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "::group::projects"
          curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); [print(p['name'],'| prod_branch=',p.get('production_branch'),'| domains=',p.get('domains')) for p in d.get('result',[])]"
          echo "::endgroup::"

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Deploy to the project's PRODUCTION branch (main) so the custom domain
          # studio.yarova.ca updates. --branch=production created preview-only deploys.
          command: pages deploy site-app --project-name=yarova-studio --branch=main
