name: Deploy Yarova Studio to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build the Svelte app
        working-directory: app
        run: npm run build   # outputs ../site-app

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # yarova-studio's production branch IS "production" → this is a real
          # production deploy (updates yarova-studio.pages.dev + custom domains).
          command: pages deploy site-app --project-name=yarova-studio --branch=production

      - name: Attach studio.yarova.ca custom domain to yarova-studio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Idempotent: attaches the domain so the wizard is served at studio.yarova.ca.
          curl -s -X POST \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/yarova-studio/domains" \
            --data '{"name":"studio.yarova.ca"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('attach ok=',d.get('success'),'errors=',d.get('errors'))"
