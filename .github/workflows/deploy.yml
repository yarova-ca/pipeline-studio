name: Deploy Yarova Studio to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build the Svelte app
        working-directory: app
        run: npm run build   # outputs ../site-app

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # yarova-studio's production branch IS "production" → this is a real
          # production deploy (updates yarova-studio.pages.dev + custom domains).
          command: pages deploy site-app --project-name=yarova-studio --branch=production

      - name: Point studio.yarova.ca at the Pages project (attach + DNS)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          API=https://api.cloudflare.com/client/v4
          H_AUTH="Authorization: Bearer $CLOUDFLARE_API_TOKEN"
          # 1) attach the custom domain to the Pages project (idempotent)
          curl -s -X POST -H "$H_AUTH" -H "Content-Type: application/json" \
            "$API/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/yarova-studio/domains" \
            --data '{"name":"studio.yarova.ca"}' \
            | python3 -c "import sys,json;d=json.load(sys.stdin);print('domain attach ok=',d.get('success'))"
          # 2) repoint DNS: studio.yarova.ca must be a proxied CNAME to the Pages project
          ZONE=$(curl -s -H "$H_AUTH" "$API/zones?name=yarova.ca" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['result'][0]['id'] if d.get('result') else '')")
          echo "zone=$ZONE"
          if [ -n "$ZONE" ]; then
            # delete any existing records for studio.yarova.ca (old A record → VM)
            curl -s -H "$H_AUTH" "$API/zones/$ZONE/dns_records?name=studio.yarova.ca" \
              | python3 -c "import sys,json;d=json.load(sys.stdin);[print(r['id']) for r in d.get('result',[])]" \
              | while read RID; do [ -n "$RID" ] && curl -s -X DELETE -H "$H_AUTH" "$API/zones/$ZONE/dns_records/$RID" >/dev/null && echo "deleted old record $RID"; done
            # create proxied CNAME → yarova-studio.pages.dev
            curl -s -X POST -H "$H_AUTH" -H "Content-Type: application/json" \
              "$API/zones/$ZONE/dns_records" \
              --data '{"type":"CNAME","name":"studio.yarova.ca","content":"yarova-studio.pages.dev","proxied":true}' \
              | python3 -c "import sys,json;d=json.load(sys.stdin);print('dns cname ok=',d.get('success'),'errors=',d.get('errors'))"
          fi
