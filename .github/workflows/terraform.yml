# Terraform CI/CD — infrastructure changes go through PR review.
# On PR: runs terraform plan — plan posted as PR comment.
# On merge to main: runs terraform apply — cluster created/updated.
#
# Terraform state stored in S3 (configure backend per cluster).
# Required GitHub secrets: AWS_TERRAFORM_ROLE_ARN (OIDC) or AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY.

name: Terraform

on:
  pull_request:
    paths: ['infra/clusters/terraform/**']
  push:
    branches: [main]
    paths: ['infra/clusters/terraform/**']

permissions:
  contents: read
  pull-requests: write
  id-token: write  # for OIDC auth to AWS/GCP/Azure

jobs:
  detect-changes:
    runs-on: ubuntu-24.04
    outputs:
      clusters: ${{ steps.detect.outputs.clusters }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }
      - id: detect
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- infra/clusters/terraform/ \
            | grep -oP 'infra/clusters/terraform/\K[^/]+' \
            | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "clusters=$(echo $CHANGED | python3 -c "
          import sys, json
          parts = [p for p in sys.stdin.read().split(',') if p and p not in ('modules', '')]
          print(json.dumps(parts))
          ")" >> $GITHUB_OUTPUT

  plan:
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.clusters != '[]'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        cluster: ${{ fromJson(needs.detect-changes.outputs.clusters) }}
    name: Plan ${{ matrix.cluster }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.9.0' }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1
        continue-on-error: true  # skip if not using AWS
      - name: Terraform init
        run: terraform init
        working-directory: infra/clusters/terraform/${{ matrix.cluster }}
      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan.txt
        working-directory: infra/clusters/terraform/${{ matrix.cluster }}
      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/clusters/terraform/${{ matrix.cluster }}/plan.txt', 'utf8');
            const output = `#### Terraform Plan: \`${{ matrix.cluster }}\`
            \`\`\`
            ${plan.slice(0, 60000)}
            \`\`\`
            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  apply:
    needs: detect-changes
    if: github.event_name == 'push' && needs.detect-changes.outputs.clusters != '[]'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        cluster: ${{ fromJson(needs.detect-changes.outputs.clusters) }}
    name: Apply ${{ matrix.cluster }}
    environment: ${{ matrix.cluster }}  # requires manual approval for prod
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.9.0' }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1
        continue-on-error: true
      - name: Terraform init
        run: terraform init
        working-directory: infra/clusters/terraform/${{ matrix.cluster }}
      - name: Terraform apply
        run: terraform apply -auto-approve
        working-directory: infra/clusters/terraform/${{ matrix.cluster }}
