# ──────────────────────────────────────────────────────────────────────────
# Security Scan — runs on all PRs and main branch pushes.
#
# Scans:
#   1. Secret scan (Gitleaks) — catches secrets committed to the repo
#   2. SAST (Semgrep) — static code analysis for security patterns
#   3. Container scan (Trivy) — scans built images for CVEs
#
# Semgrep: a static analysis tool (checks code for known vulnerability patterns).
# CVE: Common Vulnerabilities and Exposures — catalogued security flaws.
# SAST: Static Application Security Testing — analyzes code without running it.
# ──────────────────────────────────────────────────────────────────────────

name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 6 AM UTC — weekly CVE rescan

permissions:
  contents: read
  security-events: write   # required to upload SARIF results to GitHub Security tab

jobs:
  secret-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for secret scan
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  sast:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/default
            p/nodejs
            p/python
            p/golang
            p/java
            p/csharp
            p/rust
          publishToken: ${{ secrets.SEMGREP_APP_TOKEN }}
          publishDeployment: ${{ github.ref == 'refs/heads/main' }}
        continue-on-error: true   # Semgrep token optional — scan still runs

  setup:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      tier1: ${{ steps.list.outputs.tier1 }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          TIER1=$(python3 -c "
          import json
          tier1 = ['14-express','15-fastapi','16-gin','17-spring-boot','18-ktor',
                   '19-aspnet-core','20-axum','21-phoenix','22-rails','23-laravel',
                   '28-node-grpc','28-python-grpc','28-go-grpc','29-apollo',
                   '30-ws-node','30-ws-elixir','01-nextjs','02-react']
          print(json.dumps(tier1))
          ")
          echo "tier1=$TIER1" >> $GITHUB_OUTPUT

  trivy-scan:
    needs: setup
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.setup.outputs.tier1) }}
    name: Trivy ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scan
        run: |
          docker build --build-arg RUNTIME=alpine -t scan-target:${{ matrix.service }} \
            services/${{ matrix.service }}
      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: scan-target:${{ matrix.service }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  compliance-hipaa:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: HIPAA — Verify audit logging is implemented
        run: |
          echo "Checking for audit logging in auth middleware..."
          grep -r "auditLog\|audit_log\|AuditLog\|AUDIT:" services/14-express/src/ \
            || (echo "FAIL: No audit logging found in 14-express/src/" && exit 1)
          echo "PASS: Audit logging found"

      - name: HIPAA — Verify encryption in transit (TLS config)
        run: |
          echo "Checking for HTTPS/TLS configuration..."
          grep -r "secure.*true\|NODE_ENV.*production\|https" services/14-express/src/ | grep -i cookie \
            && echo "PASS: TLS cookie flag found" || echo "WARN: cookie secure flag not found"

      - name: HIPAA — Semgrep PHI and security patterns scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/hipaa
            p/owasp-top-ten
            p/secrets
        continue-on-error: true   # Semgrep token optional

  compliance-fips-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build FIPS image (14-express)
        run: |
          docker build \
            --build-arg RUNTIME=fips \
            --target runtime-fips \
            -t pipeline-studio/14-express:fips-test \
            services/14-express/ \
            && echo "PASS: FIPS image builds successfully" \
            || echo "WARN: FIPS build failed — check UBI9 credentials"

      - name: Verify FIPS runtime uses UBI9 base
        run: |
          docker inspect pipeline-studio/14-express:fips-test \
            --format '{{index .Config.Labels "org.opencontainers.image.base.name"}}' \
            2>/dev/null || true
          docker history pipeline-studio/14-express:fips-test \
            | grep -i "ubi9\|registry.access.redhat.com" \
            && echo "PASS: FIPS image uses UBI9 base" \
            || echo "WARN: Could not verify UBI9 base"

  registry-continuous-scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    # Run weekly to detect newly-disclosed CVEs in deployed images
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and scan deployed images
        run: |
          for service in 14-express 15-fastapi 16-gin 17-spring-boot 19-aspnet-core 20-axum; do
            echo "Scanning ghcr.io/yarova-ca/${service}:latest..."
            docker pull ghcr.io/yarova-ca/${service}:latest 2>/dev/null || continue
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              aquasec/trivy:latest image \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --exit-code 0 \
              "ghcr.io/yarova-ca/${service}:latest" || true
          done
