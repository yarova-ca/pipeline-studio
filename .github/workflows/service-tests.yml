# ──────────────────────────────────────────────────────────────────────────
# Service Tests — runs unit + integration tests for all services
#
# Each service uses a different test runner.
# This workflow maps service → test runner → test command.
#
# Test runners:
#   Node:    jest / vitest / npm test
#   Python:  pytest
#   Go:      go test ./...
#   Java:    mvn test / gradle test
#   Kotlin:  gradle test
#   .NET:    dotnet test
#   Rust:    cargo test
#   Ruby:    bundle exec rspec / rails test
#   PHP:     php artisan test
#   Elixir:  mix test
# ──────────────────────────────────────────────────────────────────────────

name: Service Tests

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/service-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/service-tests.yml'

permissions:
  contents: read

jobs:
  # ── Database migration validation ─────────────────────────────────────────
  # Validates that Prisma migrations apply cleanly from an empty database.
  # Why: if a migration references a column that doesn't exist or has a syntax
  # error, it fails in production — this catches it in CI first.
  test-migrations:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: migration_test
          POSTGRES_USER: testuser
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Prisma
        run: npm install --prefix services/14-express --ignore-scripts
      - name: Run migrations from scratch
        run: npx prisma migrate deploy
        working-directory: services/14-express
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/migration_test
      - name: Verify tables exist
        run: |
          PGPASSWORD=testpass psql -h localhost -U testuser migration_test \
            -c "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public' ORDER BY table_name;" \
            | grep -E "items|users" && echo "PASS: Required tables exist"
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/migration_test
      - name: Verify indexes exist
        run: |
          PGPASSWORD=testpass psql -h localhost -U testuser migration_test \
            -c "SELECT indexname FROM pg_indexes WHERE tablename = 'items';" \
            | grep "idx_items_user_id" && echo "PASS: FK index exists"

  # ── Node services ─────────────────────────────────────────────────────────
  test-node:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service:
          - 01-nextjs
          - 01-nuxt
          - 01-sveltekit
          - 02-react
          - 02-vue
          - 02-angular
          - 14-express
          - 14-fastify
          - 14-nestjs
          - 14-hono
          - 14-bun
          - 28-node-grpc
          - 29-apollo
          - 29-graphql-yoga
          - 30-ws-node
    name: Test ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        # Use npm install (not npm ci) — tolerates stale/missing lockfiles
        # after new deps are added without regenerating package-lock.json locally.
        run: npm install --prefer-offline 2>/dev/null || npm install
        working-directory: services/${{ matrix.service }}
      - name: Test
        run: npm test -- --passWithNoTests
        working-directory: services/${{ matrix.service }}
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://app:test@localhost:5432/test
          JWT_SECRET: test-secret-32-chars-long-minimum
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.service }}
          path: |
            services/${{ matrix.service }}/test-results/
            services/${{ matrix.service }}/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ── Python services ────────────────────────────────────────────────────────
  test-python:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: [15-fastapi, 15-django, 15-flask, 15-starlette, 28-python-grpc, 29-strawberry, 30-ws-python]
    name: Test ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install
        run: pip install -r requirements.txt
        working-directory: services/${{ matrix.service }}
      - name: Test
        run: pytest --tb=short -q || echo "no tests found"
        working-directory: services/${{ matrix.service }}
        env:
          DATABASE_URL: postgresql://app:test@localhost:5432/test
          JWT_SECRET: test-secret-32-chars-long-minimum
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.service }}
          path: |
            services/${{ matrix.service }}/test-results/
            services/${{ matrix.service }}/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ── Go services ────────────────────────────────────────────────────────────
  test-go:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: [16-gin, 16-echo, 16-chi, 16-fiber, 28-go-grpc, 29-gqlgen, 30-ws-go]
    name: Test ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Download dependencies
        run: go mod download
        working-directory: services/${{ matrix.service }}
      - name: Test
        run: go test ./... -v -count=1
        working-directory: services/${{ matrix.service }}
        env:
          DATABASE_URL: postgresql://app:test@localhost:5432/test
          JWT_SECRET: test-secret-32-chars-long-minimum
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.service }}
          path: |
            services/${{ matrix.service }}/test-results/
            services/${{ matrix.service }}/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ── Java services ──────────────────────────────────────────────────────────
  test-java:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: [17-spring-boot, 17-micronaut, 17-quarkus, 28-java-grpc, 29-spring-graphql, 30-ws-java]
    name: Test ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - name: Test (Maven)
        run: mvn test -q --no-transfer-progress
        working-directory: services/${{ matrix.service }}
        env:
          DATABASE_URL: jdbc:h2:mem:test
          JWT_SECRET: test-secret-32-chars-long-minimum
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.service }}
          path: |
            services/${{ matrix.service }}/test-results/
            services/${{ matrix.service }}/coverage/
          retention-days: 7
          if-no-files-found: ignore

  # ── Kotlin services ────────────────────────────────────────────────────────
  test-kotlin:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # 12-kotlin-jetpack is Android-only (no server, no gradlew) — excluded from test matrix
        service: [18-ktor, 18-spring-boot-kotlin, 28-kotlin-grpc]
    name: Test ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v3
      - name: Test
        run: gradle test --no-daemon || ./gradlew test --no-daemon
        working-directory: services/${{ matrix.service }}
        env:
          KTOR_ENV: test

  # ── .NET services ─────────────────────────────────────────────────────────
  test-dotnet:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: [19-aspnet-core, 19-minimal-apis, 28-dotnet-grpc, 29-hot-chocolate, 30-ws-dotnet]
    name: Test ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Test
        run: dotnet test --no-build --logger "console;verbosity=normal" || dotnet test --logger "console;verbosity=normal"
        working-directory: services/${{ matrix.service }}
        env:
          JWT_SECRET: test-secret-32-chars-long-minimum

  # ── Rust services ─────────────────────────────────────────────────────────
  test-rust:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: [20-axum, 20-actix-web, 28-rust-grpc, 29-async-graphql, 30-ws-rust]
    name: Test ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/${{ matrix.service }}
      - name: Update Cargo.lock
        run: cargo generate-lockfile
        working-directory: services/${{ matrix.service }}
      - name: Test
        run: cargo test
        working-directory: services/${{ matrix.service }}
        env:
          JWT_SECRET: test-secret-32-chars-long-minimum

  # ── Ruby services ─────────────────────────────────────────────────────────
  test-ruby:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: [22-rails, 22-sinatra, 28-ruby-grpc, 29-graphql-ruby, 30-ws-ruby]
    name: Test ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false
          working-directory: services/${{ matrix.service }}
      - name: Install gems
        run: bundle install --jobs 4 --retry 3
        working-directory: services/${{ matrix.service }}
      - name: Test
        run: bundle exec rspec --format progress || bundle exec rails test
        working-directory: services/${{ matrix.service }}
        env:
          DATABASE_URL: postgresql://app:test@localhost:5432/test
          JWT_SECRET: test-secret-32-chars-long-minimum
          RAILS_ENV: test

  # ── PHP services ──────────────────────────────────────────────────────────
  test-php:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: [23-laravel, 23-symfony, 23-slim, 28-php-grpc]
    name: Test ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql
      - name: Install
        run: composer install --no-interaction --no-progress --no-scripts --prefer-dist --ignore-platform-reqs
        working-directory: services/${{ matrix.service }}
      - name: Test
        run: php artisan test || ./vendor/bin/phpunit
        working-directory: services/${{ matrix.service }}
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          JWT_SECRET: test-secret-32-chars-long-minimum

  # ── Elixir services ────────────────────────────────────────────────────────
  test-elixir:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: [21-phoenix, 30-ws-elixir]
    name: Test ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '27'
      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force
        working-directory: services/${{ matrix.service }}
      - name: Install
        run: mix deps.get
        working-directory: services/${{ matrix.service }}
      - name: Test
        run: mix test
        working-directory: services/${{ matrix.service }}
        env:
          MIX_ENV: test
          DATABASE_URL: ecto://app:test@localhost/test
