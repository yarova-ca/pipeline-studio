---
# Root system entity for pipeline-studio.
# Backstage reads this to register the platform as a System in the catalog.
apiVersion: backstage.io/v1alpha1
kind: Domain
metadata:
  name: platform
  title: Platform Engineering
  description: >
    Yarova platform engineering domain —
    service starters, CI/CD templates, compliance profiles.
  namespace: default
  tags:
    - platform-engineering
    - devops
    - devsecops
  annotations:
    github.com/project-slug: yarova-ca/pipeline-studio
spec:
  owner: group:platform-team

---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: pipeline-platform
  title: Pipeline Studio
  description: >
    Platform engineering reference — 106 service starters across 30 framework
    categories, 17 documentation pages, and full compliance profiles for
    FIPS, HIPAA, PIPEDA, PCI-DSS, FedRAMP, and SOC 2.
  namespace: default
  tags:
    - platform-engineering
    - devops
    - devsecops
    - service-catalog
  links:
    - url: https://github.com/yarova-ca/pipeline-studio
      title: GitHub Repository
      icon: github
    - url: https://github.com/yarova-ca/pipeline-studio/blob/main/index.html
      title: Documentation Index
      icon: docs
  annotations:
    github.com/project-slug: yarova-ca/pipeline-studio
    backstage.io/techdocs-ref: url:https://github.com/yarova-ca/pipeline-studio/tree/main
spec:
  owner: group:platform-team
  domain: platform
