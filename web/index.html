<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pipeline Studio — Blueprint Navigator</title>
<style>
  :root {
    --black: #0E0F11; --surface: #16171A; --surface2: #1d1f23;
    --bone: #F4F3EF; --muted: #9aa0a6; --line: #2a2d31;
    --teal: #19C8A8; --lime: #C6F24E;
    --green: #19C8A8; --amber: #e8b339; --red: #e8615a;
    --grad: linear-gradient(90deg, #19C8A8 0%, #C6F24E 100%);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--black); color: var(--bone);
    font-family: Outfit, "Helvetica Neue", Arial, sans-serif; font-size: 15px;
  }
  a { color: var(--teal); text-decoration: none; }
  code, .mono { font-family: "Geist Mono", ui-monospace, Menlo, monospace; }

  header {
    position: sticky; top: 0; z-index: 50; background: rgba(14,15,17,.92);
    backdrop-filter: blur(8px); border-bottom: 1px solid var(--line);
    padding: 12px 20px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .ring { width: 22px; height: 22px; border-radius: 50%;
    border: 3px solid transparent;
    background: var(--grad) border-box; -webkit-mask:
      linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    border-bottom-color: transparent; transform: rotate(-45deg); }
  .brand b { font-weight: 700; font-size: 17px; }
  .grad-text { background: var(--grad); -webkit-background-clip: text;
    background-clip: text; color: transparent; }
  nav.tabs { display: flex; gap: 4px; }
  nav.tabs button { background: none; border: 1px solid var(--line); color: var(--muted);
    padding: 6px 12px; border-radius: 7px; cursor: pointer; font: inherit; font-size: 13px; }
  nav.tabs button.active { color: var(--black); background: var(--grad); border-color: transparent; font-weight: 600; }
  .lensbar { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  select, .btn {
    background: var(--surface2); color: var(--bone); border: 1px solid var(--line);
    border-radius: 7px; padding: 6px 10px; font: inherit; font-size: 13px; cursor: pointer;
  }
  main { padding: 22px; max-width: 1500px; margin: 0 auto; }

  h1 { font-size: 26px; margin: 0 0 4px; }
  h2 { font-size: 19px; margin: 26px 0 10px; }
  .sub { color: var(--muted); margin: 0 0 18px; }

  /* Home */
  .cards { display: grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap: 16px; margin-top: 18px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    padding: 22px; cursor: pointer; transition: border-color .15s, transform .1s; }
  .card:hover { border-color: var(--teal); transform: translateY(-2px); }
  .card h3 { margin: 0 0 6px; font-size: 18px; }
  .card p { color: var(--muted); margin: 0; font-size: 14px; }
  .legend { display: flex; gap: 18px; margin: 16px 0; flex-wrap: wrap; font-size: 13px; color: var(--muted); }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .dot.g { background: var(--green); } .dot.a { background: var(--amber); } .dot.r { background: var(--red); }

  /* Map */
  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .counter { color: var(--muted); font-size: 13px; }
  .gridwrap { overflow: auto; border: 1px solid var(--line); border-radius: 12px; max-height: 74vh; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }
  thead th { position: sticky; top: 0; background: var(--surface2); cursor: pointer; z-index: 2; }
  tbody tr:hover { background: var(--surface); }
  td.svc { cursor: pointer; font-weight: 600; }
  td.svc:hover { color: var(--teal); }
  .cell { padding: 2px 8px; border-radius: 6px; font-size: 12px; display: inline-block; }
  .cell.g { background: rgba(25,200,168,.13); color: var(--green); }
  .cell.a { background: rgba(232,179,57,.15); color: var(--amber); }
  .cell.r { background: rgba(232,97,90,.15); color: var(--red); }
  .pill { font-size: 11px; color: var(--muted); border: 1px solid var(--line); border-radius: 20px; padding: 1px 8px; margin-right: 4px; }

  /* Guided */
  .steps { display: flex; gap: 8px; margin-bottom: 18px; }
  .steps .s { flex: 1; height: 5px; border-radius: 3px; background: var(--surface2); }
  .steps .s.on { background: var(--grad); }
  .choices { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 12px; }
  .choice { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 18px; cursor: pointer; }
  .choice:hover { border-color: var(--teal); }
  .choice b { display: block; margin-bottom: 4px; }
  .choice span { color: var(--muted); font-size: 13px; }

  /* Bundle */
  .bundle-head { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; }
  .section { border: 1px solid var(--line); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
  .section > summary { padding: 14px 16px; cursor: pointer; font-weight: 600; list-style: none;
    display: flex; align-items: center; gap: 10px; background: var(--surface); }
  .section > summary::-webkit-details-marker { display: none; }
  .section > summary::before { content: "▸"; color: var(--teal); transition: transform .15s; }
  .section[open] > summary::before { transform: rotate(90deg); }
  .section .body { padding: 14px 16px; }
  .kv { display: grid; grid-template-columns: 180px 1fr; gap: 6px 14px; }
  .kv div.k { color: var(--muted); }
  .reason { color: var(--amber); font-size: 12px; margin-top: 2px; }
  .gap { color: var(--red); }
  .tag { background: var(--surface2); border: 1px solid var(--line); border-radius: 6px; padding: 2px 8px; margin: 0 4px 4px 0; display: inline-block; font-size: 12px; }
  .err { background: rgba(232,97,90,.12); border: 1px solid var(--red); color: var(--red);
    padding: 18px; border-radius: 12px; }
  footer { color: var(--muted); font-size: 12px; text-align: center; padding: 30px; }
</style>
</head>
<body>
<header>
  <div class="brand" onclick="go('#home')">
    <span class="ring"></span><b>pipeline studio</b>
  </div>
  <nav class="tabs" id="tabs">
    <button data-route="#map">Map</button>
    <button data-route="#guided">Guided</button>
    <button data-route="#home">Home</button>
  </nav>
  <div class="lensbar">
    <span style="color:var(--muted);font-size:13px">Lens:</span>
    <select id="lensIndustry"><option value="">Baseline (no industry)</option></select>
    <select id="lensCluster"><option value="">Cluster: auto</option></select>
  </div>
</header>
<main id="app"><p class="sub">Loading blueprint…</p></main>
<footer>Yarova · Pipeline Studio · Blueprint Navigator · one data file, three views, lenses on all.</footer>

<script>
let DATA = null, LENS = { industry: "", cluster: "" };
const $ = (s, r=document) => r.querySelector(s);
const el = (h) => { const t=document.createElement("template"); t.innerHTML=h.trim(); return t.content.firstChild; };
function go(hash){ location.hash = hash; }

// ── Bundle computation — the lens engine ────────────────────────────────────
function industryById(id){ return DATA.industries.find(i=>i.id===id) || null; }
function axisDefault(id){ const a=DATA.buildAxes.find(x=>x.id===id); return a?a.default:null; }

// Returns {value, state:'g'|'a'|'r', reason} for an axis under the active lens.
function resolveAxis(fw, axisId){
  let value = axisDefault(axisId);
  let state = "g", reason = "";
  const ind = industryById(LENS.industry);

  if (axisId === "COMPLIANCE") {
    if (ind) { value = ind.compliance.map(c=>DATA.compliance[c]?.label||c).join(" + ");
      state="a"; reason = `${ind.name} (${ind.vertical}) requires these regimes.`; }
    else value = "standard";
  }
  if (ind) {
    // a compliance regime can force other axes
    for (const c of ind.compliance) {
      const f = DATA.compliance[c]?.forces || {};
      if (f[axisId]) { value = f[axisId]; state="a"; reason = `Forced by ${DATA.compliance[c].label}.`; }
    }
  }
  // gaps: ORM/Auth/Obs unknown per-framework -> baseline default is a soft value, not a gap.
  if (value == null || value === "") { state="r"; value="not defined"; reason="Gap — not yet defined."; }
  return { value, state, reason };
}

function deployFor(fw){
  const ind = industryById(LENS.industry);
  let cluster = LENS.cluster || (ind ? ind.cluster : "");
  if (!cluster) return { value: "any (AKS/EKS/GKE/OpenShift)", state:"g", reason:"" };
  const c = DATA.clusters.find(x=>x.id===cluster);
  return { value: c?c.name:cluster, state: ind&&!LENS.cluster?"a":"g",
           reason: ind&&!LENS.cluster?`${ind.name} default cluster.`:"" };
}

// Map columns
const COLS = [
  { key:"ci",    label:"CI",            get:fw=>({value:"7 phases", state:"g", reason:""}) },
  { key:"comp",  label:"Compliance",    get:fw=>resolveAxis(fw,"COMPLIANCE") },
  { key:"deploy",label:"Deploy",        get:fw=>deployFor(fw) },
  { key:"auth",  label:"Auth",          get:fw=>resolveAxis(fw,"AUTH") },
  { key:"orm",   label:"ORM",           get:fw=>resolveAxis(fw,"ORM") },
  { key:"obs",   label:"Observability", get:fw=>resolveAxis(fw,"OBSERVABILITY") },
  { key:"rt",    label:"Runtime",       get:fw=>resolveAxis(fw,"RUNTIME") },
];

// ── Views ───────────────────────────────────────────────────────────────────
function viewHome(){
  const m = DATA.meta;
  return `
  <h1>Pipeline Studio — <span class="grad-text">one-stop clarity</span></h1>
  <p class="sub">${m.frameworkCount} frameworks · ${DATA.categories.length} categories ·
     ${DATA.industries.length} industries · ${DATA.buildAxes.length} build axes · ${Object.keys(DATA.compliance).length} compliance regimes.</p>
  <div class="legend">
    <span><span class="dot g"></span>baseline</span>
    <span><span class="dot a"></span>changed by lens (reason shown)</span>
    <span><span class="dot r"></span>gap — not yet defined</span>
  </div>
  <div class="cards">
    <div class="card" onclick="go('#map')"><h3>Explore the Map →</h3><p>Full visibility. Every framework, every axis, all at once. Filter + lens.</p></div>
    <div class="card" onclick="go('#guided')"><h3>Guided setup →</h3><p>Three clicks to your exact bundle. One decision per screen.</p></div>
    <div class="card" onclick="go('#map')"><h3>Browse a framework →</h3><p>Open the Map, click any service for its full depth.</p></div>
  </div>`;
}

let mapSort = { col:"id", dir:1 }, mapFilter = { category:"", language:"", q:"" };
function viewMap(){
  const cats = [...new Set(DATA.frameworks.map(f=>f.category))].sort();
  const langs = [...new Set(DATA.frameworks.map(f=>f.language))].sort();
  let rows = DATA.frameworks.filter(f =>
    (!mapFilter.category || f.category===mapFilter.category) &&
    (!mapFilter.language || f.language===mapFilter.language) &&
    (!mapFilter.q || f.name.toLowerCase().includes(mapFilter.q.toLowerCase()) || f.id.includes(mapFilter.q.toLowerCase())));
  rows.sort((a,b)=> (a[mapSort.col]>b[mapSort.col]?1:-1)*mapSort.dir);

  const head = `<tr><th onclick="sortMap('name')">Service</th><th onclick="sortMap('category')">Category</th>`+
    COLS.map(c=>`<th>${c.label}</th>`).join("")+`</tr>`;
  const body = rows.map(f=>{
    const cells = COLS.map(c=>{ const r=c.get(f);
      return `<td><span class="cell ${r.state}" title="${r.reason||''}">${r.value}</span></td>`; }).join("");
    return `<tr><td class="svc" onclick="go('#bundle/${f.id}')">${f.name}</td><td>${f.category}</td>${cells}</tr>`;
  }).join("");

  const ind = industryById(LENS.industry);
  const cov = ind ? `Lens: ${ind.name} — ${ind.compliance.map(c=>DATA.compliance[c].label).join(" + ")}` : "Baseline — no industry lens";
  return `
  <h1>Map</h1>
  <div class="toolbar">
    <select onchange="mapFilter.category=this.value;render()"><option value="">All categories</option>${cats.map(c=>`<option ${c===mapFilter.category?'selected':''}>${c}</option>`).join("")}</select>
    <select onchange="mapFilter.language=this.value;render()"><option value="">All languages</option>${langs.map(l=>`<option ${l===mapFilter.language?'selected':''}>${l}</option>`).join("")}</select>
    <input class="btn" placeholder="search…" value="${mapFilter.q}" oninput="mapFilter.q=this.value;render()" style="min-width:160px"/>
    <span class="counter">${rows.length} of ${DATA.frameworks.length} · ${cov}</span>
  </div>
  <div class="gridwrap"><table><thead>${head}</thead><tbody>${body||`<tr><td colspan="9" style="color:var(--muted);padding:20px">0 of ${DATA.frameworks.length} — widen filters.</td></tr>`}</tbody></table></div>`;
}
function sortMap(c){ mapSort.dir = (mapSort.col===c)? -mapSort.dir : 1; mapSort.col=c; render(); }

let guided = { step:1, category:"", framework:"" };
function viewGuided(){
  const bar = `<div class="steps">${[1,2,3].map(n=>`<div class="s ${guided.step>=n?'on':''}"></div>`).join("")}</div>`;
  if (guided.step===1){
    const cats = DATA.categories;
    return `${bar}<h1>Pick a category</h1><p class="sub">Step 1 of 3.</p>
      <div class="choices">${cats.map(c=>`<div class="choice" onclick="guided.category='${c.name}';guided.step=2;render()"><b>${c.name}</b><span>${DATA.frameworks.filter(f=>f.category===c.name).length} frameworks</span></div>`).join("")}</div>`;
  }
  if (guided.step===2){
    const fws = DATA.frameworks.filter(f=>f.category===guided.category);
    return `${bar}<h1>Pick a framework</h1><p class="sub">Step 2 of 3 · ${guided.category} · <a onclick="guided.step=1;render()">back</a></p>
      <div class="choices">${fws.map(f=>`<div class="choice" onclick="go('#bundle/${f.id}')"><b>${f.name}</b><span>${f.language} · ${f.pattern}</span></div>`).join("")}</div>`;
  }
  return "";
}

function kvRow(label, r){
  return `<div class="k">${label}</div><div><span class="cell ${r.state}">${r.value}</span>${r.reason?`<div class="reason">${r.reason}</div>`:""}</div>`;
}
function viewBundle(id){
  const fw = DATA.frameworks.find(f=>f.id===id);
  if (!fw) return `<div class="err">Framework "${id}" not found.</div>`;
  const ind = industryById(LENS.industry);
  const ctx = ind ? `${ind.name} (${ind.vertical}, ${ind.region})` : "Baseline (no industry)";
  const phases = DATA.pipeline.map(p=>`<div><b>Phase ${p.phase} — ${p.name}</b><br>${p.stages.map(s=>`<span class="tag">${s}</span>`).join("")}</div>`).join("<div style='height:8px'></div>");
  return `
  <div class="bundle-head">
    <h1>${fw.name}</h1>
    <span class="pill">${fw.category}</span><span class="pill">${fw.language}</span><span class="pill">${fw.pattern}</span>
    ${fw.port?`<span class="pill">:${fw.port}</span>`:""}
    <span class="counter">Lens: ${ctx}</span>
  </div>
  <details class="section" open><summary>Overview</summary><div class="body">
    <div class="kv">
      <div class="k">Language</div><div>${fw.language}</div>
      <div class="k">Pattern</div><div>${fw.pattern}</div>
      <div class="k">Port</div><div>${fw.port||"not applicable"}</div>
      <div class="k">Tier</div><div>${fw.tier}</div>
      <div class="k">Tags</div><div>${(fw.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}</div>
    </div></div></details>

  <details class="section"><summary>CI pipeline — ${DATA.pipeline.length} phases</summary><div class="body">${phases}</div></details>

  <details class="section"><summary>Build axes (under lens)</summary><div class="body"><div class="kv">
    ${DATA.buildAxes.map(a=>kvRow(a.id, resolveAxis(fw, a.id))).join("")}
  </div></div></details>

  <details class="section"><summary>Compliance</summary><div class="body"><div class="kv">
    ${kvRow("Regimes", resolveAxis(fw,"COMPLIANCE"))}
    ${ind?ind.compliance.map(c=>{const cc=DATA.compliance[c];return `<div class="k">${cc.label} forces</div><div>${Object.entries(cc.forces||{}).map(([k,v])=>`<span class="tag">${k}: ${v}</span>`).join("")||"—"}</div>`;}).join(""):'<div class="k">—</div><div>Pick an industry lens to see forced controls.</div>'}
  </div></div></details>

  <details class="section"><summary>Deploy</summary><div class="body"><div class="kv">
    ${kvRow("Cluster", deployFor(fw))}
    <div class="k">GitOps</div><div><span class="tag">Argo CD</span><span class="tag">Helm</span><span class="tag">Kustomize</span></div>
    <div class="k">Manifests</div><div>helm/ + kustomize/ ship in the repo</div>
  </div></div></details>

  <details class="section"><summary>Auth · ORM · Observability</summary><div class="body"><div class="kv">
    ${kvRow("Auth", resolveAxis(fw,"AUTH"))}
    ${kvRow("ORM", resolveAxis(fw,"ORM"))}
    ${kvRow("Observability", resolveAxis(fw,"OBSERVABILITY"))}
  </div></div></details>

  <details class="section"><summary>Integrations</summary><div class="body">
    <span class="gap">⚠️ Gap — external integrations (CRM, API gateway) not yet defined for this framework.</span>
  </div></details>

  <details class="section"><summary>Source + real code</summary><div class="body"><div class="kv">
    <div class="k">Repo</div><div><a href="${fw.repo}" target="_blank">${fw.repo}</a></div>
    <div class="k">Backstage</div><div><a href="${fw.catalogRef}" target="_blank">View in Backstage →</a></div>
  </div></div></details>`;
}

// ── Router ──────────────────────────────────────────────────────────────────
function render(){
  if (!DATA) return;
  const h = location.hash || "#home";
  const app = $("#app");
  $$("#tabs button").forEach(b=>b.classList.toggle("active", b.dataset.route===("#"+h.slice(1).split("/")[0])));
  if (h.startsWith("#bundle/")) app.innerHTML = viewBundle(h.split("/")[1]);
  else if (h==="#map") app.innerHTML = viewMap();
  else if (h==="#guided"){ if(guided.step>2)guided.step=1; app.innerHTML = viewGuided(); }
  else app.innerHTML = viewHome();
}
function $$(s,r=document){ return [...r.querySelectorAll(s)]; }

async function boot(){
  try {
    DATA = await (await fetch("data.json")).json();
  } catch(e){
    $("#app").innerHTML = `<div class="err">Blueprint data failed to load. Check data.json.<br><br>${e}</div>`; return;
  }
  // populate lens selectors
  const li = $("#lensIndustry");
  DATA.verticals.forEach(v=>{
    const og = el(`<optgroup label="${v}"></optgroup>`);
    DATA.industries.filter(i=>i.vertical===v).forEach(i=> og.appendChild(el(`<option value="${i.id}">${i.name}</option>`)));
    li.appendChild(og);
  });
  li.onchange = e=>{ LENS.industry=e.target.value; render(); };
  const lc = $("#lensCluster");
  DATA.clusters.forEach(c=> lc.appendChild(el(`<option value="${c.id}">Cluster: ${c.name}</option>`)));
  lc.onchange = e=>{ LENS.cluster=e.target.value; render(); };
  $$("#tabs button").forEach(b=> b.onclick=()=>go(b.dataset.route));
  window.addEventListener("hashchange", render);
  render();
}
boot();
</script>
</body>
</html>
