<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pipeline Studio — Flow Board</title>
<style>
  :root{--black:#0B0C0E;--surface:#15171A;--surface2:#1c1f23;--bone:#F4F3EF;--muted:#9aa0a6;--line:#2a2d31;
    --teal:#19C8A8;--lime:#C6F24E;--cyan:#38bdf8;--violet:#a78bfa;--green:#19C8A8;--blue:#60a5fa;
    --amber:#e8b339;--orange:#fb923c;--purple:#c084fc;--pink:#f472b6;--red:#e8615a;
    --grad:linear-gradient(90deg,#19C8A8,#C6F24E);}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(1200px 600px at 20% -10%,rgba(25,200,168,.08),transparent),var(--black);
    color:var(--bone);font-family:Outfit,"Helvetica Neue",Arial,sans-serif;font-size:14px;overflow:hidden}
  a{color:var(--teal);text-decoration:none}
  header{height:52px;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--line);
    background:rgba(11,12,14,.9);backdrop-filter:blur(8px)}
  .brand{display:flex;align-items:center;gap:9px;cursor:pointer}
  .ring{width:18px;height:18px;border-radius:50%;border:3px solid;border-color:var(--teal) var(--lime) var(--lime) var(--teal);border-bottom-color:transparent;transform:rotate(-45deg)}
  .brand b{font-weight:700}
  .lens{margin-left:auto;display:flex;gap:8px;align-items:center}
  select{background:var(--surface2);color:var(--bone);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font:inherit;font-size:12.5px}
  .legend{display:flex;gap:12px;font-size:11.5px;color:var(--muted)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}

  /* horizontal track */
  .track{height:calc(100vh - 52px);overflow-x:auto;overflow-y:hidden;display:flex;gap:0;scroll-snap-type:x proximity}
  .col{flex:0 0 340px;height:100%;display:flex;flex-direction:column;border-right:1px solid var(--line);scroll-snap-align:start;position:relative}
  .col.wide{flex-basis:520px}
  .colhead{padding:12px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface)}
  .colhead .n{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
  .colhead h2{margin:2px 0 0;font-size:17px}
  .colhead .bar{height:3px;border-radius:2px;margin-top:8px;background:var(--accent,var(--teal));box-shadow:0 0 12px var(--accent,var(--teal))}
  .colbody{padding:12px;overflow-y:auto;flex:1}
  .arrow{position:absolute;right:-11px;top:54px;z-index:3;color:var(--muted);font-size:18px}

  .card{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--accent,var(--line));
    border-radius:9px;padding:9px 11px;margin-bottom:9px;cursor:pointer;transition:transform .08s,border-color .12s}
  .card:hover{transform:translateY(-1px);border-color:var(--accent,var(--teal))}
  .card b{font-size:13.5px}
  .card .meta{color:var(--muted);font-size:11.5px;margin-top:2px}
  .grp{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:10px 0 6px}
  .chip{display:inline-block;font-size:11px;border:1px solid var(--line);border-radius:20px;padding:1px 9px;margin:0 4px 4px 0;color:var(--muted)}
  .state-on{border-color:var(--amber);color:var(--amber);box-shadow:0 0 8px rgba(232,179,57,.25)}
  .state-gap{border-color:var(--red);color:var(--red)}
  .state-keep{border-color:var(--green);color:var(--green)}

  /* cluster stack */
  .layer{border:1px solid var(--line);border-radius:10px;margin-bottom:10px;padding:8px 10px;background:linear-gradient(180deg,rgba(56,189,248,.06),transparent)}
  .layer h4{margin:0 0 6px;font-size:12.5px;color:var(--cyan)}
  .hub{text-align:center;margin:8px 0}
  .hub .node{display:inline-block;border:1px solid var(--purple);border-radius:8px;padding:4px 10px;color:var(--purple);box-shadow:0 0 12px rgba(192,132,252,.25)}
  .spokes{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap}
  .spoke{border:1px solid var(--teal);border-radius:8px;padding:4px 8px;color:var(--teal);font-size:12px}

  /* detail drawer */
  .drawer{position:fixed;top:0;right:0;height:100vh;width:min(560px,92vw);background:var(--surface);
    border-left:1px solid var(--line);box-shadow:-20px 0 60px rgba(0,0,0,.5);transform:translateX(100%);
    transition:transform .2s;overflow:auto;z-index:20}
  .drawer.open{transform:translateX(0)}
  .drawer .dh{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;gap:10px}
  .drawer .db{padding:16px 18px}
  .drawer h1{margin:0;font-size:20px}
  .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:20px}
  .kv{display:grid;grid-template-columns:160px 1fr;gap:6px 12px;font-size:13px}
  .kv .k{color:var(--muted)}
  .sub{color:var(--muted);font-size:12.5px}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:15}
  .scrim.on{opacity:1;pointer-events:auto}
  .err{padding:20px;color:var(--red)}
</style>
</head>
<body>
<header>
  <div class="brand" onclick="location.reload()"><span class="ring"></span><b>flow board</b></div>
  <div class="legend">
    <span><span class="dot" style="background:var(--green)"></span>stays</span>
    <span><span class="dot" style="background:var(--amber)"></span>required by lens</span>
    <span><span class="dot" style="background:var(--red)"></span>gap</span>
  </div>
  <div class="lens">
    <span class="sub">Lens:</span>
    <select id="lensV" aria-label="Industry vertical"><option value="">All industries</option></select>
    <span class="sub">·</span>
    <a href="blueprint.html">document</a> · <a href="/">navigator</a>
  </div>
</header>
<div class="track" id="track"><div class="err">Loading…</div></div>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"><div class="dh"><h1 id="dTitle"></h1><span class="x" onclick="closeDrawer()">✕</span></div><div class="db" id="dBody"></div></aside>

<script type="module">
let G=null, LENS={vertical:""};
const $=(s,r=document)=>r.querySelector(s);
const esc=(s)=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const by=(arr,k)=>{const m={};(arr||[]).forEach(x=>{(m[x[k]]||=[]).push(x)});return m;};
const idOf={};

// dimension accent colors
const CAT_COLOR=(cid)=>{const n=parseInt((cid||'').replace(/\D/g,''))||0;
  if(n<=8)return'var(--teal)'; if(n<=13)return'var(--violet)'; if(n<=27)return'var(--lime)'; return'var(--cyan)';};

function card(accent,title,meta,onclick){
  return `<div class="card" style="--accent:${accent}" onclick="${onclick}"><b>${esc(title)}</b>${meta?`<div class="meta">${esc(meta)}</div>`:''}</div>`;
}
function col(n,name,accent,bodyHtml,wide){
  return `<section class="col${wide?' wide':''}"><div class="colhead"><div class="n">${esc(n)}</div><h2>${esc(name)}</h2><div class="bar" style="--accent:${accent}"></div></div><div class="colbody">${bodyHtml}</div><div class="arrow">→</div></section>`;
}

// ── columns ──────────────────────────────────────────────────────────────────
function colFrameworks(){
  const cats=[...G.nodes.categories].sort((a,b)=>(parseInt(a.id.replace(/\D/g,''))||0)-(parseInt(b.id.replace(/\D/g,''))||0));
  const fwByCat=by(G.nodes.frameworks,'categoryId');
  let h='';
  for(const cat of cats){
    const fws=fwByCat[cat.id]||[]; if(!fws.length)continue;
    h+=`<div class="grp" style="color:${CAT_COLOR(cat.id)}">${esc(cat.name)}</div>`;
    for(const f of fws) h+=card(CAT_COLOR(cat.id),f.name,`${(f.languages||[f.languageId]).join('/')} · ${f.maturity||f.tier||''}`,`openFw('${f.id}')`);
  }
  return col('01 · catalog','Frameworks',`var(--teal)`,h);
}
function colPipeline(){
  const phases=G.nodes.phases||[], stages=G.nodes.stages||[];
  let h='';
  for(const p of phases){
    const st=stages.filter(s=>s.phaseId===p.id||(s.phase&&p.name&&s.phase.includes(p.name.split('—')[0].trim())));
    h+=`<div class="grp">${esc(p.name)}</div>`;
    for(const s of st){const dev=(s.type||'').toLowerCase().includes('sec');
      h+=card(dev?'var(--blue)':'var(--green)',s.name||s.label,`${s.type||''}${s.tool?' · '+s.tool:''}`,`openNode('stages','${s.id}')`);}
  }
  return col('02 · build','CI/CD Pipeline','var(--green)',h);
}
function colCompliance(){
  const profs=G.nodes.complianceProfiles||[];
  const req=requiredRegimes();
  let h='';
  for(const c of profs){
    const on=req.has((c.id||'').toLowerCase())||req.has((c.name||'').toLowerCase());
    const accent=on?'var(--amber)':'var(--line)';
    h+=`<div class="card" style="--accent:${accent}" onclick="openProfile('${c.id}')"><b>${esc(c.name)}</b> ${on?'<span class="chip state-on">required</span>':''}<div class="meta">${esc(c.fullName||'')}</div></div>`;
  }
  return col('03 · governance','Compliance — all 26','var(--amber)',h);
}
function colRegistry(){
  return col('04 · registry','Registry','var(--orange)',
    card('var(--orange)','GHCR — ghcr.io/yarova-ca','Build → push signed image (cosign)','')+
    `<div class="sub" style="margin-top:8px">Every main build pushes a signed image + SBOM. Tags: :latest, :sha, :sha-fips.</div>`);
}
function colGitops(){
  const g=G.nodes.gitopsTools||[];
  let h='';
  for(const t of g) h+=card('var(--purple)',t.name,`${t.role||''}${t.version?' · '+t.version:''}`,`openNode('gitopsTools','${t.id}')`);
  return col('05 · GitOps','GitOps — Helm + Kustomize','var(--purple)',h);
}
function colClusters(){
  const comps=[...(G.nodes.clusterComponents||[])].sort((a,b)=>(a.num||'').localeCompare(b.num||''));
  const layers=by(comps,'layer');
  const clusters=G.nodes.clusters||[];
  let h=`<div class="hub"><div class="node">Argo CD (hub)</div><div class="spokes">${clusters.map(c=>`<span class="spoke">${esc(c.name||c.id)}</span>`).join('')}</div><div class="sub" style="margin-top:6px">Hub-and-spoke: one controller → every cluster.</div></div>`;
  for(const [layer,cs] of Object.entries(layers)){
    h+=`<div class="layer"><h4>Layer — ${esc(layer)}</h4>${cs.map(c=>`<span class="chip" onclick="openNode('clusterComponents','${c.id}')" style="cursor:pointer">${esc(c.num)}. ${esc(c.name)}</span>`).join('')}</div>`;
  }
  return col('06 · runtime','Clusters — stacked, hub-and-spoke','var(--cyan)',h,true);
}
function colAxes(){
  const map=[['Auth','authDeep'],['ORM','ormDeep'],['Observability','observabilityDeep'],['Runtime','runtimeDeep']];
  const rq=LENS.vertical?(G.nodes.industryRequirements||[]).find(r=>r.id===LENS.vertical):null;
  let h='';
  for(const [label,node] of map){
    h+=`<div class="grp">${label}</div>`;
    for(const o of (G.nodes[node]||[])){
      let cls='';
      if(rq){const want=`${rq.requiredAuth||''} ${rq.requiredObservability||''}`.toLowerCase();
        if(label==='Auth'&&want.includes((o.id||'').replace('auth-','')))cls='state-on';
        if(label==='Observability'&&want.includes((o.name||'').toLowerCase()))cls='state-on';}
      h+=`<div class="card" style="--accent:var(--pink)" onclick="openDeep('${node}','${o.id}')"><b>${esc(o.name)}</b> ${cls?'<span class="chip '+cls+'">required</span>':''}<div class="meta">${esc((o.what||'').slice(0,70))}</div></div>`;
    }
  }
  return col('07 · platform','Auth · ORM · Observability · Runtime','var(--pink)',h,true);
}
function colIntegrations(){
  const ig=G.nodes.integrations||[];
  const list=LENS.vertical?ig.filter(g=>g.verticalId===LENS.vertical):ig;
  let h=LENS.vertical?'':'<div class="sub" style="margin-bottom:8px">Pick an industry to focus its integrations.</div>';
  for(const g of list) h+=card('var(--pink)',g.externalSystem,`${g.category} · auth ${g.authOption} · ${g.apiGateway}`,'');
  return col('08 · connect','Integrations','var(--pink)',h);
}

function requiredRegimes(){
  const s=new Set();
  if(!LENS.vertical)return s;
  const inds=(G.nodes.industries||[]).filter(i=>i.verticalId===LENS.vertical);
  for(const i of inds) for(const r of (i.mandatoryCompliance||[])) s.add(String(r).toLowerCase());
  const rq=(G.nodes.industryRequirements||[]).find(r=>r.id===LENS.vertical);
  if(rq) for(const r of (rq.mandatoryRegimes||[])) s.add(String(r).toLowerCase());
  // also match profile ids by keyword
  const out=new Set();
  for(const p of (G.nodes.complianceProfiles||[])){
    const hay=`${p.id} ${p.name} ${p.fullName}`.toLowerCase();
    for(const r of s){const kw=r.replace(/[^a-z0-9]/g,'').slice(0,5); if(kw&&hay.replace(/[^a-z0-9]/g,'').includes(kw)){out.add(p.id.toLowerCase());out.add(p.name.toLowerCase());}}
  }
  return out;
}

function renderBoard(){
  $("#track").innerHTML=[colFrameworks(),colPipeline(),colCompliance(),colRegistry(),colGitops(),colClusters(),colAxes(),colIntegrations()].join("");
}

// ── drawer detail ────────────────────────────────────────────────────────────
function openDrawer(title,bodyHtml){$("#dTitle").innerHTML=title;$("#dBody").innerHTML=bodyHtml;$("#drawer").classList.add("open");$("#scrim").classList.add("on");}
window.closeDrawer=()=>{$("#drawer").classList.remove("open");$("#scrim").classList.remove("on");};
function rowsFrom(obj,fields){return `<div class="kv">`+fields.map(([k,l])=>{const v=obj[k];if(!v)return'';
  const val=Array.isArray(v)?v.map(x=>`<span class="chip">${esc(x)}</span>`).join(''):
    (typeof v==='object'?Object.entries(v).map(([a,b])=>`<div><span class="sub">${esc(a)}:</span> ${esc(b)}</div>`).join(''):esc(v));
  return `<div class="k">${esc(l)}</div><div>${val}</div>`;}).join('')+`</div>`;}

window.openFw=(id)=>{const f=(G.nodes.frameworks||[]).find(x=>x.id===id);if(!f)return;
  openDrawer(esc(f.name),rowsFrom(f,[['version','Version'],['license','License'],['maintainedBy','Maintained by'],['maturity','Maturity'],['concurrency','Concurrency'],['memory','Memory'],['perf','Performance'],['throughput','Throughput'],['securityPosture','Security posture'],['scaling','Scaling'],['ecosystem','Ecosystem'],['pkgMgr','Package mgr'],['buildTool','Build tool'],['whenToUse','When to use'],['whenNot','When NOT'],['tradeoff','Trade-off']])+
    (f.repo?`<p class="sub" style="margin-top:10px">Repo: ${esc(f.repo)} (private) · <a href="${esc(f.catalogRef||'#')}" target="_blank">Backstage →</a></p>`:''));};
window.openProfile=(id)=>{const c=(G.nodes.complianceProfiles||[]).find(x=>x.id===id);if(!c)return;
  let h=rowsFrom(c,[['fullName','Full name'],['region','Region'],['regulator','Regulator'],['appliesToVerticals','Applies to'],['forces','Forces'],['requiredControls','Required controls'],['auditRetention','Audit retention'],['dataResidency','Data residency']]);
  if(c.howToMeet)h+=`<h3 style="margin-top:12px;color:var(--teal)">How to meet</h3><ul>${(Array.isArray(c.howToMeet)?c.howToMeet:[c.howToMeet]).map(s=>`<li>${esc(s)}</li>`).join('')}</ul>`;
  openDrawer(esc(c.name),h);};
window.openDeep=(node,id)=>{const o=(G.nodes[node]||[]).find(x=>x.id===id);if(!o)return;
  openDrawer(esc(o.name),rowsFrom(o,[['what','What'],['howItWorks','How it works'],['language','Language'],['baseOs','Base OS'],['sizeMb','Size MB'],['fipsCertified','FIPS certified'],['securityLevel','Security level'],['pillars','Pillars'],['cost','Cost'],['whenToPick','When to pick'],['whenNot','When NOT'],['tradeoffVs','Trade-off vs'],['complianceFit','Compliance fit'],['perIndustryNote','Per industry'],['perIndustryLevel','Per industry level'],['migrations','Migrations'],['implementation','Implementation']]));};
window.openNode=(node,id)=>{const o=(G.nodes[node]||[]).find(x=>x.id===id);if(!o)return;
  openDrawer(esc(o.name||o.label||id),rowsFrom(o,[['what','What'],['why','Why'],['role','Role'],['type','Type'],['tool','Tool'],['version','Version'],['installCommand','Install'],['verifyCommand','Verify'],['wiredTo','Wired to'],['license','License'],['appliesTo','Applies to'],['output','Output'],['whenToUse','When to use'],['whenNot','When NOT'],['primaryTradeoff','Trade-off']]));};

async function boot(){
  try{ G=await (await fetch("graph.json")).json(); }
  catch(e){ $("#track").innerHTML=`<div class="err">Could not load graph.json.<br>${e}</div>`; return; }
  // lens vertical options
  const lv=$("#lensV");
  for(const v of (G.nodes.verticals||[])){const o=document.createElement("option");o.value=v.id;o.textContent=v.name||v.id;lv.appendChild(o);}
  lv.onchange=e=>{LENS.vertical=e.target.value;renderBoard();};
  renderBoard();
}
boot();
</script>
</body>
</html>
