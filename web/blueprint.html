<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pipeline Studio — Master Blueprint</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{--black:#0E0F11;--surface:#16171A;--surface2:#1d1f23;--bone:#F4F3EF;--muted:#9aa0a6;
    --line:#2a2d31;--teal:#19C8A8;--lime:#C6F24E;--grad:linear-gradient(90deg,#19C8A8 0%,#C6F24E 100%);}
  *{box-sizing:border-box}
  body{margin:0;background:var(--black);color:var(--bone);font-family:Outfit,"Helvetica Neue",Arial,sans-serif;font-size:15px;line-height:1.55}
  a{color:var(--teal);text-decoration:none}
  /* layout: sticky sidebar + scrollable content */
  .wrap{display:grid;grid-template-columns:320px 1fr;min-height:100vh}
  aside{position:sticky;top:0;height:100vh;overflow:auto;border-right:1px solid var(--line);background:rgba(14,15,17,.96);padding:14px 10px}
  .brand{display:flex;align-items:center;gap:9px;padding:6px 8px 12px;cursor:pointer}
  .ring{width:20px;height:20px;border-radius:50%;border:3px solid;border-color:var(--teal) var(--lime) var(--lime) var(--teal);border-bottom-color:transparent;transform:rotate(-45deg)}
  .brand b{font-weight:700}
  #q{width:100%;background:var(--surface2);color:var(--bone);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font:inherit;font-size:13px;margin-bottom:10px}
  nav#toc a{display:block;color:var(--muted);font-size:12.5px;padding:3px 8px;border-radius:6px;border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  nav#toc a:hover{color:var(--bone);background:var(--surface)}
  nav#toc a.lvl1{color:var(--bone);font-weight:700;margin-top:10px;font-size:13.5px}
  nav#toc a.lvl2{padding-left:16px}
  nav#toc a.lvl3{padding-left:30px;color:var(--muted)}
  nav#toc a.active{border-left-color:var(--teal);color:var(--lime);background:var(--surface)}
  nav#toc a.hide{display:none}
  main{padding:30px 48px;max-width:1000px}
  .md h1{font-size:30px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;margin:34px 0 10px;border:0}
  .md h2{font-size:23px;margin:30px 0 12px;padding-top:10px;border-top:1px solid var(--line)}
  .md h3{font-size:18px;margin:22px 0 8px;color:var(--teal)}
  .md h4{font-size:15.5px;margin:16px 0 6px}
  .md h5{font-size:14px;margin:12px 0 4px;color:var(--muted)}
  .md p,.md li{color:var(--bone)}
  .md strong{color:var(--lime);font-weight:600}
  .md code{font-family:"Geist Mono",ui-monospace,Menlo,monospace;font-size:12.5px;background:var(--surface2);padding:1px 6px;border-radius:5px}
  .md pre{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px;overflow:auto}
  .md pre code{background:none;padding:0}
  .md table{border-collapse:collapse;width:100%;margin:12px 0;font-size:13px;display:block;overflow:auto}
  .md th,.md td{border:1px solid var(--line);padding:7px 10px;text-align:left}
  .md thead th{background:var(--surface2);position:sticky;top:0}
  .md hr{border:0;border-top:1px solid var(--line);margin:24px 0}
  .md blockquote{border-left:3px solid var(--teal);margin:10px 0;padding:2px 14px;color:var(--muted)}
  .topbar{position:sticky;top:0;background:rgba(14,15,17,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);padding:8px 48px;display:flex;gap:14px;align-items:center;font-size:12.5px;color:var(--muted);z-index:5}
  .err{background:rgba(232,97,90,.12);border:1px solid #e8615a;color:#e8615a;padding:18px;border-radius:12px}
  @media (max-width:820px){.wrap{grid-template-columns:1fr}aside{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}main{padding:18px}}
</style>
</head>
<body>
<div class="wrap">
  <aside>
    <div class="brand" onclick="scrollTo(0,0)"><span class="ring"></span><b>blueprint</b></div>
    <input id="q" placeholder="filter sections…" oninput="filterToc(this.value)" aria-label="Filter sections"/>
    <nav id="toc"></nav>
  </aside>
  <div>
    <div class="topbar">
      <span id="crumb">Master Blueprint</span>
      <span style="margin-left:auto"><a href="blueprint.md" download>download .md</a> · <a href="/">navigator →</a></span>
    </div>
    <main><div class="md" id="doc"><p>Loading blueprint…</p></div></main>
  </div>
</div>

<script>
const slug=(s)=>s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,80);
async function boot(){
  let md;
  try{ md=await (await fetch("blueprint.md")).text(); }
  catch(e){ document.getElementById("doc").innerHTML=`<div class="err">Could not load blueprint.md.<br>${e}</div>`; return; }
  // render markdown -> html
  const html=marked.parse(md);
  const doc=document.getElementById("doc");
  doc.innerHTML=html;
  // give every heading an id + build the TOC
  const toc=document.getElementById("toc");
  const seen={};
  doc.querySelectorAll("h1,h2,h3").forEach(h=>{
    let id=slug(h.textContent); if(seen[id])id+="-"+(++seen[id]); else seen[id]=1;
    h.id=id;
    const a=document.createElement("a");
    a.href="#"+id; a.textContent=h.textContent;
    a.className="lvl"+h.tagName[1];
    a.dataset.t=h.textContent.toLowerCase();
    toc.appendChild(a);
  });
  // scrollspy — highlight the section you are reading
  const links=[...toc.querySelectorAll("a")];
  const byId={}; links.forEach(a=>byId[a.getAttribute("href").slice(1)]=a);
  const obs=new IntersectionObserver((ents)=>{
    ents.forEach(e=>{ if(e.isIntersecting){
      links.forEach(a=>a.classList.remove("active"));
      const a=byId[e.target.id]; if(a){a.classList.add("active");
        document.getElementById("crumb").textContent=e.target.textContent.slice(0,80);
        a.scrollIntoView({block:"nearest"});}
    }});
  },{rootMargin:"0px 0px -80% 0px"});
  doc.querySelectorAll("h1,h2,h3").forEach(h=>obs.observe(h));
  // jump if URL has a hash
  if(location.hash){const t=document.getElementById(location.hash.slice(1)); if(t)t.scrollIntoView();}
}
function filterToc(v){
  v=v.toLowerCase().trim();
  document.querySelectorAll("#toc a").forEach(a=>{
    a.classList.toggle("hide", v && !a.dataset.t.includes(v));
  });
}
boot();
</script>
</body>
</html>
