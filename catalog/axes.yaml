  - { id: int-provincial-bcid, name: "BC Services Card / provincial IDP", category: identity, auth: oidc, verticals: [government-and-public-sector] }
  - { id: int-interac,      name: "Interac e-Transfer",     category: payments, auth: api-key, verticals: [financial-services, retail-and-commerce] }
  - { id: int-payments-canada, name: "Payments Canada (RTR)", category: payments, auth: mtls, verticals: [financial-services] }
  - { id: int-cra,          name: "CRA (Canada Revenue Agency) APIs", category: government, auth: oauth2, verticals: [financial-services, legal-and-professional-services] }
  - { id: int-canada-post,  name: "Canada Post (AddressComplete / shipping)", category: logistics, auth: api-key, verticals: [retail-and-commerce, transportation-and-logistics] }
  - { id: int-ohip-olis,    name: "Ontario OLIS / provincial health", category: health, auth: mtls, verticals: [healthcare-and-life-sciences] }
  - { id: int-fintrac-report, name: "FINTRAC reporting (FINTRAC API)", category: compliance, auth: mtls, verticals: [financial-services] }

