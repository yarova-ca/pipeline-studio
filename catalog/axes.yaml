# ════════════════════════════════════════════════════════════════════
# Yarova Platform — Canonical Axis Catalog
# ════════════════════════════════════════════════════════════════════
# What this is: the ONE source for every non-compliance decision axis.
# Who reads it: the studio (per-device filtering) + service generators.
# The law: add an option here once → it reaches all 22 services + the studio.
#
# Every option declares applies_to — the device types where it is valid.
# devices: backend, web-ssr, web-static, edge, mobile-app, mobile-bff, protocol
# ════════════════════════════════════════════════════════════════════

version: 1

# ── ORM / data layer — add the 6 languages the studio was missing ─────
# ORM = code that reads/writes the database.
orm:
  # existing (kept)
  - { id: orm-prisma,       name: Prisma,         languages: [ts, js],        applies_to: [backend, web-ssr, mobile-bff] }
  - { id: orm-typeorm,      name: TypeORM,        languages: [ts, js],        applies_to: [backend, web-ssr, mobile-bff] }
  - { id: orm-drizzle,      name: Drizzle ORM,    languages: [ts, js],        applies_to: [backend, web-ssr, edge, mobile-bff] }
  - { id: orm-sqlalchemy,   name: SQLAlchemy,     languages: [py],            applies_to: [backend, mobile-bff] }
  - { id: orm-tortoise,     name: Tortoise ORM,   languages: [py],            applies_to: [backend, mobile-bff] }
  - { id: orm-gorm,         name: GORM,           languages: [go],            applies_to: [backend, mobile-bff] }
  - { id: orm-ent,          name: Ent,            languages: [go],            applies_to: [backend, mobile-bff] }
  - { id: orm-sqlx,         name: sqlx,           languages: [go, rust],      applies_to: [backend, mobile-bff] }
  # ADDED — match the languages the 22 services actually use
  - { id: orm-jpa-hibernate, name: Spring Data JPA / Hibernate, languages: [java], applies_to: [backend, mobile-bff] }
  - { id: orm-exposed,      name: Exposed,        languages: [kotlin],        applies_to: [backend, mobile-bff] }
  - { id: orm-efcore,       name: EF Core,        languages: [csharp],        applies_to: [backend, mobile-bff] }
  - { id: orm-ecto,         name: Ecto,           languages: [elixir],        applies_to: [backend, mobile-bff] }
  - { id: orm-activerecord, name: ActiveRecord,   languages: [ruby],          applies_to: [backend, mobile-bff] }
  - { id: orm-eloquent,     name: Eloquent,       languages: [php],           applies_to: [backend, mobile-bff] }
  - { id: orm-none,         name: "none (raw SQL / no DB)", languages: [all],  applies_to: [backend, web-ssr, web-static, edge, mobile-app, mobile-bff, protocol] }

# ── Package managers — add NuGet, Mix, SwiftPM ────────────────────────
# package manager = installs and pins dependencies.
package_managers:
  - { id: npm,      name: npm,      languages: [ts, js], applies_to: [backend, web-ssr, web-static, edge, mobile-app, mobile-bff, protocol] }
  - { id: pnpm,     name: pnpm,     languages: [ts, js], applies_to: [backend, web-ssr, web-static, edge, mobile-app, mobile-bff, protocol] }
  - { id: yarn,     name: yarn,     languages: [ts, js], applies_to: [backend, web-ssr, web-static, edge, mobile-app, mobile-bff, protocol] }
  - { id: bun,      name: bun,      languages: [ts, js], applies_to: [backend, web-ssr, edge, mobile-bff] }
  - { id: pip,      name: pip,      languages: [py],     applies_to: [backend, mobile-bff] }
  - { id: poetry,   name: Poetry,   languages: [py],     applies_to: [backend, mobile-bff] }
  - { id: uv,       name: uv,       languages: [py],     applies_to: [backend, mobile-bff] }
  - { id: gomod,    name: Go modules, languages: [go],   applies_to: [backend, mobile-bff, protocol] }
  - { id: cargo,    name: Cargo,    languages: [rust],   applies_to: [backend, mobile-bff, protocol] }
  - { id: maven,    name: Maven,    languages: [java],   applies_to: [backend, mobile-bff] }
  - { id: gradle,   name: Gradle,   languages: [java, kotlin], applies_to: [backend, mobile-app, mobile-bff] }
  - { id: composer, name: Composer, languages: [php],    applies_to: [backend, mobile-bff] }
  - { id: bundler,  name: Bundler,  languages: [ruby],   applies_to: [backend, mobile-bff] }
  # ADDED
  - { id: nuget,    name: NuGet,    languages: [csharp], applies_to: [backend, mobile-bff] }
  - { id: mix,      name: Mix (Hex), languages: [elixir], applies_to: [backend, mobile-bff] }
  - { id: swiftpm,  name: Swift Package Manager, languages: [swift], applies_to: [backend, mobile-app] }

# ── Deploy targets — add edge + serverless + managed (was K8s only) ───
# deploy target = where the running container/app lives.
deploy_targets:
  # Kubernetes (existing)
  - { id: eks,       name: EKS,       kind: kubernetes, cloud: AWS,   applies_to: [backend, web-ssr, mobile-bff, protocol] }
  - { id: gke,       name: GKE,       kind: kubernetes, cloud: GCP,   applies_to: [backend, web-ssr, mobile-bff, protocol] }
  - { id: aks,       name: AKS,       kind: kubernetes, cloud: Azure, applies_to: [backend, web-ssr, mobile-bff, protocol] }
  - { id: openshift, name: OpenShift, kind: kubernetes, cloud: "Multi/on-prem", applies_to: [backend, web-ssr, mobile-bff, protocol] }
  # ADDED — edge
  - { id: cloudflare-workers, name: Cloudflare Workers, kind: edge, cloud: Cloudflare, applies_to: [edge, web-static] }
  # ADDED — serverless
  - { id: aws-lambda, name: AWS Lambda,   kind: serverless, cloud: AWS, applies_to: [backend, mobile-bff, protocol] }
  - { id: gcp-cloud-run, name: Google Cloud Run, kind: managed-container, cloud: GCP, applies_to: [backend, web-ssr, mobile-bff, protocol] }
  - { id: aws-ecs-fargate, name: AWS ECS Fargate, kind: managed-container, cloud: AWS, applies_to: [backend, web-ssr, mobile-bff, protocol] }
  # ADDED — frontend hosting
  - { id: vercel,  name: Vercel,  kind: frontend-host, cloud: Vercel,  applies_to: [web-ssr, web-static] }
  - { id: netlify, name: Netlify, kind: frontend-host, cloud: Netlify, applies_to: [web-ssr, web-static] }
  # ADDED — mobile distribution (the "deploy target" for an app binary)
  - { id: app-stores, name: App Store + Google Play, kind: app-store, cloud: "Apple/Google", applies_to: [mobile-app] }

# ── Auth — add PKCE (mobile) + passkeys/WebAuthn ──────────────────────
# auth = who is allowed in, and how they prove it.
auth:
  - { id: auth-none,        name: "None (anonymous)",       applies_to: [backend, web-ssr, web-static, edge, mobile-app, mobile-bff, protocol] }
  - { id: auth-jwt,         name: "JWT (bearer token)",     applies_to: [backend, web-ssr, edge, mobile-bff, protocol] }
  - { id: auth-oauth2,      name: "OAuth 2.1",              applies_to: [backend, web-ssr, mobile-bff] }
  - { id: auth-apikey,      name: "API key",                applies_to: [backend, edge, protocol] }
  - { id: auth-oauth2-mfa,  name: "OAuth 2.1 + MFA",        applies_to: [backend, web-ssr, mobile-bff] }
  - { id: auth-mtls,        name: "Mutual TLS (mTLS)",      applies_to: [backend, mobile-bff, protocol] }
  - { id: auth-saml,        name: "SAML 2.0",               applies_to: [backend, web-ssr, mobile-bff] }
  - { id: auth-oidc,        name: "OpenID Connect (OIDC)",  applies_to: [backend, web-ssr, mobile-bff] }
  # ADDED
  - { id: auth-oauth2-pkce, name: "OAuth 2.1 + PKCE",       applies_to: [mobile-app, web-static], note: "PKCE = proof-key for public clients (no secret)" }
  - { id: auth-passkeys,    name: "Passkeys / WebAuthn",    applies_to: [web-ssr, web-static, mobile-app], note: "passwordless device-bound login" }
  - { id: auth-all,         name: "Layered (defense-in-depth)", applies_to: [backend, web-ssr, mobile-bff] }

# ── Observability — add mobile RUM + edge logs ────────────────────────
# observability = how you see what the running app is doing.
observability:
  - { id: observability-none,          name: "None",                  applies_to: [backend, web-ssr, web-static, edge, mobile-app, mobile-bff, protocol] }
  - { id: observability-otel,          name: "OpenTelemetry (OTel)",  applies_to: [backend, web-ssr, edge, mobile-bff, protocol] }
  - { id: observability-prometheus,    name: "Prometheus",            applies_to: [backend, web-ssr, mobile-bff, protocol] }
  - { id: observability-datadog,       name: "Datadog",               applies_to: [backend, web-ssr, mobile-bff, protocol] }
  - { id: observability-grafana-stack, name: "Grafana stack (LGTM)",  applies_to: [backend, web-ssr, mobile-bff, protocol] }
  - { id: observability-elastic,       name: "Elastic (ELK)",         applies_to: [backend, web-ssr, mobile-bff, protocol] }
  # ADDED
  - { id: observability-mobile-rum,    name: "Mobile RUM (Sentry / Crashlytics)", applies_to: [mobile-app], note: "RUM = real-user monitoring: crashes + in-app perf" }
  - { id: observability-edge-analytics, name: "Edge analytics + Workers logs",    applies_to: [edge], note: "Cloudflare Workers logs + analytics engine" }

