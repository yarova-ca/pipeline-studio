# ExternalDNS: auto-creates DNS records in Route53/Cloud DNS when Ingress objects deploy.
# Without it: 105 services × 3 environments = 315 DNS records to create manually.
# Deploy: helm upgrade --install external-dns bitnami/external-dns -n external-dns --create-namespace -f infra/external-dns/values.yaml

provider: aws    # aws | google | azure | cloudflare

aws:
  region: us-east-1
  zoneType: public

txtOwnerId: pipeline-studio    # tag so ExternalDNS knows which records it manages

domainFilters:
  - yarova.ca    # only manage records in this domain

policy: upsert-only    # NEVER delete records automatically (human must delete)

sources:
  - ingress
  - service

serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: ""    # IRSA role with Route53 write access

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
