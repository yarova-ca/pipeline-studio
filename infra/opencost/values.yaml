# OpenCost: open-source Kubernetes cost monitoring.
# Shows cost per namespace, per service, per label — helps identify expensive services.
# Without it: AWS/GCP bill arrives monthly with no per-service breakdown.
# Deploy: helm upgrade --install opencost opencost/opencost -n opencost --create-namespace -f infra/opencost/values.yaml

opencost:
  exporter:
    defaultClusterId: pipeline-studio
  prometheus:
    internal:
      enabled: true
      serviceName: prometheus-operated
      namespaceName: monitoring
      port: 9090

  ui:
    enabled: true
    image:
      tag: latest

grafana:
  # Install OpenCost Grafana dashboard
  dashboards:
    enabled: true
    label: grafana_dashboard

serviceMonitor:
  enabled: true
  namespace: monitoring
