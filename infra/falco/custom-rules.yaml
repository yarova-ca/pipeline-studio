# Custom Falco rules for pipeline-studio.
# Falco rules: condition (when to alert) + output (alert message) + priority.

- rule: Unexpected outbound connection from service
  desc: A service pod is making an outbound connection to an unexpected port
  condition: >
    outbound and container and
    k8s.ns.name in (dev, staging, prod) and
    not (fd.sport in (443, 80, 5432, 6379, 4317, 4318, 9090, 53))
  output: >
    Unexpected outbound connection (ns=%k8s.ns.name pod=%k8s.pod.name
    container=%container.name command=%proc.cmdline connection=%fd.name)
  priority: WARNING
  tags: [network, pipeline-studio]

- rule: Shell spawned in service container
  desc: A shell was spawned inside a service container — likely an intrusion
  condition: >
    spawned_process and container and
    k8s.ns.name in (dev, staging, prod) and
    proc.name in (bash, sh, zsh, dash) and
    not proc.pname in (sh, bash)
  output: >
    Shell spawned in service container (ns=%k8s.ns.name pod=%k8s.pod.name
    shell=%proc.name parent=%proc.pname cmdline=%proc.cmdline)
  priority: CRITICAL
  tags: [shell, pipeline-studio]

- rule: Privilege escalation in service container
  desc: A process gained root privileges inside a service container
  condition: >
    evt.type=setuid and container and
    k8s.ns.name in (dev, staging, prod) and
    user.uid != 0 and thread.uid = 0
  output: >
    Privilege escalation (ns=%k8s.ns.name pod=%k8s.pod.name command=%proc.cmdline)
  priority: CRITICAL
  tags: [privilege_escalation, pipeline-studio]

- rule: Write to /etc in service container
  desc: A process wrote to /etc — possible credential tampering
  condition: >
    open_write and container and
    k8s.ns.name in (dev, staging, prod) and
    fd.name startswith /etc
  output: >
    Write to /etc in container (ns=%k8s.ns.name pod=%k8s.pod.name
    file=%fd.name command=%proc.cmdline)
  priority: ERROR
  tags: [filesystem, pipeline-studio]
