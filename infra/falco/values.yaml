# Falco: runtime security — monitors kernel syscalls via eBPF, alerts on attacks.
# eBPF: kernel-level monitoring without a loadable kernel module (safer, no reboot).
# Kyverno: blocks BAD CONFIG before pods start. Falco: catches ATTACKS during runtime.
# Deploy: helm upgrade --install falco falcosecurity/falco -n falco --create-namespace -f infra/falco/values.yaml

falco:
  driver:
    kind: ebpf
  grpc:
    enabled: true
  grpcOutput:
    enabled: true

  rules_file:
    - /etc/falco/falco_rules.yaml
    - /etc/falco/k8s_audit_rules.yaml
    - /etc/falco/rules.d/custom-rules.yaml

falcosidekick:
  enabled: true
  webui:
    enabled: true
  config:
    slack:
      webhookurl: ""       # set via External Secret
      minimumpriority: warning
    pagerduty:
      routingKey: ""       # set via External Secret
      minimumpriority: critical
    prometheus:
      hostport: http://prometheus-operated.monitoring:9090

tolerations:
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule
