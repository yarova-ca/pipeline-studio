apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 17-spring-boot
  namespace: argocd
spec:
  project: pipeline-platform
  source:
    repoURL: https://github.com/yarova-ca/pipeline-studio
    targetRevision: main
    path: services/17-spring-boot/helm
    helm:
      valueFiles:
        - values.yaml
        - values.dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
