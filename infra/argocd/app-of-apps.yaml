apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pipeline-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # What: root application that manages all child Applications in infra/argocd/apps/.
    # Why: one sync operation brings the entire platform into the desired state.
spec:
  project: pipeline-platform
  source:
    repoURL: https://github.com/yarova-ca/pipeline-studio
    targetRevision: main
    path: infra/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      # prune: false - manual cleanup required: argocd app delete <name> --cascade
      # Enable prune: true for non-prod after verifying all services are registered
      prune: false    # CHANGED: was true — auto-deletion of running services is too destructive.
                      # When a service manifest is removed from Git, ArgoCD will warn but NOT delete it.
                      # To actually remove a service, run: argocd app delete <name> manually.
      selfHeal: true  # Self-heal: if someone manually edits a resource, ArgoCD restores the Git state.
    syncOptions:
      - CreateNamespace=true
