apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: pipeline-platform
  namespace: argocd
  annotations:
    # What: scopes all pipeline-studio Applications to specific namespaces and repos.
    # Why: prevents a misconfigured Application from deploying to the wrong cluster or namespace.
spec:
  description: Pipeline Studio — all service deployments
  sourceRepos:
    - 'https://github.com/yarova-ca/pipeline-studio'
  destinations:
    - namespace: dev
      server: https://kubernetes.default.svc
    - namespace: staging
      server: https://kubernetes.default.svc
    - namespace: prod
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceBlacklist:
    - group: ''
      kind: ResourceQuota
  roles:
    - name: read-only
      description: Read-only access for CI status checks
      policies:
        - p, proj:pipeline-platform:read-only, applications, get, pipeline-platform/*, allow
