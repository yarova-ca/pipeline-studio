# ArgoCD installation reference
#
# What: GitOps tool that watches this repo and auto-deploys changes to the cluster.
# Why: changes merged to main are deployed automatically — no manual kubectl apply.
#
# Step 1 — Create namespace (already in namespaces.yaml):
#   kubectl apply -f infra/namespaces.yaml
#
# Step 2 — Install ArgoCD:
#   kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
#
# Step 3 — Wait for ArgoCD to be ready:
#   kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=120s
#
# Step 4 — Apply the AppProject and app-of-apps:
#   kubectl apply -f infra/argocd/projects/pipeline-platform.yaml
#   kubectl apply -f infra/argocd/app-of-apps.yaml
#
# Step 5 — Get initial admin password:
#   kubectl get secret argocd-initial-admin-secret -n argocd -o jsonpath="{.data.password}" | base64 -d
#
# Step 6 — Port-forward the UI (optional):
#   kubectl port-forward svc/argocd-server -n argocd 8080:443
#   Open: https://localhost:8080
