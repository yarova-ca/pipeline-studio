# Post-sync smoke test — runs after ArgoCD deploys.
# Verifies the service is actually serving traffic before marking sync complete.
# Hook type: PostSync — runs after all resources are synced.
# Hook delete policy: HookSucceeded — clean up the Job after it passes.
apiVersion: batch/v1
kind: Job
metadata:
  name: smoke-test-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: smoke-test
          image: curlimages/curl:8.5.0
          command:
            - /bin/sh
            - -c
            - |
              set -e
              SERVICE=http://14-express.${NAMESPACE}.svc.cluster.local:3000

              echo "Testing /health/ready..."
              curl -sf ${SERVICE}/health/ready
              echo "Health check passed"

              echo "Testing /auth/dev/token..."
              TOKEN=$(curl -sf -X POST ${SERVICE}/auth/dev/token \
                -H "Content-Type: application/json" \
                -d '{"email":"smoke@test.internal","name":"Smoke Test"}' \
                | sed 's/.*"token":"\([^"]*\)".*/\1/')

              echo "Testing GET /users/me/items..."
              curl -sf ${SERVICE}/users/me/items \
                -H "Authorization: Bearer ${TOKEN}"
              echo "All smoke tests passed"
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
