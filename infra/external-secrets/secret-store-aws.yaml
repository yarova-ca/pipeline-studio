# SecretStore: connection config to AWS Secrets Manager.
# This is the cluster-level store — all namespaces can reference it.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # Auth via IAM Roles for Service Accounts (IRSA) — no static credentials
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets-system
