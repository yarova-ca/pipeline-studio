# ExternalSecret: pulls JWT_SECRET from AWS Secrets Manager into a K8s Secret.
# The K8s Secret is refreshed every 1 hour from the source of truth.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jwt-secret
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: jwt-secret          # Creates a K8s Secret named jwt-secret
    creationPolicy: Owner     # ESO owns this Secret; deletes it if ExternalSecret is deleted
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: prod/pipeline-studio/jwt-secret     # Path in AWS Secrets Manager
        property: value
