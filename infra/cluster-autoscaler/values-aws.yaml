autoDiscovery:
  clusterName: pipeline-studio-prod

awsRegion: us-east-1

rbac:
  serviceAccount:
    name: cluster-autoscaler
    annotations:
      # Replace YOUR_AWS_ACCOUNT_ID below with your AWS account ID
      # Find it: aws sts get-caller-identity --query Account --output text
      eks.amazonaws.com/role-arn: arn:aws:iam::YOUR_AWS_ACCOUNT_ID:role/cluster-autoscaler

extraArgs:
  scale-down-utilization-threshold: 0.5
  scale-down-delay-after-add: 5m
  scale-down-unneeded-time: 5m
  balance-similar-node-groups: true
  skip-nodes-with-system-pods: false
