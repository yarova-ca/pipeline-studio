# Helm values for ingress-nginx
#
# Chart: ingress-nginx/ingress-nginx
# Install:
#   helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#   helm repo update
#   helm install ingress-nginx ingress-nginx/ingress-nginx \
#     -n platform-system \
#     -f infra/ingress-nginx/values.yaml
#
# Upgrade:
#   helm upgrade ingress-nginx ingress-nginx/ingress-nginx \
#     -n platform-system \
#     -f infra/ingress-nginx/values.yaml

controller:
  # replicaCount: 2 — one replica per availability zone for HA.
  # Single-node clusters: reduce to 1 to avoid pending pods.
  replicaCount: 2

  config:
    # Forward client IP from load balancer X-Forwarded-For header.
    use-forwarded-headers: "true"
    # Max request body size — 10m covers pipeline manifest uploads.
    proxy-body-size: "10m"
    # Force HTTPS redirect on all HTTP ingress traffic.
    ssl-redirect: "true"

  metrics:
    # Expose Prometheus metrics at /metrics on port 10254.
    enabled: true
    serviceMonitor:
      # Auto-register a ServiceMonitor so kube-prometheus-stack scrapes it.
      # Requires prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues: false
      enabled: true
