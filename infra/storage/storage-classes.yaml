# StorageClass: tells Kubernetes HOW to provision persistent storage when a PVC is created.
# Without StorageClass: PVCs stay in Pending state — PostgreSQL and Redis never start.
# Apply: kubectl apply -f infra/storage/storage-classes.yaml
# Choose: only apply the StorageClass for your cloud provider.

---
# AWS EKS: gp3 (faster and cheaper than gp2, SSD-backed EBS)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
  throughput: "125"      # MiB/s baseline
  iops: "3000"           # IOPS baseline
reclaimPolicy: Retain    # do not delete disk when PVC is deleted
volumeBindingMode: WaitForFirstConsumer    # provision only when pod is scheduled
allowVolumeExpansion: true
---
# GKE: pd-ssd (Google Persistent Disk SSD)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast-gke
provisioner: pd.csi.storage.gke.io
parameters:
  type: pd-ssd
  disk-encryption-kms-key: ""    # optional: CMEK encryption
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
# AKS: Premium_LRS (Azure Premium SSD, locally redundant)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast-aks
provisioner: disk.csi.azure.com
parameters:
  skuName: Premium_LRS
  kind: Managed
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
