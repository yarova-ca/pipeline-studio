apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-non-root
  annotations:
    policies.kyverno.io/title: Require Non-Root Containers
    policies.kyverno.io/description: >-
      Containers must run as a non-root user (UID >= 1000).
      Why: root containers can escape to the host if the container runtime is compromised.
spec:
  validationFailureAction: enforce
  background: true
  rules:
    - name: check-runasnonroot
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [dev, staging, prod]
      validate:
        message: "Containers must set securityContext.runAsNonRoot: true and runAsUser >= 1000"
        # Why unconditional: the =(field) syntax means 'if this field exists, validate it'.
        # A pod without securityContext at all would PASS the old check — bypassing the policy entirely.
        # The fix: require securityContext to be present and correct, not optional.
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
            containers:
              - securityContext:
                  runAsNonRoot: true
                  runAsUser: ">=1000"
                  allowPrivilegeEscalation: false
