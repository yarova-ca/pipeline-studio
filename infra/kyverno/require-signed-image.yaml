apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-signed-image
  annotations:
    policies.kyverno.io/title: Require Signed Container Images
    policies.kyverno.io/description: >-
      Images from ghcr.io/yarova-ca must be signed with cosign.
      Why: unsigned images cannot be traced to a verified build — supply chain attack vector.
spec:
  validationFailureAction: enforce
  background: false
  rules:
    - name: verify-signature-and-attestation
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [dev, staging, prod]
      verifyImages:
        - imageReferences:
            - "ghcr.io/yarova-ca/*"
          # Verify the image was signed by the GitHub Actions workflow
          attestors:
            - entries:
                - keyless:
                    subject: "https://github.com/yarova-ca/pipeline-studio/.github/workflows/docker-build-push.yml@refs/heads/main"
                    issuer: "https://token.actions.githubusercontent.com"
          # Verify SBOM attestation exists (generated by syft in CI)
          attestations:
            - name: sbom
              predicateType: https://spdx.dev/Document/v2.3
              attestors:
                - entries:
                    - keyless:
                        subject: "https://github.com/yarova-ca/pipeline-studio/.github/workflows/docker-build-push.yml@refs/heads/main"
                        issuer: "https://token.actions.githubusercontent.com"
