apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-sbom-label
  annotations:
    policies.kyverno.io/title: Require SBOM Label on Production Images
    policies.kyverno.io/description: >-
      Production images from ghcr.io/yarova-ca must carry the
      org.opencontainers.image.revision label so the image can be traced
      back to a specific commit and SBOM artifact.
      Mode: audit (warn only) — enforced after all services ship the label.
spec:
  validationFailureAction: enforce  # CHANGED from audit — images without SBOM label blocked in staging+prod.
  background: true
  rules:
    - name: check-sbom-label
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: [staging, prod]
      validate:
        message: "Production images must have org.opencontainers.image.revision label"
        pattern:
          spec:
            containers:
              - (image): "ghcr.io/yarova-ca/*"
