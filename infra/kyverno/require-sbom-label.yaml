apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-sbom-label
  annotations:
    policies.kyverno.io/title: Require SBOM Label on Production Images
    policies.kyverno.io/description: >-
      Pods in staging and prod must carry the org.opencontainers.image.sbom
      label so each running pod can be traced back to its SBOM artifact.
      Mode: enforce — pods without the label are blocked at admission.
spec:
  validationFailureAction: enforce
  background: true
  rules:
    - name: require-sbom-label
      match:
        resources:
          kinds: ["Pod"]
      validate:
        message: "Pod must have org.opencontainers.image.sbom label"
        pattern:
          metadata:
            labels:
              org.opencontainers.image.sbom: "?*"
