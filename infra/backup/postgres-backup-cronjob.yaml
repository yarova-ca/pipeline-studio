# PostgreSQL backup CronJob — runs daily at 2 AM UTC.
# Backs up to S3 or GCS (parameterized via ConfigMap).
#
# Why daily: RPO (Recovery Point Objective) of 24 hours — acceptable for non-critical data.
# For RPO < 1 hour: also enable PITR via WAL archival (see postgres-wal-config.yaml).
#
# Retention: 30 daily + 4 weekly + 12 monthly backups.

apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: prod
  annotations:
    description: "Daily PostgreSQL backup to object storage. Failures alert to Slack."
spec:
  schedule: "0 2 * * *"    # 2 AM UTC daily
  timeZone: "UTC"
  concurrencyPolicy: Forbid  # Never run two backups simultaneously
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: postgres-backup-sa
          containers:
            - name: backup
              image: postgres:17-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: password
                - name: BACKUP_BUCKET
                  valueFrom:
                    configMapKeyRef:
                      name: backup-config
                      key: s3_bucket
                - name: PGHOST
                  value: "postgres-service"
                - name: PGUSER
                  value: "app"
                - name: PGDATABASE
                  value: "app"
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  FILENAME="backup-${TIMESTAMP}.sql.gz"

                  echo "Starting backup at ${TIMESTAMP}..."
                  pg_dump -h "${PGHOST}" -U "${PGUSER}" "${PGDATABASE}" \
                    | gzip \
                    > "/tmp/${FILENAME}"

                  # Upload to S3 (requires aws-cli or use gsutil for GCS)
                  # For GCS: gsutil cp "/tmp/${FILENAME}" "gs://${BACKUP_BUCKET}/${FILENAME}"
                  # For S3:  aws s3 cp "/tmp/${FILENAME}" "s3://${BACKUP_BUCKET}/${FILENAME}"
                  echo "Backup complete: ${FILENAME}"

                  # Cleanup old backups (keep last 30 days)
                  # aws s3 ls "s3://${BACKUP_BUCKET}/" | sort | head -n -30 | awk '{print $4}' | \
                  #   xargs -I{} aws s3 rm "s3://${BACKUP_BUCKET}/{}"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-config
  namespace: prod
data:
  s3_bucket: "yarova-pipeline-studio-backups"
  retention_days: "30"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-backup-sa
  namespace: prod
  annotations:
    # IAM role with s3:PutObject permission on the backup bucket
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/postgres-backup"
