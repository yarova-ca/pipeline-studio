# Wires Loki as a data source into Grafana — enables log searching from Grafana UI.
# Grafana sidecar auto-mounts this ConfigMap when label grafana_datasource=1.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        url: http://loki-gateway.monitoring:80
        access: proxy
        isDefault: false
        jsonData:
          maxLines: 1000
          derivedFields:
            - name: traceId
              matcherRegex: '"traceId":"(\w+)"'
              url: '$${__value.raw}'
              datasourceUid: tempo
