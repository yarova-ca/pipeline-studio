# Loki: log aggregation — receives structured JSON logs from all 105 services.
# Why Loki not Elasticsearch: Loki indexes only labels, not content = 10x cheaper storage.
# Promtail: DaemonSet agent installed on every node, ships pod logs to Loki.
# Deploy: helm upgrade --install loki grafana/loki-stack -n monitoring -f infra/loki/values.yaml

loki:
  enabled: true
  auth_enabled: false
  storage:
    type: s3
    s3:
      bucketnames: pipeline-studio-loki
      region: us-east-1
      insecure: false
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 720h
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    max_query_series: 10000

promtail:
  enabled: true
  config:
    clients:
      - url: http://loki-gateway.monitoring/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
        pipeline_stages:
          - json:
              expressions:
                level: level
                requestId: requestId
                traceId: traceId
                msg: message
          - labels:
              level:
              requestId:
              traceId:
