# Scheduled base backup — required for PITR to work.
# WAL archival is configured in cluster.yaml. This adds a nightly full base backup.
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: pipeline-postgres-nightly
  namespace: prod
spec:
  schedule: "0 2 * * *"    # 2 AM UTC
  cluster:
    name: pipeline-postgres
  backupOwnerReference: self
  immediate: false          # wait for schedule, don't backup immediately on create
