# ResourceQuota and LimitRange per namespace.
# ResourceQuota: caps the total resources all pods in a namespace can consume.
# Why: without it, one misbehaving service starves all others on the cluster.
# LimitRange: sets default requests/limits for containers that don't specify them.
# Why: prevents pods with no resource spec from running as unlimited (counts against quota as 0).

---
# ── Production ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: prod-quota
  namespace: prod
spec:
  hard:
    requests.cpu: "20"
    limits.cpu: "40"
    requests.memory: 40Gi
    limits.memory: 80Gi
    pods: "50"
    persistentvolumeclaims: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: prod-defaults
  namespace: prod
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 4Gi
---
# ── Staging (half prod) ───────────────────────────────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: staging-quota
  namespace: staging
spec:
  hard:
    requests.cpu: "10"
    limits.cpu: "20"
    requests.memory: 20Gi
    limits.memory: 40Gi
    pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: staging-defaults
  namespace: staging
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 128Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
---
# ── Dev (quarter prod) ────────────────────────────────────────────────────────
apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-quota
  namespace: dev
spec:
  hard:
    requests.cpu: "5"
    limits.cpu: "10"
    requests.memory: 10Gi
    limits.memory: 20Gi
    pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: dev-defaults
  namespace: dev
spec:
  limits:
    - type: Container
      default:
        cpu: 100m
        memory: 64Mi
      defaultRequest:
        cpu: 25m
        memory: 32Mi
