kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: prod
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "rohithvarmayadla",
          "password": "GITHUB_TOKEN_HERE",
          "auth": "BASE64_OF_USER_COLON_TOKEN"
        }
