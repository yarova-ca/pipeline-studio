# Alertmanager routes Prometheus alerts to notification channels.
# Without this config: alerts fire but nobody receives them — silent failures.
# Wired into kube-prometheus-stack via values.yaml alertmanager.config key.

alertmanager:
  config:
    global:
      resolve_timeout: 5m
      slack_api_url: ""    # override via External Secret

    templates:
      - '/etc/alertmanager/config/*.tmpl'

    route:
      receiver: slack-platform
      group_by: [alertname, namespace, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers:
            - severity=~"critical"
          receiver: pagerduty-oncall
          continue: true    # also send to Slack
        - matchers:
            - severity=~"warning"
          receiver: slack-platform

    receivers:
      - name: slack-platform
        slack_configs:
          - api_url: ""    # from External Secret: prod/pipeline-studio/alertmanager.slack_url
            channel: "#platform-alerts"
            send_resolved: true
            title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
            text: |
              *Severity:* {{ .CommonLabels.severity }}
              *Namespace:* {{ .CommonLabels.namespace }}
              *Summary:* {{ .CommonAnnotations.summary }}
              *Runbook:* {{ .CommonAnnotations.runbook }}

      - name: pagerduty-oncall
        pagerduty_configs:
          - routing_key: ""    # from External Secret
            description: '{{ .CommonAnnotations.summary }}'
            severity: '{{ .CommonLabels.severity }}'
            details:
              namespace: '{{ .CommonLabels.namespace }}'
              alertname: '{{ .CommonLabels.alertname }}'

    inhibit_rules:
      - source_matchers:
          - severity=critical
        target_matchers:
          - severity=warning
        equal: [alertname, namespace]
