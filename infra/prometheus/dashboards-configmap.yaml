apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-pipeline-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  # Dashboard JSON files are loaded from infra/prometheus/dashboards/.
  # To apply:
  #   kubectl create configmap grafana-pipeline-dashboards \
  #     --from-file=infra/prometheus/dashboards/ \
  #     -n monitoring \
  #     --dry-run=client -o yaml | kubectl apply -f -
  #
  # The grafana sidecar watches for ConfigMaps with label grafana_dashboard=1
  # and auto-loads them into the Pipeline Platform folder.
  #
  # Dashboards included:
  #   service-slo.json      — request rate, error rate, latency percentiles, DB query duration
  #   auth-audit.json       — auth event rates, failure rates, API key vs JWT split
  #   platform-health.json  — pod restarts, node CPU, memory utilization, PVC usage
  service-slo.json: |
    # Populated at deploy time via:
    # kubectl create configmap grafana-pipeline-dashboards --from-file=infra/prometheus/dashboards/ -n monitoring
  auth-audit.json: |
    # Populated at deploy time via:
    # kubectl create configmap grafana-pipeline-dashboards --from-file=infra/prometheus/dashboards/ -n monitoring
  platform-health.json: |
    # Populated at deploy time via:
    # kubectl create configmap grafana-pipeline-dashboards --from-file=infra/prometheus/dashboards/ -n monitoring
