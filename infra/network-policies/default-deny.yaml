# Default-deny-all: blocks ALL ingress and egress for every pod in the namespace.
# Why default-deny: if any service is compromised, attacker cannot pivot to other services.
# After applying: add explicit allow rules for each required communication path.
# Apply: kubectl apply -f infra/network-policies/ -n prod

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow: DNS — every pod needs to resolve hostnames
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: prod
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow: ingress from ingress-nginx controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-nginx
  namespace: prod
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
---
# Allow: services → PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-egress
  namespace: prod
spec:
  podSelector:
    matchLabels:
      needs-db: "true"
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: pipeline-postgres
      ports:
        - protocol: TCP
          port: 5432
---
# Allow: services → Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-egress
  namespace: prod
spec:
  podSelector:
    matchLabels:
      needs-cache: "true"
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379    # Redis Sentinel port
---
# Allow: services → monitoring (metrics scraping + OTel export)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-egress
  namespace: prod
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4318    # OTel HTTP
        - protocol: TCP
          port: 4317    # OTel gRPC
        - protocol: TCP
          port: 9090    # Prometheus
---
# Allow: HTTPS outbound (GitHub OAuth, external APIs)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: prod
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - ports:
        - protocol: TCP
          port: 443
