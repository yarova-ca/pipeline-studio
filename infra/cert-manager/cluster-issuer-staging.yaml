apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  annotations:
    # What: issues TLS certificates from Let's Encrypt staging CA.
    # Why: staging CA has higher rate limits — use for testing before switching to prod issuer.
    # Staging certs are NOT trusted by browsers — use only for cluster-internal validation.
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: rohith@yarova.ca
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - http01:
          ingress:
            class: nginx
