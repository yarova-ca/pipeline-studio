apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  annotations:
    # What: issues TLS certificates from Let's Encrypt production CA.
    # Why: production CA issues browser-trusted certs — use for all live-traffic Ingresses.
    # Rate limit: 50 certs per registered domain per week — do not use for testing.
    # Switch from staging: update Ingress annotation to cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: rohith@yarova.ca
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
