# Redis Sentinel: HA Redis with automatic failover.
# Used for: distributed JWT token blacklist, rate limiter state, session cache.
# Sentinel: Redis HA coordinator — promotes a replica to master automatically on failure.
# Why Sentinel not standalone: standalone Redis = single point of failure.
# Deploy: helm upgrade --install redis bitnami/redis -n prod -f infra/redis/values.yaml

architecture: replication

sentinel:
  enabled: true
  masterSet: mymaster
  quorum: 2              # 2 of 3 sentinel nodes must agree to promote a new master

auth:
  enabled: true
  existingSecret: redis-credentials
  existingSecretPasswordKey: password

master:
  persistence:
    enabled: true
    size: 10Gi
    storageClass: fast
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

replica:
  replicaCount: 2
  persistence:
    enabled: true
    size: 10Gi
    storageClass: fast

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
