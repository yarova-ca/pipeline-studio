# Tempo: distributed tracing backend — receives OTel spans, makes them browsable in Grafana.
# Why Tempo not Jaeger: Tempo uses S3 instead of Cassandra — no separate DB to operate.
# Services must set: OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo.monitoring:4318
# Deploy: helm upgrade --install tempo grafana/tempo -n monitoring -f infra/tempo/values.yaml

tempo:
  storage:
    trace:
      backend: s3
      s3:
        bucket: pipeline-studio-tempo
        endpoint: s3.amazonaws.com
        region: us-east-1
        insecure: false
  ingester:
    max_block_duration: 5m
  compactor:
    compaction:
      block_retention: 720h    # 30 days
  server:
    http_listen_port: 3100

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318    # HTTP/protobuf — used by all services
      grpc:
        endpoint: 0.0.0.0:4317    # gRPC — alternative

metricsGenerator:
  enabled: true    # generates service graph metrics for Grafana
  remoteWriteUrl: http://prometheus-operated.monitoring:9090/api/v1/write
