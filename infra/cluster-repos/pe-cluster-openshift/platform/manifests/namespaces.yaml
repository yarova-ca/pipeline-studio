# Application namespaces for spoke clusters.
# Labeled with pod-security enforcement so even non-OpenShift admission paths
# refuse privileged/root workloads (defence in depth alongside SCCs).
apiVersion: v1
kind: Namespace
metadata:
  name: dev
  labels:
    environment: dev
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: test
  labels:
    environment: test
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: prod
  labels:
    environment: prod
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
