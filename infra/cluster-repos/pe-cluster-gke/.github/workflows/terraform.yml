name: terraform

# Validates the GKE cluster Terraform: module + hub/dev/test/prod envs.
# fmt + init -backend=false + validate always run (no cloud creds needed).
# plan runs only when GCP Workload Identity Federation is configured (secret present).

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  id-token: write # required for GCP Workload Identity Federation

env:
  TF_VERSION: "1.14.5"

jobs:
  # ── fmt + validate: always runs, never needs cloud credentials ──────────────
  validate:
    name: fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt (check)
        run: terraform fmt -recursive -check -diff

      - name: validate module + each env
        run: |
          set -e
          for dir in terraform/modules/gke terraform/hub terraform/dev terraform/test terraform/prod; do
            echo "::group::validate $dir"
            terraform -chdir="$dir" init -backend=false -input=false -no-color
            terraform -chdir="$dir" validate -no-color
            echo "::endgroup::"
          done

  # ── plan: runs only when GCP creds secret exists. Never hard-fails. ─────────
  plan:
    name: plan (only if GCP creds present)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: check for GCP credentials
        id: creds
        run: |
          if [ -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "GCP_WORKLOAD_IDENTITY_PROVIDER not set — skipping plan (not a failure)."
          fi

      - uses: hashicorp/setup-terraform@v3
        if: steps.creds.outputs.present == 'true'
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: authenticate to GCP
        if: steps.creds.outputs.present == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: terraform plan per env
        if: steps.creds.outputs.present == 'true'
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_STATE_BUCKET: ${{ secrets.GCP_STATE_BUCKET }}
        run: |
          set -e
          for env in hub dev test prod; do
            echo "::group::plan $env"
            terraform -chdir="terraform/$env" init -input=false -no-color \
              -backend-config="bucket=${TF_STATE_BUCKET}" \
              -backend-config="prefix=clusters/$env"
            terraform -chdir="terraform/$env" plan -no-color -input=false
            echo "::endgroup::"
          done
