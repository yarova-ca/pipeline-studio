# Velero: backs up all Kubernetes resources (Deployments, Secrets, ConfigMaps, PVCs).
# postgres-backup-cronjob backs up the DB data. Velero backs up K8s OBJECTS.
# Without Velero: losing a cluster = losing all K8s configuration (not just data).
# Deploy: helm upgrade --install velero vmware-tanzu/velero -n velero --create-namespace -f infra/velero/values.yaml

configuration:
  provider: aws
  backupStorageLocation:
    provider: aws
    bucket: pipeline-studio-velero
    config:
      region: us-east-1
      kmsKeyId: ""    # optional: encrypt backups with KMS
  volumeSnapshotLocation:
    provider: aws
    config:
      region: us-east-1

credentials:
  useSecret: false    # use IRSA (pod identity) — no static credentials

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.9.0
    volumeMounts:
      - mountPath: /target
        name: plugins

metrics:
  enabled: true
  serviceMonitor:
    enabled: true    # Prometheus scrapes Velero backup metrics

serviceAccount:
  server:
    annotations:
      eks.amazonaws.com/role-arn: ""    # set to Velero IAM role ARN
