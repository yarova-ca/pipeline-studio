# Daily backup at 3 AM UTC. Retains 30 days.
# Covers: dev, staging, prod namespaces + monitoring + argocd.
# Restore test: run quarterly — confirm actual restore works.
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: daily-full-backup
  namespace: velero
spec:
  schedule: "0 3 * * *"
  useOwnerReferencesInBackup: false
  template:
    includedNamespaces:
      - dev
      - staging
      - prod
      - monitoring
      - argocd
      - external-secrets-system
      - kyverno-system
    storageLocation: default
    volumeSnapshotLocations:
      - default
    ttl: 720h0m0s
    snapshotVolumes: true
    defaultVolumesToFsBackup: false
