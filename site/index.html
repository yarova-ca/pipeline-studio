<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Yarova Studio</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--black:#0B0C0E;--surface:#15171A;--surface2:#1c1f23;--bone:#F4F3EF;--muted:#9aa0a6;--line:#2a2d31;
    --teal:#19C8A8;--lime:#C6F24E;--cyan:#38bdf8;--violet:#a78bfa;--green:#19C8A8;--blue:#60a5fa;
    --amber:#e8b339;--orange:#fb923c;--purple:#c084fc;--pink:#f472b6;--red:#e8615a;
    --grad:linear-gradient(90deg,#19C8A8,#C6F24E);}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(1200px 600px at 20% -10%,rgba(25,200,168,.08),transparent),var(--black);
    color:var(--bone);font-family:Outfit,"Helvetica Neue",Arial,sans-serif;font-size:14px;overflow:hidden}
  a{color:var(--teal);text-decoration:none}
  /* header */
  header{height:50px;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--line);
    background:rgba(11,12,14,.92);backdrop-filter:blur(8px);position:relative;z-index:6}
  .brand{display:flex;align-items:center;gap:9px;cursor:pointer}
  .ring{width:18px;height:18px;border-radius:50%;border:3px solid;border-color:var(--teal) var(--lime) var(--lime) var(--teal);border-bottom-color:transparent;transform:rotate(-45deg)}
  .brand b{font-weight:700}
  .lens{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  select{background:var(--surface2);color:var(--bone);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font:inherit;font-size:12.5px}
  .legend{display:flex;gap:12px;font-size:11.5px;color:var(--muted)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
  /* journey stepper */
  .stepper{display:flex;align-items:center;gap:0;height:34px;padding:0 12px;border-bottom:1px solid var(--line);
    background:rgba(11,12,14,.85);overflow-x:auto;white-space:nowrap;position:relative;z-index:5}
  .step{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);cursor:pointer;
    padding:2px 9px;border-radius:20px;border:1px solid transparent}
  .step .num{width:16px;height:16px;border-radius:50%;border:1px solid var(--line);display:inline-flex;
    align-items:center;justify-content:center;font-size:10px}
  .step:hover{color:var(--bone)}
  .step.active{color:var(--bone);border-color:var(--accent,var(--teal))}
  .step.active .num{border-color:var(--accent,var(--teal));color:var(--accent,var(--teal))}
  .step .sep{color:#3a3d42;margin:0 2px}
  /* lens info banner */
  .lensinfo{display:none;padding:7px 16px;border-bottom:1px solid var(--line);background:rgba(232,179,57,.06);
    font-size:12px;color:var(--bone);gap:14px;align-items:center;flex-wrap:wrap;position:relative;z-index:5}
  .lensinfo.on{display:flex}
  .lensinfo b{color:var(--amber)}
  .lensinfo .pill{border:1px solid var(--line);border-radius:20px;padding:1px 9px;color:var(--muted);font-size:11px}

  /* horizontal track */
  .track{height:calc(100vh - 50px - 34px);overflow-x:auto;overflow-y:hidden;display:flex;gap:0;scroll-snap-type:x mandatory}
  .track.lensed{height:calc(100vh - 50px - 34px - 35px)}
  .col{flex:0 0 360px;height:100%;display:flex;flex-direction:column;border-right:1px solid var(--line);scroll-snap-align:start;position:relative}
  .col.wide{flex-basis:560px}
  .colhead{padding:11px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface);z-index:2}
  .colhead .n{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
  .colhead h2{margin:2px 0 0;font-size:16px}
  .colhead .bar{height:3px;border-radius:2px;margin-top:7px;background:var(--accent,var(--teal));box-shadow:0 0 12px var(--accent,var(--teal))}
  .colhead .note{font-size:11px;color:var(--muted);margin-top:4px}
  .colbody{padding:12px;overflow-y:auto;flex:1}
  .arrow{position:absolute;right:-11px;top:52px;z-index:3;color:var(--muted);font-size:18px}

  .card{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--accent,var(--line));
    border-radius:9px;padding:9px 11px;margin-bottom:9px;cursor:pointer;transition:transform .08s,border-color .12s,opacity .12s}
  .card:hover{transform:translateY(-1px);border-color:var(--accent,var(--teal))}
  .card:focus-visible{outline:2px solid var(--lime);outline-offset:2px}
  .card b{font-size:13.5px}
  .card .meta{color:var(--muted);font-size:11.5px;margin-top:2px}
  .card.req{border-color:var(--amber);box-shadow:0 0 0 1px rgba(232,179,57,.4),0 0 14px rgba(232,179,57,.18)}
  .card.req b{color:var(--amber)}
  .card.stay{border-left-color:var(--green)}
  .card.dim{opacity:.34}
  .card.dim:hover{opacity:.7}
  .grp{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin:12px 0 6px}
  .chip{display:inline-block;font-size:11px;border:1px solid var(--line);border-radius:20px;padding:1px 9px;margin:0 4px 4px 0;color:var(--muted)}
  .chip.req{border-color:var(--amber);color:var(--amber)}
  .chip.gap{border-color:var(--red);color:var(--red)}
  .chip.keep{border-color:var(--green);color:var(--green)}
  .ic{font-weight:700;margin-right:4px}
  .ic.req{color:var(--amber)} .ic.gap{color:var(--red)} .ic.keep{color:var(--green)}

  /* cluster SVG + layered rail */
  .hubwrap{text-align:center;margin:4px 0 12px}
  .layer{border:1px solid var(--line);border-radius:10px;margin-bottom:10px;padding:8px 10px;background:linear-gradient(180deg,rgba(56,189,248,.06),transparent)}
  .layer h4{margin:0 0 6px;font-size:12.5px;color:var(--cyan)}

  /* detail drawer */
  .drawer{position:fixed;top:0;right:0;height:100vh;width:min(580px,94vw);background:var(--surface);
    border-left:1px solid var(--line);box-shadow:-20px 0 60px rgba(0,0,0,.5);transform:translateX(100%);
    transition:transform .2s;overflow:auto;z-index:30}
  .drawer.open{transform:translateX(0)}
  .drawer .dh{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;gap:10px;z-index:2}
  .drawer .db{padding:16px 18px 60px}
  .drawer h1{margin:0;font-size:19px}
  .drawer h3{color:var(--teal);font-size:13.5px;margin:16px 0 7px;text-transform:uppercase;letter-spacing:.06em}
  .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:22px;background:none;border:0;line-height:1}
  .x:focus-visible{outline:2px solid var(--lime)}
  .kv{display:grid;grid-template-columns:150px 1fr;gap:6px 12px;font-size:13px}
  .kv .k{color:var(--muted)}
  .sub{color:var(--muted);font-size:12.5px}
  .fail{border:1px solid var(--line);border-left:3px solid var(--red);border-radius:8px;padding:8px 10px;margin:7px 0}
  .fail .fk{color:var(--red);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  pre.cmd{background:var(--black);border:1px solid var(--line);border-radius:8px;padding:9px 11px;overflow:auto;font-size:12px;font-family:"Geist Mono",ui-monospace,Menlo,monospace;color:var(--lime);white-space:pre-wrap;margin:4px 0}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .2s;z-index:25}
  .scrim.on{opacity:1;pointer-events:auto}
  .err{padding:20px;color:var(--red)}
  .prov{font-size:10.5px;color:#6b7177;margin-top:6px}

  @media (max-width:760px){
    body{overflow:auto}
    header{height:auto;flex-wrap:wrap;padding:8px 12px;gap:8px}
    .lens{width:100%;margin-left:0}
    .stepper{display:none}
    .track,.track.lensed{height:auto;flex-direction:column;overflow:visible;scroll-snap-type:none}
    .col,.col.wide{flex-basis:auto;width:100%;height:auto;border-right:0;border-bottom:1px solid var(--line)}
    .colhead{position:static}
    .colbody{overflow:visible}
    .arrow{display:none}
    .kv{grid-template-columns:1fr}
  }

  /* ════════ 2026 premium design system (overrides) ════════ */
  :root{
    /* Yarova brand system — canonical (brand/BRAND-SYSTEM.md) */
    --bg0:#0E0F11;--bg1:#13151B;--panel:rgba(28,31,40,.55);--glass:rgba(244,243,239,.04);
    --hair:rgba(244,243,239,.10);--hair2:rgba(244,243,239,.16);
    --ink:#F4F3EF;--ink2:rgba(244,243,239,.62);--ink3:rgba(244,243,239,.55);
    --rad:16px;--ease:cubic-bezier(.22,1,.36,1);
    /* every accent rides the teal→lime line; gold = scarcity/required only */
    --black:#0E0F11;--bone:#F4F3EF;--teal:#19C8A8;--lime:#C6F24E;
    --green:#19C8A8;--cyan:#44D292;--violet:#5AD886;--blue:#70DD7B;--purple:#85E270;--pink:#9BE864;--orange:#B0ED59;
    --amber:#FFB800;--gold:#FFB800;--red:#FFB800;
    --surface:#1C1F28;--surface2:#252A36;--line:rgba(244,243,239,.10);
    --grad:linear-gradient(135deg,#19C8A8 0%,#C6F24E 100%);
    --fdisplay:"Bricolage Grotesque",Outfit,system-ui,sans-serif;
    --fbody:Outfit,"Helvetica Neue",Arial,sans-serif;
    --fmono:"Geist Mono",ui-monospace,Menlo,monospace;
  }
  html,body{height:100%}
  body{
    background:
      radial-gradient(1100px 520px at 12% -8%,rgba(25,200,168,.10),transparent 60%),
      radial-gradient(900px 480px at 88% 0%,rgba(167,139,250,.08),transparent 55%),
      radial-gradient(700px 700px at 50% 120%,rgba(56,189,248,.06),transparent 60%),
      var(--bg0);
    color:var(--ink);font-family:Outfit,"Helvetica Neue",Arial,sans-serif;
    font-size:14.5px;line-height:1.5;letter-spacing:-.005em;overflow:hidden;
    display:flex;flex-direction:column;height:100vh;-webkit-font-smoothing:antialiased;
  }
  /* header */
  header{height:60px;padding:0 22px;border-bottom:1px solid var(--hair);
    background:linear-gradient(180deg,rgba(12,14,17,.92),rgba(12,14,17,.72));backdrop-filter:blur(14px);flex:0 0 auto}
  .ring{width:22px;height:22px;border-width:3.5px}
  .brand b{font-weight:700;font-size:16px;letter-spacing:-.02em}
  .brand b::after{content:" studio";color:var(--ink3);font-weight:400}
  .legend{gap:16px;font-size:12px;color:var(--ink2)}
  .dot{width:8px;height:8px;box-shadow:0 0 10px currentColor}
  select{background:var(--glass);border:1px solid var(--hair2);border-radius:11px;padding:8px 13px;
    font-size:13px;color:var(--ink);transition:.2s var(--ease);cursor:pointer}
  select:hover{border-color:var(--teal);box-shadow:0 0 0 3px rgba(25,200,168,.12)}
  .lens .sub{color:var(--ink3)}

  /* hero overview rail */
  .stepper{display:none!important}
  .hero{flex:0 0 auto;position:relative;padding:16px 22px 14px;border-bottom:1px solid var(--hair);
    background:linear-gradient(180deg,rgba(255,255,255,.02),transparent);overflow-x:auto;overflow-y:hidden}
  .hero .htitle{font-size:11px;color:var(--ink3);letter-spacing:.18em;text-transform:uppercase;margin:0 0 11px}
  .hrail{display:flex;align-items:flex-start;gap:0;min-width:max-content;position:relative}
  .hrail::before{content:"";position:absolute;left:60px;right:60px;top:14px;height:2px;border-radius:2px;
    background:linear-gradient(90deg,#19C8A8,#C6F24E,#fb923c,#c084fc,#38bdf8,#f472b6,#60a5fa,#a78bfa);
    background-size:220% 100%;animation:shimmer 7s linear infinite;opacity:.55;z-index:0}
  @keyframes shimmer{to{background-position:220% 0}}
  .hnode{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:5px;
    padding:6px 16px;cursor:pointer;border-radius:14px;border:1px solid transparent;transition:.22s var(--ease)}
  .hnode .dotn{width:18px;height:18px;border-radius:50%;background:var(--bg0);
    border:2px solid var(--accent,var(--teal));box-shadow:0 0 0 4px var(--bg0),0 0 16px color-mix(in srgb,var(--accent) 60%,transparent);
    display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--accent);font-weight:700;transition:.22s var(--ease)}
  .hnode .hl{font-size:13px;font-weight:600;letter-spacing:-.01em;white-space:nowrap}
  .hnode .hc{font-size:11px;color:var(--ink3);white-space:nowrap}
  .hnode:hover{transform:translateY(-2px)}
  .hnode:hover .dotn{transform:scale(1.12)}
  .hnode.active{background:color-mix(in srgb,var(--accent) 10%,transparent);
    border-color:color-mix(in srgb,var(--accent) 40%,transparent)}
  .hnode.active .dotn{background:var(--accent);color:var(--bg0);box-shadow:0 0 0 4px var(--bg0),0 0 22px var(--accent)}
  .hnode.active .hl{color:var(--ink)}
  .hnode.req .hc{color:var(--amber)}
  .hsep{display:none}

  /* lens info */
  .lensinfo{flex:0 0 auto;padding:10px 22px;background:linear-gradient(180deg,rgba(232,179,57,.08),transparent);
    border-bottom:1px solid var(--hair);font-size:12.5px}
  .lensinfo b{font-size:13.5px;letter-spacing:-.01em}
  .lensinfo .pill{border:1px solid var(--hair2);background:var(--glass);border-radius:20px;padding:3px 11px;font-size:11.5px;color:var(--ink2)}

  /* track + columns */
  .track,.track.lensed{flex:1 1 auto;min-height:0;height:auto;scroll-snap-type:x mandatory;
    scroll-behavior:smooth;padding:0}
  .track::-webkit-scrollbar{height:10px}
  .track::-webkit-scrollbar-thumb{background:var(--hair2);border-radius:10px}
  .col{flex:0 0 380px;border-right:1px solid var(--hair);background:linear-gradient(180deg,rgba(255,255,255,.012),transparent);
    animation:colIn .5s var(--ease) both}
  .col.wide{flex-basis:600px}
  .col:nth-child(1){animation-delay:.02s}.col:nth-child(2){animation-delay:.06s}.col:nth-child(3){animation-delay:.10s}
  .col:nth-child(4){animation-delay:.14s}.col:nth-child(5){animation-delay:.18s}.col:nth-child(6){animation-delay:.22s}
  .col:nth-child(7){animation-delay:.26s}.col:nth-child(8){animation-delay:.30s}.col:nth-child(9){animation-delay:.34s}
  .colhead{padding:18px 18px 14px;background:linear-gradient(180deg,rgba(12,14,17,.96),rgba(12,14,17,.82));
    backdrop-filter:blur(10px);border-bottom:1px solid var(--hair)}
  .colhead .n{font-size:10.5px;letter-spacing:.18em;color:var(--accent,var(--ink3))}
  .colhead h2{font-size:21px;font-weight:700;letter-spacing:-.02em;margin-top:4px;line-height:1.15}
  .colhead .bar{height:3px;margin-top:11px;border-radius:3px;width:46px;
    background:linear-gradient(90deg,var(--accent),transparent)}
  .colhead .note{font-size:11.5px;color:var(--ink3);margin-top:9px;line-height:1.5;max-width:46ch}
  .colbody{padding:16px}
  .arrow{display:none}

  /* cards — glass + depth + motion */
  .card{position:relative;background:var(--panel);border:1px solid var(--hair);border-left:none;
    border-radius:var(--rad);padding:14px 16px 14px 20px;margin-bottom:11px;cursor:pointer;
    backdrop-filter:blur(8px);overflow:hidden;
    box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 8px 22px rgba(0,0,0,.28);
    transition:transform .2s var(--ease),box-shadow .2s var(--ease),border-color .2s var(--ease),opacity .3s,filter .3s;
    animation:cardIn .4s var(--ease) both}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
    background:var(--accent,transparent);box-shadow:0 0 14px var(--accent,transparent)}
  .card:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--accent,#fff) 45%,var(--hair));
    box-shadow:0 14px 34px rgba(0,0,0,.46),0 0 0 1px color-mix(in srgb,var(--accent) 28%,transparent)}
  .card:focus-visible{outline:2px solid var(--lime);outline-offset:3px}
  .card b{font-size:14.5px;font-weight:600;letter-spacing:-.01em;color:var(--ink)}
  .card .meta{font-size:12px;color:var(--ink2);margin-top:4px;line-height:1.45}
  .card.req{border-color:rgba(232,179,57,.45);
    box-shadow:0 0 0 1px rgba(232,179,57,.3),0 12px 30px rgba(0,0,0,.4),0 0 26px rgba(232,179,57,.14);
    animation:cardIn .4s var(--ease) both,reqGlow 2.6s ease-in-out infinite}
  .card.req::before{background:var(--amber);box-shadow:0 0 16px var(--amber)}
  .card.req b{color:#f4cf6a}
  .card.stay::before{background:var(--green);box-shadow:0 0 14px var(--green)}
  .card.dim{opacity:.26;filter:saturate(.35)}
  .card.dim:hover{opacity:.9;filter:none;transform:translateY(-2px)}
  .card.dim::before{opacity:.4}

  .grp{font-size:11px;font-weight:600;letter-spacing:.16em;color:var(--ink3);margin:20px 0 10px;
    display:flex;align-items:center;gap:8px}
  .grp::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--hair),transparent)}
  .colbody>.grp:first-child{margin-top:2px}
  .chip{font-size:10.5px;border:1px solid var(--hair2);border-radius:20px;padding:2px 10px;
    background:var(--glass);color:var(--ink2);font-weight:500}
  .chip.req{border-color:rgba(232,179,57,.5);background:rgba(232,179,57,.1);color:#f4cf6a}
  .chip.keep{border-color:rgba(25,200,168,.5);background:rgba(25,200,168,.08);color:var(--teal)}
  .sub{color:var(--ink3);font-size:12px;line-height:1.5}

  /* cluster rail */
  .hubwrap{margin:0 0 16px;padding:16px;border:1px solid var(--hair);border-radius:var(--rad);
    background:radial-gradient(360px 160px at 50% 30%,rgba(192,132,252,.10),transparent),var(--panel)}
  .layer{border:1px solid var(--hair);border-radius:14px;margin-bottom:12px;padding:12px 13px;
    background:linear-gradient(180deg,rgba(56,189,248,.05),transparent)}
  .layer h4{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);margin:0 0 9px}

  /* drawer — premium */
  .drawer{width:min(620px,95vw);background:linear-gradient(180deg,#15171b,#101216);
    border-left:1px solid var(--hair2);box-shadow:-30px 0 90px rgba(0,0,0,.6);transition:transform .28s var(--ease)}
  .drawer .dh{padding:18px 22px;background:rgba(16,18,22,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--hair)}
  .drawer h1{font-size:22px;font-weight:700;letter-spacing:-.02em}
  .drawer .db{padding:20px 22px 70px}
  .drawer h3{color:var(--teal);font-size:11px;letter-spacing:.14em;margin:20px 0 8px}
  .kv{grid-template-columns:160px 1fr;gap:9px 14px;font-size:13px}
  .kv .k{color:var(--ink3);font-size:12px}
  .x{font-size:24px;transition:.15s}.x:hover{color:var(--ink);transform:rotate(90deg)}
  .fail{border-radius:12px;border-left-width:3px;padding:11px 13px;background:rgba(232,97,90,.05)}
  pre.cmd{border-radius:11px;background:#0a0b0d;padding:12px 14px;font-family:"Geist Mono",ui-monospace,monospace}
  .scrim{backdrop-filter:blur(3px);background:rgba(5,6,7,.55)}

  /* motion */
  @keyframes cardIn{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:none}}
  @keyframes colIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  @keyframes reqGlow{0%,100%{box-shadow:0 0 0 1px rgba(232,179,57,.3),0 12px 30px rgba(0,0,0,.4),0 0 22px rgba(232,179,57,.12)}
    50%{box-shadow:0 0 0 1px rgba(232,179,57,.5),0 12px 30px rgba(0,0,0,.4),0 0 34px rgba(232,179,57,.24)}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  @media (max-width:760px){
    body{overflow:auto;height:auto;display:block}
    header{height:auto}
    .hero{overflow-x:auto}
    .track,.track.lensed{flex-direction:column;height:auto;scroll-snap-type:none;display:flex}
    .col,.col.wide{flex-basis:auto;width:100%;border-right:0;border-bottom:1px solid var(--hair)}
    .colhead{position:static}.colbody{overflow:visible}
    .kv{grid-template-columns:1fr}
    .builder.on{flex-direction:column;align-items:stretch}
    .pick select{min-width:0;width:100%}
  }

  /* ════════ resolver — build a stack ════════ */
  .modes{display:flex;gap:3px;background:var(--glass);border:1px solid var(--hair);border-radius:12px;padding:3px;margin-left:8px}
  .mode{background:none;border:0;color:var(--ink3);font:inherit;font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:9px;cursor:pointer;transition:.2s var(--ease)}
  .mode.on{background:linear-gradient(180deg,rgba(25,200,168,.22),rgba(25,200,168,.06));color:var(--ink);box-shadow:0 0 0 1px rgba(25,200,168,.32)}
  .mode:hover:not(.on){color:var(--ink)}
  .builder{display:none;gap:16px;flex-wrap:wrap;align-items:flex-end;flex:0 0 auto;
    padding:14px 22px;border-bottom:1px solid var(--hair);
    background:linear-gradient(180deg,rgba(255,255,255,.03),transparent)}
  .builder.on{display:flex}
  .pick{display:flex;flex-direction:column;gap:6px}
  .pick label{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink3)}
  .pick.lead label{color:var(--teal)}
  .pick select{min-width:158px}
  .rcol{flex:0 0 392px}
  .rhead{padding:18px;border-bottom:1px solid var(--hair);
    background:linear-gradient(180deg,rgba(12,14,17,.9),transparent)}
  .rhead .n{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase}
  .rval{font-size:22px;font-weight:700;letter-spacing:-.02em;margin:7px 0 5px;line-height:1.18;color:var(--ink)}
  .rwhy{font-size:12.5px;color:var(--ink2);line-height:1.5}
  .rtag{display:inline-block;font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;font-weight:700;
    padding:3px 10px;border-radius:20px;margin-bottom:9px;border:1px solid var(--hair2);color:var(--ink2)}
  .rtag.req{border-color:rgba(232,179,57,.55);background:rgba(232,179,57,.12);color:#f4cf6a}
  .rtag.def{border-color:rgba(56,189,248,.45);background:rgba(56,189,248,.08);color:var(--cyan)}
  .rtag.you{border-color:rgba(198,242,78,.55);background:rgba(198,242,78,.08);color:var(--lime)}
  .rtag.same{border-color:var(--hair2);color:var(--ink3)}
  .rcol.changed .rhead{animation:flashHead 1.4s var(--ease)}
  @keyframes flashHead{0%{background:rgba(232,179,57,0)}22%{background:rgba(232,179,57,.18)}100%{background:linear-gradient(180deg,rgba(12,14,17,.9),transparent)}}
  .rconn{position:absolute;right:-10px;top:64px;z-index:4;font-size:17px;color:var(--accent,var(--teal));opacity:.85;
    text-shadow:0 0 12px var(--accent,var(--teal))}
  .rchips{margin-top:2px}
  /* generated real-code files */
  .genfile{border:1px solid var(--hair);border-radius:12px;margin:8px 0;overflow:hidden;background:#0a0b0d}
  .genhead{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;background:var(--surface2,#1C1F28);border-bottom:1px solid var(--hair)}
  .genname{font-family:var(--fmono,monospace);font-size:11px;color:var(--lime)}
  .gencopy{background:none;border:1px solid var(--hair2);color:var(--ink2);border-radius:7px;font-size:10.5px;padding:2px 9px;cursor:pointer;font-family:var(--fmono,monospace)}
  .gencopy:hover{border-color:var(--teal);color:var(--teal)}
  .gencode{margin:0;padding:11px;max-height:320px;overflow:auto;font-family:var(--fmono,monospace);font-size:11px;line-height:1.5;color:#cfe8df;white-space:pre;tab-size:2}

  /* selectable option rows in resolver panels */
  .opt{position:relative;display:flex;flex-direction:column;gap:3px;padding:11px 13px;margin-bottom:8px;
    border-radius:13px;border:1px solid var(--hair);background:var(--panel);cursor:pointer;
    transition:.16s var(--ease)}
  .opt:hover{border-color:var(--teal);transform:translateY(-1px)}
  .opt:focus-visible{outline:2px solid var(--lime);outline-offset:2px}
  .optname{font-weight:600;font-size:13.5px;letter-spacing:-.01em}
  .optsub{font-size:11px;color:var(--ink3);font-family:var(--fmono)}
  .opt.chosen{border-color:var(--teal);background:rgba(25,200,168,.07);
    box-shadow:0 0 0 1px var(--teal),0 0 20px rgba(25,200,168,.16)}
  .opt.req{border-color:rgba(255,184,0,.5);background:rgba(255,184,0,.07)}
  .opt.req .optname{color:var(--gold)}
  .opt.rec{border-left:3px solid var(--teal)}
  .opt.avail{opacity:.8}
  .opt.avail:hover{opacity:1}
  .optflag{position:absolute;right:11px;top:11px;font-size:9.5px;font-family:var(--fmono);letter-spacing:.06em}
  .optflag.chosen{color:var(--teal)} .optflag.applies{color:var(--gold)} .optflag.rec{color:var(--teal)}
  .opti{position:absolute;right:10px;bottom:9px;width:19px;height:19px;border-radius:50%;
    border:1px solid var(--hair2);background:none;color:var(--ink3);font-size:11px;font-style:italic;cursor:pointer;
    font-family:var(--fdisplay)}
  .opti:hover{color:var(--teal);border-color:var(--teal)}

  /* ════════ Yarova brand alignment ════════ */
  body{font-family:var(--fbody);
    background:radial-gradient(1100px 520px at 12% -8%,rgba(25,200,168,.10),transparent 60%),
      radial-gradient(900px 480px at 88% 2%,rgba(198,242,78,.06),transparent 55%),
      radial-gradient(760px 700px at 50% 120%,rgba(25,200,168,.05),transparent 60%),var(--bg0)}
  h1,h2,.colhead h2,.rval,.hnode .hl,.drawer h1,.lensinfo b,.brand b{font-family:var(--fdisplay);letter-spacing:-.025em}
  .colhead .n,.grp,.htitle,.rtag,.rhead .n,.chip,.kv .k,.hnode .hc,.mode,.pick label,.optsub,.colhead .note,.prov{font-family:var(--fmono)}
  .brand b::after{content:" studio";font-family:var(--fbody);color:var(--ink3)}
  .card.req b{color:var(--gold)}
  .card.req::before{background:var(--gold);box-shadow:0 0 16px var(--gold)}
  .card.req{border-color:rgba(255,184,0,.45);
    box-shadow:0 0 0 1px rgba(255,184,0,.3),0 12px 30px rgba(0,0,0,.4),0 0 26px rgba(255,184,0,.14)}
  .chip.req{border-color:rgba(255,184,0,.5);background:rgba(255,184,0,.1);color:var(--gold)}
  .mode.on{background:linear-gradient(180deg,rgba(25,200,168,.22),rgba(25,200,168,.06));color:var(--ink);box-shadow:0 0 0 1px rgba(25,200,168,.32)}
  .hrail::before{background:linear-gradient(90deg,#19C8A8,#C6F24E);background-size:180% 100%;
    animation:shimmer 7s linear infinite;opacity:.6}
  .fail{border-left-color:var(--gold);background:rgba(255,184,0,.05)}
  .fail .fk{color:var(--gold)}
  @keyframes reqGlow{0%,100%{box-shadow:0 0 0 1px rgba(255,184,0,.3),0 12px 30px rgba(0,0,0,.4),0 0 22px rgba(255,184,0,.12)}
    50%{box-shadow:0 0 0 1px rgba(255,184,0,.5),0 12px 30px rgba(0,0,0,.4),0 0 34px rgba(255,184,0,.24)}}
  @keyframes flashHead{0%{background:rgba(255,184,0,0)}22%{background:rgba(255,184,0,.18)}100%{background:linear-gradient(180deg,rgba(14,15,17,.9),transparent)}}

  /* real Yarova logo lockup (from brand kit) */
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer}
  .brand .wordmark{height:30px;width:auto;display:block}
  .brand .toolname{font-family:var(--fmono);font-size:11px;color:var(--ink3);letter-spacing:.16em;
    text-transform:uppercase;border-left:1px solid var(--hair2);padding-left:12px}
  @media (max-width:760px){.brand .toolname{display:none}}
</style>
</head>
<body>
<header>
  <div class="brand" onclick="location.reload()" aria-label="Yarova Studio — reload">
    <img class="wordmark" src="yarova-logo.png" alt="Yarova" />
    <span class="toolname">Studio</span>
  </div>
  <div class="modes" role="tablist" aria-label="View mode">
    <button class="mode on" data-m="catalog" role="tab" onclick="setMode('catalog')">Catalog</button>
    <button class="mode" data-m="build" role="tab" onclick="setMode('build')">Build a stack</button>
  </div>
  <div class="legend">
    <span><span class="dot" style="background:var(--amber)"></span>required by lens</span>
    <span><span class="dot" style="background:var(--green)"></span>same for every industry</span>
    <span><span class="dot" style="background:var(--muted);opacity:.5"></span>not required here</span>
  </div>
  <div class="lens">
    <span class="sub">Industry lens:</span>
    <select id="lensV" aria-label="Choose an industry vertical to see what applies"><option value="">All industries (no lens)</option></select>
    
  </div>
</header>

<section class="hero" id="hero" aria-label="Pipeline overview">
  <div class="htitle">The pipeline · front-end to running cluster</div>
  <div class="hrail" id="hrail"></div>
</section>
<div class="builder" id="builder" aria-label="Stack inputs"></div>
<div class="lensinfo" id="lensInfo" role="status"></div>

<div class="track" id="track"><div class="err">Loading…</div></div>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="dTitle" tabindex="-1">
  <div class="dh"><h1 id="dTitle"></h1><button class="x" onclick="closeDrawer()" aria-label="Close">✕</button></div>
  <div class="db" id="dBody"></div>
</aside>

<script type="module">
import * as GEN from "./generators.js";
let G=null, LENS={vertical:""}, REQ=null;
let RA=new Set(),RO=new Set(),RG=new Set(),RC=new Set(),RT=new Set();
const $=(s,r=document)=>r.querySelector(s);
const esc=(s)=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const stripTags=(s)=>String(s==null?"":s).replace(/<[^>]*>/g,"").trim();
const by=(arr,k)=>{const m={};(arr||[]).forEach(x=>{(m[x[k]]||=[]).push(x)});return m;};
const lensOn=()=>!!LENS.vertical;

// ── lens state ────────────────────────────────────────────────────────────────
function setLens(v){
  LENS.vertical=v;
  REQ=v?(G.nodes.industryRequirements||[]).find(r=>r.id===v):null;
  RA=new Set(REQ?.requiredAuthIds||[]);
  RO=new Set(REQ?.requiredObservabilityIds||[]);
  RG=new Set(REQ?.requiredRegimeIds||[]);
  RC=new Set(REQ?.recommendedClusterIds||[]);
  RT=new Set(REQ?.recommendedRuntimeIds||[]);
}
// state→class. 'req' amber, 'stay' green universal, 'dim' not-required-while-lensed, '' normal
function st(required, universal){
  if(required) return 'req';
  if(lensOn() && universal) return 'stay';
  if(lensOn()) return 'dim';
  return '';
}

// ── building blocks ─────────────────────────────────────────────────────────
const CAT_COLOR=(cid)=>{const n=parseInt((cid||'').replace(/\D/g,''))||0;
  if(n<=8)return'var(--teal)'; if(n<=13)return'var(--violet)'; if(n<=27)return'var(--lime)'; return'var(--cyan)';};

function card(accent,title,meta,onclick,state,chip){
  const cls=`card${state?' '+state:''}`;
  const ch=chip?` <span class="chip ${chip.cls}">${esc(chip.text)}</span>`:'';
  return `<div class="${cls}" style="--accent:${accent}" tabindex="0" role="button"
    onclick="${onclick}" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();${onclick}}">
    <b>${esc(title)}</b>${ch}${meta?`<div class="meta">${esc(meta)}</div>`:''}</div>`;
}
function col(idx,n,name,accent,bodyHtml,note,wide){
  return `<section class="col${wide?' wide':''}" id="col-${idx}" data-accent="${accent}">
    <div class="colhead"><div class="n">${esc(n)}</div><h2>${esc(name)}</h2>
    <div class="bar" style="--accent:${accent}"></div>${note?`<div class="note">${esc(note)}</div>`:''}</div>
    <div class="colbody">${bodyHtml}</div><div class="arrow">→</div></section>`;
}

// stage names of the journey (drives stepper + columns)
// 9 stages ride the brand teal→lime gradient, left to right (on-brand progression)
const STAGES=[
  ['catalog','Frameworks','#19C8A8'],
  ['build','Pipeline','#2FCD9D'],
  ['governance','Compliance','#44D292'],
  ['artifact','Registry & Build','#5AD886'],
  ['gitops','GitOps','#70DD7B'],
  ['runtime','Clusters','#85E270'],
  ['platform','Platform','#9BE864'],
  ['connect','Integrations','#B0ED59'],
  ['reference','Reference','#C6F24E'],
];

// ── columns ──────────────────────────────────────────────────────────────────
function colFrameworks(){
  const cats=[...(G.nodes.categories||[])].sort((a,b)=>(parseInt(a.id.replace(/\D/g,''))||0)-(parseInt(b.id.replace(/\D/g,''))||0));
  const fwByCat=by(G.nodes.frameworks,'categoryId');
  let h='';
  for(const cat of cats){
    const fws=fwByCat[cat.id]||[]; if(!fws.length)continue;
    h+=`<div class="grp" style="color:${CAT_COLOR(cat.id)}">${esc(cat.name)}</div>`;
    for(const f of fws) h+=card(CAT_COLOR(cat.id),f.name,`${(f.languages||[f.languageId]).filter(Boolean).join('/')} · ${f.maturity||f.tier||''}`,`openFw('${f.id}')`,'',null);
  }
  return col(0,'01 · catalog','Frameworks','var(--teal)',h,
    `${(G.nodes.frameworks||[]).length} frameworks · front-end → back-end. Any one is a valid start — choose by need.`);
}

function colPipeline(){
  const phases=(G.nodes.phases||[]).sort((a,b)=>(+a.order||0)-(+b.order||0));
  const stages=G.nodes.stages||[], invs=G.nodes.invariants||[];
  let h='';
  for(const p of phases){
    const st_=stages.filter(s=>s.phaseId===p.id);
    const iv=invs.filter(x=>x.phaseId===p.id);
    h+=`<div class="grp">${esc(p.label||p.name)} · ${esc(p.trigger||'')}</div>`;
    for(const s of st_){const sec=(s.type||'').toLowerCase().includes('sec');
      h+=card(sec?'var(--blue)':'var(--green)',s.name||s.label,s.type||'',`openStage('${s.id}')`,lensOn()?'stay':'',null);}
    if(iv.length){
      h+=`<div class="sub" style="margin:2px 0 6px">Invariants enforced this phase:</div>`;
      for(const x of iv) h+=card('var(--teal)',`${x.name} — ${stripTags(x.condition)}`,`enforced by ${x.enforcedBy||'CI'}`,`openInvariant('${x.id}')`,'',null);
    }
  }
  // swappable build knobs (buildAxes) reachable here
  h+=`<div class="grp">Swappable build knobs (8 ARGs)</div>`;
  for(const a of (G.nodes.buildAxes||[])) h+=card('var(--lime)',`--${a.arg} (${a.name})`,`default: ${a.default} · ${a.implStatus}`,`openAxis('${a.id}')`,'',null);
  return col(1,'02 · build','CI/CD Pipeline','var(--green)',h,
    `${stages.length} stages over ${phases.length} phases + ${invs.length} invariants. Identical for every industry.`);
}

function colCompliance(){
  const profs=(G.nodes.complianceProfiles||[]);
  let h='';
  if(lensOn()){
    const reqList=profs.filter(c=>RG.has(c.id));
    const other=profs.filter(c=>!RG.has(c.id));
    h+=`<div class="grp" style="color:var(--amber)">Required for ${esc(REQ?.name||'')} (${reqList.length})</div>`;
    for(const c of reqList) h+=card('var(--amber)',c.name,c.fullName||c.regulator||'',`openProfile('${c.id}')`,'req',{cls:'req',text:'required'});
    h+=`<div class="grp">Not required for this industry (${other.length})</div>`;
    for(const c of other) h+=card('var(--line)',c.name,c.fullName||'',`openProfile('${c.id}')`,'dim',null);
  }else{
    h+=`<div class="sub" style="margin-bottom:8px">Pick an industry lens to see which of these 26 apply. All shown until then.</div>`;
    for(const c of profs) h+=card('var(--line)',c.name,c.fullName||c.regulator||'',`openProfile('${c.id}')`,'',null);
  }
  return col(2,'03 · governance','Compliance — 26 regimes','var(--amber)',h,
    lensOn()?`${RG.size} of 26 regimes apply to ${REQ?.name}.`:`All 26 regulatory regimes. Lens marks which apply.`);
}

function colRegistry(){
  const imgs=(G.nodes.images||[]);
  let h=`<div class="grp">Pipeline output</div>`+
    card('var(--orange)','GHCR — ghcr.io/yarova-ca','signed image + SBOM · :latest :sha :sha-fips','openRegistry()','',null);
  h+=`<div class="grp">Base images — 22 options</div>`;
  for(const im of imgs){
    const req=RT.has(im.id);
    const chip = req?{cls:'req',text:'recommended'} : (im.fips==='Yes'?{cls:'keep',text:'FIPS'}:null);
    h+=card('var(--orange)',im.name,`${im.familyLabel||im.family||''} · ${im.minImage||''}${im.fips==='Yes'?' · FIPS':''}`,`openImage('${im.id}')`,st(req,false),chip);
  }
  // runtime deep bases + package managers reachable
  h+=`<div class="grp">Runtime base — decision depth</div>`;
  for(const r of (G.nodes.runtimeDeep||[])){
    const req=RT.has(r.id);
    h+=card('var(--orange)',r.name,`${r.baseOs||''} · ${r.sizeMb?r.sizeMb+'MB':''}${r.fipsCertified==='yes'?' · FIPS':''}`,`openDeep('runtimeDeep','${r.id}')`,st(req,false),req?{cls:'req',text:'recommended'}:null);
  }
  h+=`<div class="grp">Package + build managers (${(G.nodes.pkgBuildDeep||[]).length})</div>`;
  for(const p of (G.nodes.pkgBuildDeep||[])) h+=card('var(--orange)',p.name,`${p.kind||''} · ${p.language||''}`,`openPkg('${p.id}')`,'',null);
  return col(3,'04 · artifact','Registry & Build','var(--orange)',h,
    lensOn()?`Recommended base for ${REQ?.name}: ${[...RT].join(', ')}.`:`22 base images + 9 runtime profiles + pkg managers.`);
}

function colGitops(){
  let h='<div class="sub" style="margin-bottom:8px">Registry image → Git declares desired state → controller syncs to clusters. Same for every industry.</div>';
  for(const t of (G.nodes.gitopsTools||[])) h+=card('var(--purple)',t.name,`${t.role||''}${t.version?' · v'+t.version:''}`,`openGitops('${t.id}')`,lensOn()?'stay':'',null);
  return col(4,'05 · GitOps','GitOps — Helm + Kustomize','var(--purple)',h,
    `${(G.nodes.gitopsTools||[]).length} tools. Declarative delivery — identical across industries.`);
}

function colClusters(){
  const comps=[...(G.nodes.clusterComponents||[])].sort((a,b)=>(a.num||'').localeCompare(b.num||''));
  const layers=by(comps,'layer');
  const clusters=G.nodes.clusters||[];
  // SVG hub-and-spoke
  const cx=180,cy=70,R=58;
  const pts=clusters.map((c,i)=>{const ang=(-90 + i*(360/clusters.length))*Math.PI/180;
    return {c,x:cx+Math.cos(ang)*120,y:cy+Math.sin(ang)*46};});
  let svg=`<svg viewBox="0 0 360 150" width="100%" height="150" role="img" aria-label="Argo CD hub connected to clusters">`;
  for(const p of pts){const on=RC.has(p.c.id);
    svg+=`<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="${on?'#FFB800':'rgba(244,243,239,.14)'}" stroke-width="${on?2:1}"/>`;}
  for(const p of pts){const on=RC.has(p.c.id);
    svg+=`<g style="cursor:pointer" onclick="openCluster('${p.c.id}')">
      <circle cx="${p.x}" cy="${p.y}" r="22" fill="${on?'rgba(255,184,0,.14)':'#1C1F28'}" stroke="${on?'#FFB800':'#19C8A8'}" stroke-width="${on?2:1.2}"/>
      <text x="${p.x}" y="${p.y+4}" text-anchor="middle" fill="${on?'#FFB800':'rgba(244,243,239,.62)'}" font-size="11" font-family="Outfit">${esc(p.c.name||p.c.id)}</text></g>`;}
  svg+=`<circle cx="${cx}" cy="${cy}" r="26" fill="rgba(198,242,78,.14)" stroke="#C6F24E" stroke-width="1.6"/>
    <text x="${cx}" y="${cy-2}" text-anchor="middle" fill="#C6F24E" font-size="11" font-family="Outfit">Argo CD</text>
    <text x="${cx}" y="${cy+11}" text-anchor="middle" fill="rgba(244,243,239,.55)" font-size="9" font-family="Outfit">hub</text></svg>`;
  let h=`<div class="hubwrap">${svg}<div class="sub">Hub-and-spoke: one Argo CD controller syncs every cluster.${lensOn()?` Recommended for ${esc(REQ?.name)}: <span style="color:var(--amber)">${[...RC].map(x=>esc(x)).join(', ')}</span>.`:''}</div></div>`;
  // layered rail of 30 components
  const order=['Foundation','Networking','Security','Storage','Observability','Delivery','Scaling','Platform'];
  const keys=Object.keys(layers).sort((a,b)=>{const ia=order.indexOf(a),ib=order.indexOf(b);return (ia<0?99:ia)-(ib<0?99:ib);});
  for(const layer of keys){const cs=layers[layer];
    h+=`<div class="layer"><h4>Layer — ${esc(layer)} · ${cs.length}</h4>`;
    for(const c of cs) h+=card('var(--cyan)',`${c.num}. ${c.name}`,(c.status||'')+(c.what?' · '+stripTags(c.what).slice(0,48):''),`openCluster2('${c.id}')`,lensOn()?'stay':'',null);
    h+=`</div>`;
  }
  return col(5,'06 · runtime','Clusters — hub-and-spoke','var(--cyan)',h,
    `${clusters.length} clusters · ${comps.length} components in ${keys.length} stacked layers.`,true);
}

function colPlatform(){
  const map=[['Auth','authDeep',RA],['Observability','observabilityDeep',RO],['ORM','ormDeep',null],['Runtime base','runtimeDeep',RT]];
  let h='';
  for(const [label,node,reqSet] of map){
    const items=G.nodes[node]||[];
    const reqCount=reqSet?items.filter(o=>reqSet.has(o.id)).length:0;
    h+=`<div class="grp">${label}${reqSet&&lensOn()?` · ${reqCount} required`:''}</div>`;
    for(const o of items){
      const req=reqSet?reqSet.has(o.id):false;
      const universal=!reqSet; // ORM stays the same across industries
      h+=card('var(--pink)',o.name,stripTags(o.what||'').slice(0,68),`openDeep('${node}','${o.id}')`,st(req,universal),req?{cls:'req',text:'required'}:null);
    }
  }
  return col(6,'07 · platform','Auth · Observability · ORM · Runtime','var(--pink)',h,
    lensOn()?`${REQ?.name}: auth ${[...RA].length}, observability ${[...RO].length} required.`:`Every swappable platform option, full decision depth.`,true);
}

function colIntegrations(){
  const ig=G.nodes.integrations||[];
  const list=lensOn()?ig.filter(g=>g.verticalId===LENS.vertical):ig;

function renderVal(v){
  if(v==null||v==='')return'';
  if(Array.isArray(v)){
    if(v.length&&typeof v[0]==='object') return v.map(o=>failBlock(o)).join('');
    return v.map(x=>`<span class="chip">${esc(stripTags(x))}</span>`).join('');
  }
  if(typeof v==='object'){
    const ents=Object.entries(v).filter(([,val])=>val!=null&&val!=='');
    if(!ents.length)return'';
    return `<div class="kv">`+ents.map(([k,val])=>
      `<div class="k">${esc(k)}</div><div>${esc(stripTags(typeof val==='object'?JSON.stringify(val):val))}</div>`).join('')+`</div>`;
  }

function failBlock(o){
  if(o.trigger||o.system||o.userSees){
    return `<div class="fail">
      ${o.trigger?`<div class="fk">Trigger</div><div>${esc(stripTags(o.trigger))}</div>`:''}

  }
  return `<div class="kv">`+Object.entries(o).filter(([,val])=>val!=null&&val!=='').map(([k,val])=>`<div class="k">${esc(k)}</div><div>${esc(stripTags(val))}</div>`).join('')+`</div>`;

// render a full node: every field, labelled, ordered by a preferred list then the rest
function fullNode(o,labels,skip){
  skip=new Set([...(skip||[]),'id','label','name','sourceType','confidence','sourcePage','order','num']);
  let h='';
  const done=new Set();
  for(const [k,l] of (labels||[])){ if(o[k]!=null&&o[k]!==''){h+=section(l,o[k]);done.add(k);} }
  for(const [k,v] of Object.entries(o)){
    if(done.has(k)||skip.has(k)||v==null||v==='')continue;
    h+=section(k.replace(/([A-Z])/g,' $1').replace(/^./,c=>c.toUpperCase()),v);
  }
  if(o.sourcePage)h+=`<div class="prov">source: ${esc(stripTags(String(o.sourcePage)))} · ${esc(o.sourceType||'graph')}</div>`;
  return h||'<div class="sub">No further detail.</div>';
}

function langMatch(str,lang){const h=(LANG_HUMAN[lang]||lang||'').toLowerCase();const s=String(str||'').toLowerCase();
  if(lang==='ts'||lang==='js')return s.includes('javascript')||s.includes('typescript');
  if(!h)return false; return s.includes(h);}
const pkgsFor=(lang)=>(G.nodes.pkgBuildDeep||[]).filter(p=>p.kind==='pkg-mgr'&&langMatch(p.language,lang));
const buildToolsFor=(lang)=>(G.nodes.pkgBuildDeep||[]).filter(p=>p.kind==='build-tool'&&langMatch(p.language,lang));

function resolveStack(){
  const fw=fwById(RS.fw)||(G.nodes.frameworks||[])[0];
  const lang=fw.languageId;
  const rq=reqOfInd(RS.industry);
  const pkgList=pkgsFor(lang), pkgDef=LANG_DEFPKG[lang]||(pkgList[0]&&pkgList[0].id)||'npm';
  const pkg=RS.pkg||pkgDef;
  const btList=buildToolsFor(lang);
  const buildtool=RS.buildtool||(btList[0]&&btList[0].id)||null;
  const ormList=ormsFor(lang), ormDef=LANG_ORM[lang]||'orm-none';
  const orm=RS.orm||ormDef;
  const auth=RS.auth||(rq?.requiredAuthIds?.[0])||'auth-oauth2';
  const obs=RS.obs||(rq?.requiredObservabilityIds?.[0])||'observability-otel';
  const cluster=RS.cluster||(rq?.recommendedClusterIds?.[0])||'eks';
  const tmpl=(G.nodes.dockerfileTemplates||[]).find(t=>t.frameworkId===fw.id);
  let base,baseWhy,baseTag;
  if(RS.runtime){base=RS.runtime;baseWhy='Your choice of base image.';baseTag='you';}
  else if(rq?.recommendedRuntimeIds?.includes('fips')){base='fips';baseWhy=`${rq.name} requires FIPS-validated crypto — UBI9 FIPS base.`;baseTag='req';}
  else if(rq?.recommendedRuntimeIds?.length){base=rq.recommendedRuntimeIds[0];baseWhy=`${rq.name} recommends a ${base} base image.`;baseTag='req';}
  else{base=(G.nodes.runtimeDeep||[]).some(r=>r.id==='distroless')?'distroless':base;base=base||tmpl?.runtimeFrom||'distroless';baseWhy='Framework default base image.';baseTag='def';}
  const region=RS.region||'';
  return {fw,lang,rq,
    pkg,pkgUser:!!RS.pkg,pkgDef,pkgList,
    buildtool,btList,
    orm,ormUser:!!RS.orm,ormDef,ormList,
    auth,authUser:!!RS.auth,authReq:!!rq?.requiredAuthIds?.includes(auth),
    obs,obsUser:!!RS.obs,obsReq:!!rq?.requiredObservabilityIds?.includes(obs),
    cluster,clusterUser:!!RS.cluster,clusterReq:!!rq?.recommendedClusterIds?.includes(cluster),
    base,baseWhy,baseTag,tmpl,region,
    regimes:rq?.requiredRegimeIds||[],
    integ:RS.industry?(G.nodes.integrations||[]).filter(g=>g.verticalId===RS.industry):[]};
}

  if(!rq)return['none','none'];const ks=[];
  for(const id of (rq.requiredRegimeIds||[])){const c=REGIME_TO_COMP[id];if(c&&!ks.includes(c))ks.push(c);}
  return[ks[0]||'none',ks[1]||'none'];
}
function buildConfig(s){
  const k=fwToKeys(s.fw), comp=industryToCompliance(s.rq);
  return{feKey:k.feKey,beKey:k.beKey,ciKey:'github-actions',regKey:'ghcr',
    compliance:comp[0],compliance2:comp[1],industry:s.rq?s.rq.id:'',
    cd:'argocd',gitops:'same-repo',scanner:'trivy',signing:'cosign',sbom:'syft',
    baseimage:s.base,pkgMgr:(PKG_MAP[s.pkg]||s.pkg),appName:s.fw.serviceSlug||s.fw.id,
    port:(s.tmpl&&s.tmpl.port)?String(s.tmpl.port):undefined};
}
function genFiles(cfg){
  const safe=(fn)=>{try{const v=fn();return v==null?'':v;}catch(e){return '';}};
  return{
    dockerfile:safe(()=>GEN.generateDockerfile(cfg)),
    dockerignore:safe(()=>GEN.generateDockerIgnore(cfg)),
    prwf:safe(()=>GEN.generatePRWorkflow(cfg)),
    mainwf:safe(()=>GEN.generateMainWorkflow(cfg)),
    helm:safe(()=>GEN.generateHelmValues(cfg,'prod')),
    kbase:safe(()=>GEN.generateBaseKustomization(cfg)),
    kdeploy:safe(()=>GEN.generateBaseDeployment(cfg)),
    precommit:safe(()=>GEN.generatePreCommitConfig(cfg)),
    deploy:safe(()=>GEN.generateDeploy(cfg))||{},
  };
}
function codeFile(name,text){
  if(!text||typeof text!=='string')return'';
  const id='cf'+(CFID++);
  return `<div class="genfile"><div class="genhead"><span class="genname">${esc(name)}</span>`+
    `<button class="gencopy" onclick="copyCode('${id}',this)">copy</button></div>`+
    `<pre class="gencode" id="${id}">${esc(text)}</pre></div>`;
}
window.copyCode=(id,btn)=>{const el=document.getElementById(id);if(!el)return;
  navigator.clipboard.writeText(el.textContent).then(()=>{if(btn){const t=btn.textContent;btn.textContent='copied ✓';setTimeout(()=>btn.textContent=t,1200);}});};

function renderResolver(){
  const s=resolveStack();
  const rdBase=(G.nodes.runtimeDeep||[]).find(x=>x.id===s.base);
  const baseName=rdBase?rdBase.name:s.base;
  const reqRun=new Set([...(s.rq?.recommendedRuntimeIds||[])]);
  const cur={repo:s.fw.id,deps:`${s.pkg}|${s.buildtool}`,pipe:`${s.auth}|${s.orm}|${s.base}`,comp:s.regimes.join(','),
    img:s.base,gitops:'std',cluster:s.cluster,plat:`${s.auth}|${s.obs}|${s.orm}`,integ:s.integ.length+':'+RS.industry};
  const ch=(k)=>LASTR[k]!=null&&LASTR[k]!==cur[k];
  const P=[];

  // real-code files for the current cursor — regenerated live on every change
  CFID=0;
  const CFG=buildConfig(s), GF=genFiles(CFG);
  const genCI=grp('Generated files — copy & ship')+codeFile('.github/workflows/main.yml',GF.mainwf)+codeFile('.github/workflows/pr.yml',GF.prwf)+codeFile('.pre-commit-config.yaml',GF.precommit);
  const genImg=grp('Generated files')+codeFile('Dockerfile',GF.dockerfile)+codeFile('.dockerignore',GF.dockerignore);
  const genGit=grp('Generated files')+codeFile('helm/values-prod.yaml',GF.helm)+codeFile('kustomize/base/kustomization.yaml',GF.kbase)+codeFile('kustomize/base/deployment.yaml',GF.kdeploy);
  const genCluster=grp('Generated manifests')+Object.entries(GF.deploy||{}).map(([n,c])=>codeFile(n,c)).join('');

  // 0 Repository — switch within the same category, all 106 in the top picker
  const sib=(G.nodes.frameworks||[]).filter(f=>f.categoryId===s.fw.categoryId);
  P.push(rpanel(0,'#19C8A8','01','Repository',rtag('you','you starred this'),
    esc(s.fw.name),`${esc(LANG_HUMAN[s.lang]||s.lang)} · ${esc(s.fw.maturity||'')} · ${esc(s.fw.license||'')} · git ${esc(s.fw.serviceSlug||s.fw.id)}`,
    grp(`alternatives in ${esc(nameById('categories',s.fw.categoryId))} (${sib.length}) — all 106 in the top picker`)+
    sib.map(f=>opt('fw',f.id,f.name,(f.languages||[]).join('/'),ostate(f.id,s.fw.id),`openFw('${f.id}')`)).join(''),ch('repo')));

  // 1 Dependencies — every package manager for the language, choosable
  const pkgReq=new Set(), pkgRec=new Set([s.pkgDef]);
  P.push(rpanel(1,'#2FCD9D','02','Dependencies',rtag(s.pkgUser?'you':'rec',s.pkgUser?'your choice':'recommended default'),
    esc(nameById('pkgBuildDeep',s.pkg)),`Package manager + build tool for ${esc(LANG_HUMAN[s.lang]||s.lang)}. Lockfile committed; CI uses frozen install.`,
    grp(`package managers (${s.pkgList.length})`)+
    s.pkgList.map(p=>opt('pkg',p.id,p.name,p.lockfile?String(p.lockfile).split('.')[0]:'',ostate(p.id,s.pkg,pkgReq,pkgRec),`openPkg('${p.id}')`)).join('')+
    (s.btList.length?grp(`build tools (${s.btList.length})`)+s.btList.map(p=>opt('buildtool',p.id,p.name,p.what?String(p.what).slice(0,40):'',ostate(p.id,s.buildtool,new Set(),new Set()),`openPkg('${p.id}')`)).join(''):''),ch('deps')));

  // 2 CI/CD pipeline — same for all; ARGs resolved from your picks
  P.push(rpanel(2,'#44D292','03','CI/CD pipeline',rtag('same','same for every framework'),
    `${(G.nodes.stages||[]).length}-stage pipeline`,'Standard platform pipeline. Your choices flow in as build args:',
    `<div class="rchips"><span class="chip">AUTH=${esc(s.auth.replace('auth-',''))}</span><span class="chip">ORM=${esc(s.orm.replace('orm-',''))}</span><span class="chip">RUNTIME=${esc(s.base)}</span><span class="chip">PKG=${esc(s.pkg)}</span></div>`+
    grp('phases')+(G.nodes.phases||[]).sort((a,b)=>(+a.order||0)-(+b.order||0)).map(p=>card('#44D292',p.label||p.name,p.trigger||'',`goCol(1)`,'',null)).join('')+genCI,ch('pipe')));

  // 3 Compliance — ALL 26, what applies vs what does not
  const reqSet=new Set(s.regimes);
  const allC=(G.nodes.complianceProfiles||[]);
  let compBody;
  if(s.rq){
    compBody=grp(`applies to ${esc(s.rq.name)} (${s.regimes.length})`)+
      allC.filter(c=>reqSet.has(c.id)).map(c=>card('#FFB800',c.name,c.fullName||c.regulator||'','openProfile(\''+c.id+'\')','req',null)).join('')+
      grp(`available, not required here (${allC.length-s.regimes.length})`)+
      allC.filter(c=>!reqSet.has(c.id)).map(c=>card('var(--hair)',c.name,c.fullName||'','openProfile(\''+c.id+'\')','dim',null)).join('');
  } else {
    compBody=grp(`all regimes (${allC.length}) — pick an industry to see which apply`)+
      allC.map(c=>card('var(--hair)',c.name,c.fullName||'','openProfile(\''+c.id+'\')','',null)).join('');
  }
  P.push(rpanel(3,'#5AD886','04','Compliance',s.rq?rtag('req',`${s.regimes.length} of ${allC.length} apply`):rtag('def','no industry'),
    s.rq?`${s.regimes.length} of ${allC.length} apply`:'Pick an industry',
    s.rq?`${esc(s.rq.name)} mandates the gold ones. Each forces controls into the pipeline.`:'Compliance depends on the industry you serve.',compBody,ch('comp')));

  // 4 Image & registry — every base image, choosable
  const runAll=(G.nodes.runtimeDeep||[]);
  P.push(rpanel(4,'#70DD7B','05','Image & registry',rtag(s.baseTag,s.baseTag==='req'?'required by industry':s.baseTag==='you'?'your choice':'framework default'),
    esc(baseName),esc(s.baseWhy)+' Built, signed (cosign) + SBOM, pushed to GHCR.',
    grp(`base image (${runAll.length})`)+
    runAll.map(r=>opt('runtime',r.id,r.name,`${r.baseOs||''}${r.fipsCertified==='yes'?' · FIPS':''}`,ostate(r.id,s.base,reqRun,new Set()),`openDeep('runtimeDeep','${r.id}')`)).join('')+
    grp('registry')+card('#70DD7B','GHCR — ghcr.io/yarova-ca','signed image + SBOM · :sha :sha-fips','openRegistry()','',null)+genImg,ch('img')));

  // 5 GitOps — info
  P.push(rpanel(5,'#85E270','06','GitOps delivery',rtag('same','same for every framework'),
    'Argo CD + Helm + Kustomize','Git declares desired state. Argo CD syncs it to the cluster.',
    grp(`tools (${(G.nodes.gitopsTools||[]).length})`)+(G.nodes.gitopsTools||[]).map(t=>card('#85E270',t.name,`${t.role||''} · open detail`,`openGitops('${t.id}')`,'',null)).join('')+genGit,ch('gitops')));

  // 6 Cluster — every cluster, choosable
  const [ct,ctx]=pickTag(s.clusterUser,s.clusterReq);
  const clReq=new Set(s.rq?.recommendedClusterIds||[]);
  P.push(rpanel(6,'#9BE864','07','Deploy cluster',rtag(ct,ctx),
    esc(nameById('clusters',s.cluster)),s.rq?`${esc(s.rq.name)} recommends the gold ones. ${(G.nodes.clusterComponents||[]).length} platform components run here.`:`${(G.nodes.clusterComponents||[]).length} platform components.`,
    grp(`clusters (${(G.nodes.clusters||[]).length})`)+
    (G.nodes.clusters||[]).map(c=>opt('cluster',c.id,c.name,c.cloud||'',ostate(c.id,s.cluster,clReq,new Set()),`openCluster('${c.id}')`)).join('')+
    `<div class="sub" style="margin-top:8px">Hub-and-spoke: one Argo CD → every cluster.</div>`+genCluster,ch('cluster')));

  // 7 Platform — auth, observability, ORM, all choosable
  const [at,atx]=pickTag(s.authUser,s.authReq);
  const authReqS=new Set(s.rq?.requiredAuthIds||[]), obsReqS=new Set(s.rq?.requiredObservabilityIds||[]), ormRec=new Set([s.ormDef]);
  P.push(rpanel(7,'#B0ED59','08','Platform',rtag(at,'auth: '+atx),
    esc(nameById('authDeep',s.auth)),'Auth, observability and database layer — pick any:',
    grp(`auth (${(G.nodes.authDeep||[]).length})`)+
    (G.nodes.authDeep||[]).map(a=>opt('auth',a.id,a.name,'',ostate(a.id,s.auth,authReqS,new Set()),`openDeep('authDeep','${a.id}')`)).join('')+
    grp(`observability (${(G.nodes.observabilityDeep||[]).length})`)+
    (G.nodes.observabilityDeep||[]).map(o=>opt('obs',o.id,o.name,'',ostate(o.id,s.obs,obsReqS,new Set()),`openDeep('observabilityDeep','${o.id}')`)).join('')+
    grp(`ORM for ${esc(LANG_HUMAN[s.lang]||s.lang)} (${s.ormList.length})`)+
    s.ormList.map(o=>opt('orm',o.id,o.name,'',ostate(o.id,s.orm,new Set(),ormRec),`openDeep('ormDeep','${o.id}')`)).join(''),ch('plat')));

  // 8 Integrations — info, by industry
  let intBody,intVal,intTag;
  if(s.rq){intTag=rtag('req',`${s.integ.length} systems`);intVal=`${s.integ.length} integrations`;
    intBody=s.integ.length?(()=>{const bc=by(s.integ,'category');return Object.entries(bc).map(([c,a])=>grp(c)+a.map(g=>card('#C6F24E',g.externalSystem,`auth ${g.authOption||''} · ${g.apiGateway||''}`,`openIntegration('${g.id}')`,'',null)).join('')).join('');})():'<div class="sub">No catalogued integrations for this industry yet.</div>';}
  else{intTag=rtag('def','no industry');intVal='Pick an industry';intBody='<div class="sub">Select an industry to see its integrations.</div>';}
  P.push(rpanel(8,'#C6F24E','09','Integrations',intTag,intVal,
    s.rq?`External systems ${esc(s.rq.name)} commonly connects.`:'Integrations depend on the industry.',intBody,ch('integ')));

  LASTR=cur;
  $("#track").innerHTML=P.join('');
  observeColumns();
}

function renderBuilder(){
  const s=resolveStack();
  const opt=(arr,val,fn)=>arr.map(o=>`<option value="${esc(o.id)}" ${o.id===val?'selected':''}>${esc(fn?fn(o):(o.name||o.id))}</option>`).join('');
  const regions=G.nodes.regions||[];
  $("#builder").innerHTML=`
    <div class="pick lead"><label>Framework — git repo</label><select id="pFw">${opt(G.nodes.frameworks||[],s.fw.id)}</select></div>
    <div class="pick lead"><label>Industry</label><select id="pInd"><option value="">— none —</option>${opt(G.nodes.verticals||[],RS.industry)}</select></div>
    <div class="pick"><label>Package manager</label><select id="pPkg">${opt(s.pkgList,s.pkg)}</select></div>
    <div class="pick"><label>ORM / data</label><select id="pOrm">${opt(s.ormList,s.orm)}</select></div>
    <div class="pick"><label>Auth</label><select id="pAuth">${opt(G.nodes.authDeep||[],s.auth)}</select></div>
    <div class="pick"><label>Observability</label><select id="pObs">${opt(G.nodes.observabilityDeep||[],s.obs)}</select></div>
    <div class="pick"><label>Base image</label><select id="pRun">${opt(G.nodes.runtimeDeep||[],s.base)}</select></div>
    <div class="pick"><label>Deploy cluster</label><select id="pCl">${opt(G.nodes.clusters||[],s.cluster)}</select></div>
    ${regions.length?`<div class="pick"><label>Region</label><select id="pRegion"><option value="">— any (Canada-first) —</option>${opt(regions,RS.region)}</select></div>`:''}`;
  $("#pFw").onchange=e=>pickAxis('fw',e.target.value);
  $("#pInd").onchange=e=>pickAxis('industry',e.target.value);
  $("#pPkg").onchange=e=>pickAxis('pkg',e.target.value);
  $("#pOrm").onchange=e=>pickAxis('orm',e.target.value);
  $("#pAuth").onchange=e=>pickAxis('auth',e.target.value);
  $("#pObs").onchange=e=>pickAxis('obs',e.target.value);
  $("#pRun").onchange=e=>pickAxis('runtime',e.target.value);
  $("#pCl").onchange=e=>pickAxis('cluster',e.target.value);
  const pr=$("#pRegion");if(pr)pr.onchange=e=>pickAxis('region',e.target.value);
}
function refreshBuild(){renderBuilder();renderResolver();}
window.setMode=(m)=>{
  MODE=m;
  document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  const build=m==='build';
  $("#builder").classList.toggle('on',build);
  document.querySelector('.legend').style.display=build?'none':'';
  document.querySelector('.lens').style.display=build?'none':'';
  if(build){ if(!RS.fw)RS.fw=(G.nodes.frameworks||[])[0]?.id;
    $("#lensInfo").classList.remove('on');$("#track").classList.remove('lensed');
    LASTR={};renderBuilder();renderResolver();
  } else { renderLensInfo();renderBoard(); }
};

async function boot(){
  try{ G=await (await fetch("graph.json")).json(); }
  catch(e){ $("#track").innerHTML=`<div class="err">Could not load graph.json.<br>${e}</div>`; return; }
  const lv=$("#lensV");
  for(const v of (G.nodes.verticals||[])){const o=document.createElement("option");o.value=v.id;o.textContent=v.name||v.id;lv.appendChild(o);}
  // restore lens from hash
  const h=new URLSearchParams(location.hash.slice(1));
  if(h.get('lens')&&(G.nodes.verticals||[]).some(v=>v.id===h.get('lens'))){lv.value=h.get('lens');setLens(h.get('lens'));}
  lv.onchange=e=>{setLens(e.target.value);location.hash=e.target.value?`lens=${e.target.value}`:'';renderLensInfo();renderHero();renderBoard();};
  renderHero();renderLensInfo();renderBoard();
}
boot();
</script>
