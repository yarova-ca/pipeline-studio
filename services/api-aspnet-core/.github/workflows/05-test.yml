# ════════════════════════════════════════════════════════════════════
# Stage 05 — Test  |  19 .NET — ASP.NET Core 9
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your ASP.NET Core repo
# ════════════════════════════════════════════════════════════════════

name: "05 Test — ASP.NET Core 9"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          # Projects target net8.0; install 8.0 runtime alongside the 9.0 SDK.
          dotnet-version: |
            8.0
            9.0
      - name: Run tests
        run: dotnet test Tests/Tests.csproj --collect:"XPlat Code Coverage"

      # ── OPTIONAL: Codecov coverage upload ─────────────────────────
