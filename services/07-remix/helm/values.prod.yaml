replicaCount: 3
image:
  tag: "latest"
resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
ingress:
  enabled: true
  hosts:
    - host: 07-remix.yarova.ca
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: 07-remix-tls
      hosts:
        - 07-remix.yarova.ca
