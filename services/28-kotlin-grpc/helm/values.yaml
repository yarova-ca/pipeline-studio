replicaCount: 1

image:
  repository: ""   # set in CI: ghcr.io/yarova-ca/28-kotlin-grpc
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: "28-kotlin-grpc"

serviceAccount:
  create: true
  name: "28-kotlin-grpc"

service:
  type: ClusterIP
  port: 50051

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: 28-kotlin-grpc.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

env: {}

envFrom: []

livenessProbe:
  httpGet:
    path: /health/live
    port: 50051
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health/ready
    port: 50051
  initialDelaySeconds: 5
  periodSeconds: 5
