{{- if ge (int .Values.replicaCount) 2 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "28-kotlin-grpc.fullname" . }}
  labels:
    {{- include "28-kotlin-grpc.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "28-kotlin-grpc.selectorLabels" . | nindent 6 }}
{{- end }}
