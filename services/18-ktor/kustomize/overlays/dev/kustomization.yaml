apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev
bases:
  - ../../base
images:
  - name: ghcr.io/yarova-ca/18-ktor
    newTag: "dev"
patches:
  - target:
      kind: Deployment
      name: 18-ktor
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
