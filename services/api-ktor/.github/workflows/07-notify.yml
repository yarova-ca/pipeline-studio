# ════════════════════════════════════════════════════════════════════
# Stage 07 — Notify  |  18 Kotlin — Ktor 3.5
# Triggers after: "04 Build Push Sign — Ktor 3.5"
# Runs on: main branch only, on workflow_run completion
# Copy to: .github/workflows/ in your Ktor repo
# ════════════════════════════════════════════════════════════════════

name: "07 Notify — Ktor 3.5"

on:
  workflow_run:
    # Must exactly match the 'name:' field in 04-build-push-sign.yml
    workflows: ["04 Build Push Sign — Ktor 3.5"]
    types: [completed]

permissions:
  contents: read

jobs:

  notify:
    if: github.event.workflow_run.conclusion != 'skipped'
    runs-on: ubuntu-24.04
    # ── Gate the job on SLACK_WEBHOOK_URL ─────────────────────────────
    # secrets context is NOT allowed in a job-level `if`. Map the secret
    # to job-level env, then gate the step on env. No webhook = no-op job.
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      # ── DEFAULT: Slack ────────────────────────────────────────────
      - if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {{
              "text": "Pipeline ${{ github.event.workflow_run.conclusion }}: Ktor 3.5 — ${{ github.event.workflow_run.head_sha }}"
            }}
      #
      # ── ALTERNATIVE: Microsoft Teams ──────────────────────────────
      # - uses: aliencube/microsoft-teams-actions@v0.8.0
      #   with:
      #     webhook_uri: ${{ secrets.TEAMS_WEBHOOK_URL }}
      #     title: "Pipeline ${{ github.event.workflow_run.conclusion }}"
      #     summary: "Ktor 3.5 — ${{ github.event.workflow_run.head_sha }}"
      #
      # ── ALTERNATIVE: PagerDuty (failures only) ────────────────────
      # - if: github.event.workflow_run.conclusion == 'failure'
      #   uses: PagerDuty/pagerduty-send-event@v2
      #   with:
      #     integration-key: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
      #     payload-summary: "CI failed: Ktor 3.5"
