# Local development stack for Ktor
# Usage: docker compose up
# App: http://localhost:8080

services:
  app:
    build:
      context: .
      target: runtime
      args:
        RUNTIME: alpine
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      PORT: "8080"
      DATABASE_URL: "postgresql://app:devpassword@db:5432/18-ktor_dev"
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:      POSTGRES_USER: app
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: 18-ktor_dev
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgres/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app" pg_isready -U app]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
