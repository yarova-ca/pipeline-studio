apiVersion: v1
kind: Service
metadata:
  name: {{ include "18-ktor.fullname" . }}
  labels:
    {{- include "18-ktor.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "18-ktor.selectorLabels" . | nindent 4 }}
