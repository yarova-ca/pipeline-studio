apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: staging
resources:
  - ../../base
images:
  - name: ghcr.io/yarova-ca/14-fastify
    newTag: "staging"
patches:
  - target:
      kind: Deployment
      name: 14-fastify
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
