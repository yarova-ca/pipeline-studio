{{- if ge (int .Values.replicaCount) 2 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "03-hugo.fullname" . }}
  labels:
    {{- include "03-hugo.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "03-hugo.selectorLabels" . | nindent 6 }}
{{- end }}
