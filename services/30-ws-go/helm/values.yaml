replicaCount: 1

image:
  repository: "ghcr.io/yarova-ca/30-ws-go"   # set in CI: ghcr.io/yarova-ca/30-ws-go
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: "30-ws-go"

serviceAccount:
  create: true
  name: "30-ws-go"

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: 30-ws-go.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

env: {}

envFrom: []

livenessProbe:
  httpGet:
    path: /health/live
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health/ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

networkPolicy:
  enabled: false
