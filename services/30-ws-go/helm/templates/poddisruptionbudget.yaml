{{- if ge (int .Values.replicaCount) 2 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "30-ws-go.fullname" . }}
  labels:
    {{- include "30-ws-go.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "30-ws-go.selectorLabels" . | nindent 6 }}
{{- end }}
