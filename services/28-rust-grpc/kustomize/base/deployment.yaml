apiVersion: apps/v1
kind: Deployment
metadata:
  name: 28-rust-grpc
  labels:
    app: 28-rust-grpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: 28-rust-grpc
  template:
    metadata:
      labels:
        app: 28-rust-grpc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: 28-rust-grpc
          image: ghcr.io/yarova-ca/28-rust-grpc:latest
          ports:
            - containerPort: 50051
          livenessProbe:
            httpGet:
              path: /health/live
              port: 50051
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 50051
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
