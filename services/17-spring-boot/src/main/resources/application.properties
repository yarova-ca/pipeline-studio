server.port=${SERVER_PORT:8080}
management.endpoints.web.exposure.include=health,info

# JWT
app.jwt.secret=${JWT_SECRET:dev-secret-change-in-production}

# DataSource
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/17_spring_boot_dev}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# GitHub OAuth
github.client.id=${GITHUB_CLIENT_ID:}
github.client.secret=${GITHUB_CLIENT_SECRET:}
github.redirect.uri=${GITHUB_REDIRECT_URI:http://localhost:8080/auth/callback}

