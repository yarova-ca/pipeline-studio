apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: staging
bases:
  - ../../base
images:
  - name: ghcr.io/yarova-ca/25-play
    newTag: "staging"
patches:
  - target:
      kind: Deployment
      name: 25-play
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
