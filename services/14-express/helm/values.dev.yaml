replicaCount: 1
image:
  tag: "dev"

networkPolicy:
  enabled: false  # Dev: NetworkPolicy optional, depends on cluster CNI support
resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi
ingress:
  enabled: true
  hosts:
    - host: 14-express.dev.local
      paths:
        - path: /
          pathType: Prefix
