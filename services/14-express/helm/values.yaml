replicaCount: 1

image:
  repository: "ghcr.io/yarova-ca/14-express"
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: "14-express"

serviceAccount:
  create: true
  name: "14-express"

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: 14-express.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env: {}

envFrom: []

networkPolicy:
  enabled: false  # Override to true in values.prod.yaml — required for production
  # List of external HTTPS endpoints this service needs to reach.
  # Format: CIDR notation (use https://ipinfo.io/AS36459 for GitHub IP ranges)
  allowedExternalHTTPS: []
  # Example for GitHub OAuth:
  # allowedExternalHTTPS:
  #   - cidr: 140.82.112.0/20   # GitHub
  #   - cidr: 192.30.252.0/22   # GitHub

livenessProbe:
  httpGet:
    path: /health/live
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health/ready
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5
