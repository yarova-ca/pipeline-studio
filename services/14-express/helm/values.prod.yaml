replicaCount: 3
networkPolicy:
  enabled: true   # REQUIRED in prod — enables pod-to-pod network isolation
  allowedExternalHTTPS:
    - cidr: 140.82.112.0/20   # GitHub (for OAuth callbacks)
    - cidr: 192.30.252.0/22   # GitHub (for OAuth callbacks)
image:
  tag: "" # Injected at deploy time via --set image.tag=$GIT_SHA
resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
ingress:
  enabled: true
  hosts:
    - host: 14-express.yarova.ca
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: 14-express-tls
      hosts:
        - 14-express.yarova.ca
