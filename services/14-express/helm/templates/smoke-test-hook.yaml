# Post-sync smoke test hook — runs after Helm install/upgrade.
# Verifies the service is actually serving traffic before marking the release complete.
# Hook type: post-install, post-upgrade — runs after all resources are applied.
# Hook delete policy: before-hook-creation + hook-succeeded — clean up on success.
apiVersion: batch/v1
kind: Job
metadata:
  name: smoke-test-1
  namespace: pipeline-platform
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: smoke-test
          image: curlimages/curl:8.5.0
          command:
            - /bin/sh
            - -c
            - |
              set -e
              SERVICE=http://14-express.${NAMESPACE}.svc.cluster.local:3000

              echo "Testing /health/ready..."
              curl -sf ${SERVICE}/health/ready
              echo "Health check passed"

              echo "Testing /auth/dev/token..."
              TOKEN=$(curl -sf -X POST ${SERVICE}/auth/dev/token \
                -H "Content-Type: application/json" \
                -d '{"email":"smoke@test.internal","name":"Smoke Test"}' \
                | sed 's/.*"token":"\([^"]*\)".*/\1/')

              echo "Testing GET /users/me/items..."
              curl -sf ${SERVICE}/users/me/items \
                -H "Authorization: Bearer ${TOKEN}"
              echo "All smoke tests passed"
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
