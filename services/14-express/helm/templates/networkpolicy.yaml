{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "14-express.fullname" . }}
  labels:
    {{- include "14-express.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "14-express.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    # PostgreSQL — internal only (pod-to-pod within cluster)
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    # Redis — internal only
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # DNS — CoreDNS in kube-system namespace only
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS to GitHub OAuth (needed for OAuth callback token exchange)
    # Restrict to specific IPs in production via Cilium or Istio egress gateway
    - ports:
        - protocol: TCP
          port: 443
{{- end }}
