# PodDisruptionBudget: limits voluntary disruptions to at most 1 pod at a time.
# Voluntary disruption: node drain for maintenance, cluster upgrade, etc.
# Why maxUnavailable over minAvailable: maxUnavailable=1 allows drains to proceed
# without deadlocking when replicaCount equals minAvailable.
# When replicaCount=1 and maxUnavailable=1: one pod can be disrupted at a time.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "14-express.fullname" . }}
  labels:
    {{- include "14-express.labels" . | nindent 4 }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "14-express.selectorLabels" . | nindent 6 }}
