apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: prod
resources:
  - ../../base
images:
  - name: ghcr.io/yarova-ca/14-express
    newTag: "" # Injected by CI: kustomize edit set image ghcr.io/yarova-ca/14-express=ghcr.io/yarova-ca/14-express:$GIT_SHA
patches:
  - target:
      kind: Deployment
      name: 14-express
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
