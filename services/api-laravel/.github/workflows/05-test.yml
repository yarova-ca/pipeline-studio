# ════════════════════════════════════════════════════════════════════
# Stage 05 — Test  |  23 PHP — Laravel 12
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Laravel repo
# ════════════════════════════════════════════════════════════════════

name: "05 Test — Laravel 12"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          # apcu: metrics backend. pcov: fast coverage driver for clover.
          extensions: apcu, pcov
          ini-values: apc.enable_cli=1
      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Run tests
        run: vendor/bin/phpunit

      # ── OPTIONAL: Codecov coverage upload ─────────────────────────
