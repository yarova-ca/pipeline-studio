apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: prod
bases:
  - ../../base
images:
  - name: ghcr.io/yarova-ca/16-echo
    newTag: "latest"
patches:
  - target:
      kind: Deployment
      name: 16-echo
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
