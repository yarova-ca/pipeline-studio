{{- if ge (int .Values.replicaCount) 2 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "29-graphql-ruby.fullname" . }}
  labels:
    {{- include "29-graphql-ruby.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "29-graphql-ruby.selectorLabels" . | nindent 6 }}
{{- end }}
