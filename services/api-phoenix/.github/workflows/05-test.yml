# ════════════════════════════════════════════════════════════════════
# Stage 05 — Test  |  21 Elixir/BEAM — Phoenix 1.7
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Phoenix repo
# ════════════════════════════════════════════════════════════════════

name: "05 Test — Phoenix 1.7"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04

    # ── Postgres test database ────────────────────────────────────────
    # App.Repo uses the Postgres adapter and starts in the supervision tree,
    # so tests need a real database. config/test.exs reads these credentials.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: app_test

    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '27'
      - name: Install dependencies
        run: mix deps.get
      - name: Create and migrate test database
        run: |
          mix ecto.create
          mix ecto.migrate
      - name: Run tests
        run: mix test --cover

      # ── OPTIONAL: Codecov coverage upload ─────────────────────────
      # - uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}

      # ── OPTIONAL: SonarCloud (requires SONAR_TOKEN secret) ────────
