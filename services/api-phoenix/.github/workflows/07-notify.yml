# ════════════════════════════════════════════════════════════════════
# Stage 07 — Notify  |  21 Elixir/BEAM — Phoenix 1.7
# Triggers after: "04 Build Push Sign — Phoenix 1.7"
# Runs on: main branch only, on workflow_run completion
# Copy to: .github/workflows/ in your Phoenix repo
# ════════════════════════════════════════════════════════════════════

name: "07 Notify — Phoenix 1.7"

on:
  workflow_run:
    # Must exactly match the 'name:' field in 04-build-push-sign.yml
    workflows: ["04 Build Push Sign — Phoenix 1.7"]
    types: [completed]

permissions:
  contents: read

jobs:

  notify:
    # Gate the whole job on SLACK_WEBHOOK_URL being configured.
    # Secrets are not readable in a job-level `if`, so the secret is
    # surfaced via an env var and checked on the step below.
    if: github.event.workflow_run.conclusion != 'skipped'
    runs-on: ubuntu-24.04
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      # ── DEFAULT: Slack ────────────────────────────────────────────
      - if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {{
              "text": "Pipeline ${{ github.event.workflow_run.conclusion }}: Phoenix 1.7 — ${{ github.event.workflow_run.head_sha }}"
            }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      #
      # ── ALTERNATIVE: Microsoft Teams ──────────────────────────────
      # - uses: aliencube/microsoft-teams-actions@v0.8.0
      #   with:
      #     webhook_uri: ${{ secrets.TEAMS_WEBHOOK_URL }}
      #     title: "Pipeline ${{ github.event.workflow_run.conclusion }}"
      #     summary: "Phoenix 1.7 — ${{ github.event.workflow_run.head_sha }}"
      #
      # ── ALTERNATIVE: PagerDuty (failures only) ────────────────────
      # - if: github.event.workflow_run.conclusion == 'failure'
      #   uses: PagerDuty/pagerduty-send-event@v2
      #   with:
      #     integration-key: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
      #     payload-summary: "CI failed: Phoenix 1.7"
