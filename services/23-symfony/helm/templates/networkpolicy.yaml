{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "23-symfony.fullname" . }}
  labels:
    {{- include "23-symfony.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "23-symfony.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 5432     # PostgreSQL
        - protocol: TCP
          port: 6379     # Redis
        - protocol: TCP
          port: 443      # HTTPS outbound
        - protocol: UDP
          port: 53       # DNS
        - protocol: TCP
          port: 53
{{- end }}
