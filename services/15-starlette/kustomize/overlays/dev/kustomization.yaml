apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev
resources:
  - ../../base
images:
  - name: ghcr.io/yarova-ca/15-starlette
    newTag: "dev"
patches:
  - target:
      kind: Deployment
      name: 15-starlette
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
