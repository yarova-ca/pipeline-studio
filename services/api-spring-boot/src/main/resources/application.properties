server.port=${SERVER_PORT:8080}
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.health.db.enabled=true
# I-13: emit the http_server_requests histogram so latency buckets are scrapeable.
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# SpringDoc OpenAPI — Swagger UI at /docs, JSON at /docs.json
springdoc.api-docs.path=/docs.json
springdoc.swagger-ui.path=/docs

# OTel — enabled only when OTEL_ENABLED=true
otel.spring.excluded-urls=/health/**,/actuator/**

# JWT
app.jwt.secret=${JWT_SECRET:dev-secret-change-in-production}

# DataSource
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/17_spring_boot_dev}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# GitHub OAuth
github.client.id=${GITHUB_CLIENT_ID:}
github.client.secret=${GITHUB_CLIENT_SECRET:}
github.redirect.uri=${GITHUB_REDIRECT_URI:http://localhost:8080/auth/callback}

