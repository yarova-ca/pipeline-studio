# Use H2 in-memory DB for all tests — no PostgreSQL needed
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# JWT secret for tests
app.jwt.secret=test-secret-32-chars-minimum-pad

# I-13: expose the Prometheus scrape endpoint in the test context too.
management.endpoints.web.exposure.include=health,info,prometheus
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# I-6: reject unknown JSON fields globally (defence in depth alongside the DTO annotation).
spring.jackson.deserialization.fail-on-unknown-properties=true

# GitHub OAuth (not used in tests)
github.client.id=test-client-id
github.client.secret=test-client-secret
github.redirect.uri=http://localhost:8080/auth/callback
