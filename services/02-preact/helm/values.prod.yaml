replicaCount: 3
image:
  tag: "latest"
resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
ingress:
  enabled: true
  hosts:
    - host: 02-preact.yarova.ca
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: 02-preact-tls
      hosts:
        - 02-preact.yarova.ca

networkPolicy:
  enabled: true
  allowedExternalHTTPS:
    - cidr: 140.82.112.0/20   # GitHub (for OAuth callbacks)
    - cidr: 192.30.252.0/22   # GitHub (for OAuth callbacks)
