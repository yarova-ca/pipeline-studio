{{- if ge (int .Values.replicaCount) 2 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "25-http4s.fullname" . }}
  labels:
    {{- include "25-http4s.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "25-http4s.selectorLabels" . | nindent 6 }}
{{- end }}
