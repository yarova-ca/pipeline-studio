# ════════════════════════════════════════════════════════════════════
# Stage 04 — Test  |  06 Edge Rendering — Hono 4.7
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Hono repo
# ════════════════════════════════════════════════════════════════════

name: "04 Test — Hono 4.7"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: bff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: bff/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      # ── OPTIONAL: Codecov ─────────────────────────────────────────
      # - uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}

  # ── Flutter client invariant suite (app/) ──────────────────────────
  app-test:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      # The app uses platform plugins; scaffold the platforms so `pub get`
      # resolves, then run the source-scanning invariant tests.
      - name: Scaffold platforms
        run: flutter create --platforms=web --project-name yarova_mobile .
      - name: Restore pubspec and source
        run: git checkout -- pubspec.yaml lib
      - name: Install dependencies
        run: flutter pub get
      - name: Run client invariant tests
        run: flutter test
