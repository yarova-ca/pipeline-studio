{{- if ge (int .Values.replicaCount) 2 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "08-mf-webpack.fullname" . }}
  labels:
    {{- include "08-mf-webpack.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "08-mf-webpack.selectorLabels" . | nindent 6 }}
{{- end }}
