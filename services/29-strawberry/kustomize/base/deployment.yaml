apiVersion: apps/v1
kind: Deployment
metadata:
  name: 29-strawberry
  labels:
    app: 29-strawberry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: 29-strawberry
  template:
    metadata:
      labels:
        app: 29-strawberry
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: 29-strawberry
          image: ghcr.io/yarova-ca/29-strawberry:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
