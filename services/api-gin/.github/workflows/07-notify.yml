# ════════════════════════════════════════════════════════════════════
# Stage 07 — Notify  |  16 Go — Gin 1.10
# Triggers after: "04 Build Push Sign — Gin 1.10"
# Runs on: main branch only, on workflow_run completion
# Copy to: .github/workflows/ in your Gin repo
# ════════════════════════════════════════════════════════════════════

name: "07 Notify — Gin 1.10"

on:
  workflow_run:
    # Must exactly match the 'name:' field in 04-build-push-sign.yml
    workflows: ["04 Build Push Sign — Gin 1.10"]
    types: [completed]

permissions:
  contents: read

jobs:

  # ── Gate: secrets context is unavailable in job-level if, so expose
  #    SLACK_WEBHOOK_URL presence as an output for the notify job. ─────
  check-secret:
    runs-on: ubuntu-24.04
    outputs:
      slack-enabled: ${{ steps.check.outputs.slack-enabled }}
    steps:
      - id: check
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            echo "slack-enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "slack-enabled=false" >> "$GITHUB_OUTPUT"
          fi

  notify:
    needs: check-secret
    if: ${{ github.event.workflow_run.conclusion != 'skipped' && needs.check-secret.outputs.slack-enabled == 'true' }}
    runs-on: ubuntu-24.04
    steps:
      # ── DEFAULT: Slack ────────────────────────────────────────────
      - uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {{
              "text": "Pipeline ${{ github.event.workflow_run.conclusion }}: Gin 1.10 — ${{ github.event.workflow_run.head_sha }}"
            }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      #
      # ── ALTERNATIVE: Microsoft Teams ──────────────────────────────
      # - uses: aliencube/microsoft-teams-actions@v0.8.0
      #   with:
      #     webhook_uri: ${{ secrets.TEAMS_WEBHOOK_URL }}
      #     title: "Pipeline ${{ github.event.workflow_run.conclusion }}"
      #     summary: "Gin 1.10 — ${{ github.event.workflow_run.head_sha }}"
      #
      # ── ALTERNATIVE: PagerDuty (failures only) ────────────────────
      # - if: github.event.workflow_run.conclusion == 'failure'
      #   uses: PagerDuty/pagerduty-send-event@v2
      #   with:
      #     integration-key: ${{ secrets.PAGERDUTY_INTEGRATION_KEY }}
      #     payload-summary: "CI failed: Gin 1.10"
