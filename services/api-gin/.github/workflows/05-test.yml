# ════════════════════════════════════════════════════════════════════
# Stage 05 — Test  |  16 Go — Gin 1.10
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Gin repo
# ════════════════════════════════════════════════════════════════════

name: "05 Test — Gin 1.10"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04

    # ── Postgres service container ────────────────────────────────────
    # App config (internal/db/db.go) reads DATABASE_URL and connects via
    # the GORM postgres driver. The .env.example DSN format is
    # postgresql://user:pass@host:5432/dbname.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/app_test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Run tests
        run: go test ./... -coverprofile=coverage.out

      # ── OPTIONAL: Codecov coverage upload ─────────────────────────
      # - uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}

      # ── OPTIONAL: SonarCloud (requires SONAR_TOKEN secret) ────────
