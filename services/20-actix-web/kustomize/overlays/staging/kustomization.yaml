apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: staging
bases:
  - ../../base
images:
  - name: ghcr.io/yarova-ca/20-actix-web
    newTag: "staging"
patches:
  - target:
      kind: Deployment
      name: 20-actix-web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
