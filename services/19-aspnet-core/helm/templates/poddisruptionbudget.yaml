{{- if ge (int .Values.replicaCount) 2 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "19-aspnet-core.fullname" . }}
  labels:
    {{- include "19-aspnet-core.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "19-aspnet-core.selectorLabels" . | nindent 6 }}
{{- end }}
