# Local development stack for PHP gRPC
# Usage: docker compose up
# App: http://localhost:50051

services:
  app:
    build:
      context: .
      target: runtime
      args:
        RUNTIME: alpine
    ports:
      - "50051:50051"
    environment:
      NODE_ENV: development
      PORT: "50051"
      DATABASE_URL: "mysql://app:devpassword@db:3306/28-php-grpc_dev"
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src:ro
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:      MYSQL_ROOT_PASSWORD: devpassword
      MYSQL_DATABASE: 28-php-grpc_dev
      MYSQL_USER: app
      MYSQL_PASSWORD: devpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app" mysqladmin ping -h localhost -u app -pdevpassword]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
