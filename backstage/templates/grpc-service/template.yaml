apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: grpc-service
  title: New gRPC Service
  description: Production-ready gRPC service. Pick language, compliance, auth, and observability.
  tags:
    - grpc
    - backend
    - pipeline-studio
  annotations:
    backstage.io/techdocs-ref: url:https://github.com/yarova-ca/pipeline-studio/tree/main
spec:
  owner: group:platform-team
  type: service

  parameters:
    - title: Service details
      required:
        - name
        - description
        - language
      properties:
        name:
          title: Service name
          type: string
          description: >
            Slug for the service (lowercase, hyphens only).
            Example: payments-grpc
          pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: One sentence — what this gRPC service does.
        language:
          title: Implementation language
          type: string
          description: Language and runtime for the gRPC server.
          enum:
            - go
            - python
            - node
            - java
            - kotlin
            - dotnet
            - rust
            - ruby
            - php
            - swift
          enumNames:
            - Go
            - Python
            - Node.js
            - Java
            - Kotlin
            - .NET (C#)
            - Rust
            - Ruby
            - PHP
            - Swift
        protoPackage:
          title: Proto package name
          type: string
          description: >
            Package name for the .proto file.
            Example: com.yarova.payments.v1
          default: ""

    - title: Compliance and Auth
      description: Select all compliance standards this service must satisfy.
      properties:
        compliance:
          title: Compliance standards
          type: array
          items:
            type: string
            enum:
              - standard
              - hipaa
              - pci
              - pipeda
              - soc2
              - fips
              - cmmc
              - nerc
            enumNames:
              - Standard
              - HIPAA US Healthcare
              - PCI-DSS Payment Card
              - PIPEDA Canadian Privacy
              - SOC 2 Type II
              - FIPS 140-2 US Federal Crypto
              - CMMC US Defense
              - NERC CIP Critical Infrastructure
          uniqueItems: true
          default:
            - standard
          ui:widget: checkboxes
        auth:
          title: Authentication method
          type: string
          description: Auth strategy to scaffold into the gRPC service.
          default: mtls
          enum:
            - none
            - jwt
            - oauth2
            - mtls
          enumNames:
            - None
            - JWT
            - OAuth 2.0
            - mTLS (mutual TLS — gRPC default)

    - title: Observability
      properties:
        observability:
          title: Observability backend
          type: string
          description: Metrics and tracing integration to include.
          default: otel
          enum:
            - none
            - otel
            - prometheus
          enumNames:
            - None
            - OpenTelemetry (CNCF recommended for gRPC)
            - Prometheus metrics

    - title: Deploy
      properties:
        registry:
          title: Container registry
          type: string
          default: ghcr
          enum:
            - ghcr
            - ecr
            - gar
            - harbor
          enumNames:
            - GHCR (GitHub Container Registry)
            - ECR (AWS)
            - GAR (Google)
            - Harbor (self-hosted)
        repoVisibility:
          title: Repository visibility
          type: string
          default: private
          enum:
            - private
            - public
          enumNames:
            - Private
            - Public

  steps:
    - id: fetch-base
      name: Fetch language gRPC starter
      action: fetch:template
      input:
        url: https://github.com/yarova-ca/pipeline-studio/tree/main/services/28-${{ parameters.language }}-grpc
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          language: ${{ parameters.language }}
          protoPackage: ${{ parameters.protoPackage }}
          compliance: ${{ parameters.compliance }}
          auth: ${{ parameters.auth }}
          observability: ${{ parameters.observability }}
          registry: ${{ parameters.registry }}

    - id: write-platform-config
      name: Write platform config
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          language: ${{ parameters.language }}
          protoPackage: ${{ parameters.protoPackage }}
          compliance: ${{ parameters.compliance }}
          auth: ${{ parameters.auth }}
          observability: ${{ parameters.observability }}
          registry: ${{ parameters.registry }}

    - id: publish
      name: Publish repository to GitHub
      action: publish:github
      input:
        allowedHosts:
          - github.com
        description: ${{ parameters.description }}
        repoUrl: github.com?owner=yarova-ca&repo=${{ parameters.name }}
        defaultBranch: main
        repoVisibility: ${{ parameters.repoVisibility }}
        protectDefaultBranch: true
        requireCodeOwnerReviews: true

    - id: register
      name: Register entity in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        icon: github
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
