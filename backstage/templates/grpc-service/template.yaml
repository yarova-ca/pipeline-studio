apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: grpc-service
  title: New gRPC Service
  description: >
    Create a new gRPC service with proto definition, server stub,
    health check (grpc_health_v1), reflection, CI/CD pipeline, and Helm chart.
  tags:
    - grpc
    - backend
    - pipeline-studio
  annotations:
    backstage.io/techdocs-ref: url:https://github.com/yarova-ca/pipeline-studio/tree/main
spec:
  owner: group:platform-team
  type: service

  parameters:
    - title: Service details
      required:
        - name
        - language
        - description
      properties:
        name:
          title: Service name
          type: string
          description: Slug for the service (lowercase, hyphens only).
          pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: One sentence — what this gRPC service does.
        language:
          title: Implementation language
          type: string
          description: Language + runtime for the gRPC server.
          enum:
            - go
            - java
            - kotlin
            - python
            - node
            - dotnet
            - rust
            - ruby
            - php
            - swift
          enumNames:
            - Go
            - Java
            - Kotlin
            - Python
            - Node.js
            - .NET (C#)
            - Rust
            - Ruby
            - PHP
            - Swift
        protoPackage:
          title: Proto package name
          type: string
          description: >
            Package name for the .proto file.
            Example: com.yarova.payments.v1
          default: com.yarova.${{ parameters.name }}.v1

    - title: Deploy options
      properties:
        registry:
          title: Container registry
          type: string
          default: ghcr
          enum:
            - ghcr
            - ecr
            - gar
            - harbor
          enumNames:
            - GHCR (GitHub Container Registry)
            - ECR (AWS)
            - GAR (Google)
            - Harbor (self-hosted)
        repoVisibility:
          title: Repository visibility
          type: string
          default: private
          enum:
            - private
            - public
          enumNames:
            - Private
            - Public

  steps:
    - id: fetch-template
      name: Fetch base gRPC template
      action: fetch:template
      input:
        url: https://github.com/yarova-ca/pipeline-studio/tree/main/services/28-go-grpc
        values:
          name: ${{ parameters.name }}
          language: ${{ parameters.language }}
          description: ${{ parameters.description }}
          protoPackage: ${{ parameters.protoPackage }}
          registry: ${{ parameters.registry }}

    - id: publish
      name: Publish repository to GitHub
      action: publish:github
      input:
        allowedHosts:
          - github.com
        description: ${{ parameters.description }}
        repoUrl: github.com?owner=yarova-ca&repo=${{ parameters.name }}
        defaultBranch: main
        repoVisibility: ${{ parameters.repoVisibility }}
        protectDefaultBranch: true

    - id: register
      name: Register entity in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        icon: github
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
