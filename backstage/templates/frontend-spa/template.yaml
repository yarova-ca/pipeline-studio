apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: frontend-spa
  title: New Frontend Application
  description: >
    Production-ready frontend app. Pick framework, compliance, and deploy target.
  tags:
    - frontend
    - spa
    - pipeline-studio
  annotations:
    backstage.io/techdocs-ref: url:https://github.com/yarova-ca/pipeline-studio/tree/main
spec:
  owner: group:platform-team
  type: website

  parameters:
    - title: Application details
      required:
        - name
        - description
        - framework
      properties:
        name:
          title: App name
          type: string
          description: >
            Slug for the application (lowercase, hyphens only).
            Example: my-dashboard
          pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: One sentence — what this app does.
        framework:
          title: Framework
          type: string
          description: Frontend framework and rendering strategy.
          enum:
            - react
            - vue
            - angular
            - svelte
            - solidjs
            - preact
            - lit
            - nextjs
            - nuxt
            - sveltekit
            - remix
            - solid-start
            - angular-ssr
            - astro
            - gatsby
            - hugo
            - eleventy
            - qwik
            - fresh
            - hono-edge
            - nextjs-edge
            - remix-cloudflare
            - vite-pwa
          enumNames:
            - React (SPA)
            - Vue 3 (SPA)
            - Angular (SPA)
            - Svelte (SPA)
            - SolidJS (SPA)
            - Preact (SPA)
            - Lit (Web Components)
            - Next.js (SSR/SSG)
            - Nuxt (SSR/SSG)
            - SvelteKit (SSR/SSG)
            - Remix (SSR)
            - Solid Start (SSR)
            - Angular SSR
            - Astro (Islands)
            - Gatsby (SSG)
            - Hugo (SSG)
            - Eleventy (SSG)
            - Qwik (Resumable)
            - Fresh (Deno Islands)
            - Hono Edge (Edge Runtime)
            - Next.js Edge (Edge Runtime)
            - Remix Cloudflare (Edge Runtime)
            - Vite PWA (Progressive Web App)

    - title: Compliance profile
      description: Select all compliance standards this application must satisfy.
      properties:
        compliance:
          title: Compliance standards
          type: array
          items:
            type: string
            enum:
              - standard
              - hipaa
              - pci
              - pipeda
              - soc2
              - fips
              - cmmc
              - nerc
            enumNames:
              - Standard
              - HIPAA (US healthcare)
              - PCI-DSS (payment card)
              - PIPEDA (Canadian privacy)
              - SOC 2 (general SaaS)
              - FIPS 140-2 (US federal cryptography)
              - CMMC (US defense contracting)
              - NERC CIP (energy / critical infrastructure)
          uniqueItems: true
          default:
            - standard

    - title: Deploy options
      properties:
        target:
          title: Deploy target
          type: string
          default: nginx
          enum:
            - nginx
            - cloudflare-pages
            - vercel
            - netlify
            - s3
          enumNames:
            - Nginx (Kubernetes / self-hosted)
            - Cloudflare Pages
            - Vercel
            - Netlify
            - S3 + CloudFront
        registry:
          title: Container registry
          type: string
          default: ghcr
          enum:
            - ghcr
            - ecr
            - gar
          enumNames:
            - GHCR (GitHub Container Registry)
            - ECR (AWS Elastic Container Registry)
            - GAR (Google Artifact Registry)
        repoVisibility:
          title: Repository visibility
          type: string
          default: private
          enum:
            - private
            - public
          enumNames:
            - Private
            - Public

  steps:
    - id: fetch-base
      name: Fetch base framework template
      action: fetch:template
      input:
        url: https://github.com/yarova-ca/pipeline-studio/tree/main/services/${{ parameters.framework }}
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          framework: ${{ parameters.framework }}
          compliance: ${{ parameters.compliance }}
          target: ${{ parameters.target }}
          registry: ${{ parameters.registry }}

    - id: write-platform-config
      name: Write platform config overlay
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          framework: ${{ parameters.framework }}
          compliance: ${{ parameters.compliance }}
          target: ${{ parameters.target }}
          registry: ${{ parameters.registry }}

    - id: publish
      name: Publish repository to GitHub
      action: publish:github
      input:
        allowedHosts:
          - github.com
        description: ${{ parameters.description }}
        repoUrl: github.com?owner=yarova-ca&repo=${{ parameters.name }}
        defaultBranch: main
        repoVisibility: ${{ parameters.repoVisibility }}
        protectDefaultBranch: true
        requireCodeOwnerReviews: true

    - id: register
      name: Register entity in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        icon: github
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
