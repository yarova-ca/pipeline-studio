apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: backend-service
  title: New Backend Service
  description: Production-ready backend service. Pick framework, compliance, observability, auth, ORM, and deploy target.
  tags:
    - backend
    - recommended
    - pipeline-studio
  annotations:
    backstage.io/techdocs-ref: url:https://github.com/yarova-ca/pipeline-studio/tree/main
spec:
  owner: group:platform-team
  type: service

  parameters:
    - title: Service details
      required:
        - name
        - description
        - framework
      properties:
        name:
          title: Service name
          type: string
          description: >
            Slug for the service (lowercase, hyphens only).
            Example: my-payments-api
          pattern: "^[a-z0-9][a-z0-9-]*[a-z0-9]$"
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: One sentence — what this service does.
        framework:
          title: Framework
          type: string
          description: Runtime and framework for the service.
          enum:
            - express
            - fastify
            - nestjs
            - hono
            - bun
            - deno
            - elysia
            - fastapi
            - django
            - flask
            - starlette
            - gin
            - chi
            - echo
            - fiber
            - spring-boot
            - micronaut
            - quarkus
            - ktor
            - spring-boot-kotlin
            - aspnet-core
            - minimal-apis
            - axum
            - actix-web
            - phoenix
            - rails
            - sinatra
            - laravel
            - symfony
            - slim
            - vapor
            - hummingbird
            - http4s
            - play
            - pedestal
            - ring
            - crow
            - drogon
          enumNames:
            - Express (Node.js)
            - Fastify (Node.js)
            - NestJS (Node.js)
            - Hono (Node.js/Edge)
            - Bun
            - Deno
            - Elysia (Bun)
            - FastAPI (Python)
            - Django (Python)
            - Flask (Python)
            - Starlette (Python)
            - Gin (Go)
            - Chi (Go)
            - Echo (Go)
            - Fiber (Go)
            - Spring Boot (Java)
            - Micronaut (Java)
            - Quarkus (Java)
            - Ktor (Kotlin)
            - Spring Boot (Kotlin)
            - ASP.NET Core (.NET)
            - Minimal APIs (.NET)
            - Axum (Rust)
            - Actix-Web (Rust)
            - Phoenix (Elixir)
            - Rails (Ruby)
            - Sinatra (Ruby)
            - Laravel (PHP)
            - Symfony (PHP)
            - Slim (PHP)
            - Vapor (Swift)
            - Hummingbird (Swift)
            - http4s (Scala)
            - Play (Scala)
            - Pedestal (Clojure)
            - Ring (Clojure)
            - Crow (C++)
            - Drogon (C++)

    - title: Compliance and Security
      description: Select all compliance standards this service must satisfy.
      properties:
        compliance:
          title: Compliance standards
          type: array
          items:
            type: string
            enum:
              - standard
              - hipaa
              - pci
              - pipeda
              - soc2
              - fips
              - cmmc
              - nerc
            enumNames:
              - Standard
              - HIPAA US Healthcare
              - PCI-DSS Payment Card
              - PIPEDA Canadian Privacy
              - SOC 2 Type II
              - FIPS 140-2 US Federal Crypto
              - CMMC US Defense
              - NERC CIP Critical Infrastructure
          uniqueItems: true
          default:
            - standard
          ui:widget: checkboxes
        auth:
          title: Authentication methods
          type: string
          description: Auth strategy to scaffold into the service.
          default: all
          enum:
            - none
            - jwt
            - oauth2
            - apikey
            - all
          enumNames:
            - None
            - JWT only
            - OAuth 2.0
            - API Key
            - All JWT+OAuth2+API Key

    - title: Observability
      properties:
        observability:
          title: Observability backend
          type: string
          description: Metrics and tracing integration to include.
          default: none
          enum:
            - none
            - otel
            - prometheus
            - datadog
          enumNames:
            - None
            - OpenTelemetry CNCF
            - Prometheus metrics
            - Datadog APM

    - title: Data layer
      properties:
        orm:
          title: ORM / database client
          type: string
          description: Object-relational mapper or database client to scaffold.
          default: none
          enum:
            - none
            - prisma
            - sqlalchemy
            - gorm
          enumNames:
            - None (no DB or raw SQL)
            - Prisma (Node.js)
            - SQLAlchemy (Python)
            - GORM (Go)

    - title: Runtime and build
      properties:
        runtime:
          title: Runtime profile
          type: string
          default: standard
          enum:
            - standard
            - fips
          enumNames:
            - Standard
            - FIPS 140-2 US Federal
        pkgMgr:
          title: Package manager
          type: string
          description: Node.js frameworks only.
          default: npm
          enum:
            - npm
            - pnpm
            - yarn
            - bun
          enumNames:
            - npm
            - pnpm
            - yarn
            - bun
        buildTool:
          title: Build tool
          type: string
          description: TypeScript Node.js only.
          default: tsc
          enum:
            - tsc
            - esbuild
            - swc
          enumNames:
            - tsc (TypeScript compiler)
            - esbuild (fast bundler)
            - swc (Rust-based)

    - title: Deploy
      properties:
        registry:
          title: Container registry
          type: string
          default: ghcr
          enum:
            - ghcr
            - ecr
            - gar
            - harbor
          enumNames:
            - GHCR GitHub
            - ECR AWS
            - GAR Google
            - Harbor self-hosted
        deployMethod:
          title: Deploy method
          type: string
          default: helm
          enum:
            - helm
            - kustomize
          enumNames:
            - Helm chart
            - Kustomize overlays
        repoVisibility:
          title: Repository visibility
          type: string
          default: private
          enum:
            - private
            - public
          enumNames:
            - Private
            - Public

  steps:
    - id: fetch-base
      name: Fetch framework starter
      action: fetch:template
      input:
        url: https://github.com/yarova-ca/pipeline-studio/tree/main/services/${{ {"express":"14-express","fastify":"14-fastify","nestjs":"14-nestjs","hono":"14-hono","bun":"14-bun","deno":"14-deno","elysia":"14-elysia","fastapi":"15-fastapi","django":"15-django","flask":"15-flask","starlette":"15-starlette","gin":"16-gin","chi":"16-chi","echo":"16-echo","fiber":"16-fiber","spring-boot":"17-spring-boot","micronaut":"17-micronaut","quarkus":"17-quarkus","ktor":"18-ktor","spring-boot-kotlin":"18-spring-boot-kotlin","aspnet-core":"19-aspnet-core","minimal-apis":"19-minimal-apis","axum":"20-axum","actix-web":"20-actix-web","phoenix":"21-phoenix","rails":"22-rails","sinatra":"22-sinatra","laravel":"23-laravel","symfony":"23-symfony","slim":"23-slim","vapor":"24-vapor","hummingbird":"24-hummingbird","http4s":"25-http4s","play":"25-play","pedestal":"26-pedestal","ring":"26-ring","crow":"27-crow","drogon":"27-drogon"}[parameters.framework] }}
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          framework: ${{ parameters.framework }}
          compliance: ${{ parameters.compliance }}
          auth: ${{ parameters.auth }}
          observability: ${{ parameters.observability }}
          orm: ${{ parameters.orm }}
          runtime: ${{ parameters.runtime }}
          pkgMgr: ${{ parameters.pkgMgr }}
          buildTool: ${{ parameters.buildTool }}
          registry: ${{ parameters.registry }}
          deployMethod: ${{ parameters.deployMethod }}
          repoVisibility: ${{ parameters.repoVisibility }}

    - id: write-platform-config
      name: Write platform config
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          framework: ${{ parameters.framework }}
          compliance: ${{ parameters.compliance }}
          auth: ${{ parameters.auth }}
          observability: ${{ parameters.observability }}
          orm: ${{ parameters.orm }}
          runtime: ${{ parameters.runtime }}
          pkgMgr: ${{ parameters.pkgMgr }}
          buildTool: ${{ parameters.buildTool }}
          registry: ${{ parameters.registry }}
          deployMethod: ${{ parameters.deployMethod }}
          repoVisibility: ${{ parameters.repoVisibility }}

    - id: publish
      name: Publish repository to GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: github.com?owner=yarova-ca&repo=${{ parameters.name }}
        defaultBranch: main
        repoVisibility: ${{ parameters.repoVisibility }}
        protectDefaultBranch: true
        requireCodeOwnerReviews: true

    - id: register
      name: Register entity in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository
        icon: github
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
