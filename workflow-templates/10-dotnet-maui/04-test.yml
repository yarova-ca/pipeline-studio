# ════════════════════════════════════════════════════════════════════
# Stage 04 — Test  |  10 Cross-platform non-JS — .NET MAUI 10
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your .NET MAUI repo
# ════════════════════════════════════════════════════════════════════

name: "04 Test — .NET MAUI 10"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'
      - uses: actions/checkout@v4
      - name: Run tests
        run: dotnet test --collect:"XPlat Code Coverage"
      # ── OPTIONAL: Codecov ─────────────────────────────────────────
      # - uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
