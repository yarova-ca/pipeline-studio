# ════════════════════════════════════════════════════════════════════
# Stage 05 — Release + Notify  |  06 Edge Rendering — Remix Cloudflare 7
# Runs on: push to main only
# Copy to: .github/workflows/ in your Remix Cloudflare repo
# ════════════════════════════════════════════════════════════════════

name: "05 Release Notify — Remix Cloudflare 7"

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:

  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # ── DEFAULT: semantic-release ─────────────────────────────────
      - name: Semantic release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #
      # ── ALTERNATIVE: Release Please ───────────────────────────────
      # - uses: googleapis/release-please-action@v4
      #   with:
      #     release-type: node

  notify:
    needs: release
    if: always()
    runs-on: ubuntu-24.04
    steps:
      # ── DEFAULT: Slack ────────────────────────────────────────────
      - uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {{
              "text": "Pipeline ${{ job.status }}: Remix Cloudflare 7 edge bundle — ${{ github.sha }}"
            }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      #
      # ── ALTERNATIVE: Microsoft Teams ──────────────────────────────
      # - uses: aliencube/microsoft-teams-actions@v0.8.0
      #   with:
      #     webhook_uri: ${{ secrets.TEAMS_WEBHOOK_URL }}
      #     title: "Pipeline ${{ job.status }}"
      #     summary: "Remix Cloudflare 7 — ${{ github.sha }}"
