# ════════════════════════════════════════════════════════════════════
# Stage 03 — Build Artifact  |  12 Native Android — Kotlin Jetpack Compose 2.0
# Output: APK / AAB
# No Docker image is built — this framework targets mobile/edge platforms.
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Kotlin Jetpack Compose repo
# ════════════════════════════════════════════════════════════════════

name: "03 Build Artifact — Kotlin Jetpack Compose 2.0"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - uses: actions/checkout@v4
      # ── DEFAULT: ./gradlew build ──────────────────────
      - name: Build — ./gradlew
        run: ./gradlew assembleRelease
      #
      # ── ALTERNATIVE: Gradle ──────────────────────────────────────
      # - name: Build — Gradle
      #   run: ./gradlew build -x test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk---aab
          path: |
            build/
            dist/
            *.apk
            *.ipa
            *.aab
            *.msix
          retention-days: 30
