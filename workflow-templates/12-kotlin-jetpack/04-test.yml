# ════════════════════════════════════════════════════════════════════
# Stage 04 — Test  |  12 Native Android — Kotlin Jetpack Compose 2.0
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Kotlin Jetpack Compose repo
# ════════════════════════════════════════════════════════════════════

name: "04 Test — Kotlin Jetpack Compose 2.0"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - uses: actions/checkout@v4
      - name: Run tests
        run: ./gradlew test
      # ── OPTIONAL: Codecov ─────────────────────────────────────────
      # - uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
