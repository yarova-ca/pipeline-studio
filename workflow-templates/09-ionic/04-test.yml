# ════════════════════════════════════════════════════════════════════
# Stage 04 — Test  |  09 Cross-platform JS — Ionic 8
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Ionic repo
# ════════════════════════════════════════════════════════════════════

name: "04 Test — Ionic 8"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/checkout@v4
      - name: Run tests
        run: npm test -- --coverage
      # ── OPTIONAL: Codecov ─────────────────────────────────────────
      # - uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
