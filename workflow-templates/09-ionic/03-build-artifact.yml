# ════════════════════════════════════════════════════════════════════
# Stage 03 — Build Artifact  |  09 Cross-platform JS — Ionic 8
# Output: APK / IPA
# No Docker image is built — this framework targets mobile/edge platforms.
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Ionic repo
# ════════════════════════════════════════════════════════════════════

name: "03 Build Artifact — Ionic 8"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/checkout@v4
      # ── DEFAULT: npx build ──────────────────────
      - name: Build — npx
        run: npx react-native build-android
      #
      # ── ALTERNATIVE: yarn ────────────────────────────────────────
      # - name: Build — yarn
      #   run: yarn install --frozen-lockfile && yarn build
      #
      # ── ALTERNATIVE: pnpm ────────────────────────────────────────
      # - name: Build — pnpm
      #   run: pnpm install --frozen-lockfile && pnpm build
      #
      # ── ALTERNATIVE: bun ─────────────────────────────────────────
      # - name: Build — bun
      #   run: bun install --frozen-lockfile && bun run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk---ipa
          path: |
            build/
            dist/
            *.apk
            *.ipa
            *.aab
            *.msix
          retention-days: 30
