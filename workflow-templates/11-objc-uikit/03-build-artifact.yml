# ════════════════════════════════════════════════════════════════════
# Stage 03 — Build Artifact  |  11 Native iOS — Objective-C UIKit SDK 17
# Output: IPA
# No Docker image is built — this framework targets mobile/edge platforms.
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Objective-C UIKit repo
# ════════════════════════════════════════════════════════════════════

name: "03 Build Artifact — Objective-C UIKit SDK 17"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
      - uses: actions/checkout@v4
      # ── DEFAULT: xcodebuild build ──────────────────────
      - name: Build — xcodebuild
        run: xcodebuild -scheme MyApp -configuration Release archive -archivePath MyApp.xcarchive


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: |
            build/
            dist/
            *.apk
            *.ipa
            *.aab
            *.msix
          retention-days: 30
