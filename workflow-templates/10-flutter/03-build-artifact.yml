# ════════════════════════════════════════════════════════════════════
# Stage 03 — Build Artifact  |  10 Cross-platform non-JS — Flutter 3.44
# Output: APK / IPA
# No Docker image is built — this framework targets mobile/edge platforms.
# Runs on: every push and pull_request to main
# Copy to: .github/workflows/ in your Flutter repo
# ════════════════════════════════════════════════════════════════════

name: "03 Build Artifact — Flutter 3.44"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
      - uses: actions/checkout@v4
      # ── DEFAULT: flutter build ──────────────────────
      - name: Build — flutter
        run: flutter build apk --release


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk---ipa
          path: |
            build/
            dist/
            *.apk
            *.ipa
            *.aab
            *.msix
          retention-days: 30
